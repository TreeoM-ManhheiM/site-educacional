<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webcam Transfer Learning — KNN + MobileNet</title>

  <style>
    body { margin:0; font-family:system-ui; background:#0f172a; color:#e5e7eb }
    header { padding:12px; border-bottom:1px solid #1f2937 }
    main { padding:16px; display:grid; gap:16px }
    .panel { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:12px }
    video { width:100%; max-width:480px; border-radius:10px; background:black }
    button { padding:8px 10px; border-radius:8px; cursor:pointer }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center }
    .pill { padding:4px 8px; border-radius:999px; background:#0b1220; border:1px solid #243049 }
    .bar { height:10px; background:#1f2937; border-radius:999px; overflow:hidden; flex:1 }
    .bar span { display:block; height:100%; width:0%; background:#22c55e }
    pre { background:#0b1220; padding:8px; border-radius:8px; max-height:180px; overflow:auto }
  </style>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.6"></script>
</head>

<body>

<header>
  <h2>Webcam Transfer Learning – IA Educacional</h2>
</header>

<main>
  <section class="panel">
    <h3>Webcam</h3>
    <video id="video" autoplay playsinline muted></video>

    <div class="row">
      <span class="pill">Estado: <b id="status">inicializando…</b></span>
      <span class="pill">FPS: <b id="fps">0</b></span>
    </div>

    <div class="row" style="margin-top:8px">
      <button id="btnStart">▶ Iniciar</button>
      <button id="btnStop">■ Parar</button>
      <button id="btnClear">🗑️ Limpar</button>
      <span class="pill">k <input id="kVal" type="number" value="3" min="1" style="width:50px"></span>
    </div>

    <h4>Classes</h4>
    <div class="row">
      <button data-add="0">Classe 0</button> n=<span id="c0">0</span>
      <button data-add="1">Classe 1</button> n=<span id="c1">0</span>
      <button data-add="2">Classe 2</button> n=<span id="c2">0</span>
      <button data-add="3">Classe 3</button> n=<span id="c3">0</span>
    </div>
  </section>

  <section class="panel">
    <h3>Saída</h3>
    <div class="row">
      <span class="pill">Predição: <b id="pred">—</b></span>
      <span class="pill">Confiança: <b id="conf">—</b></span>
    </div>

    <div class="row">Classe 0<div class="bar"><span id="p0"></span></div><span id="t0">0%</span></div>
    <div class="row">Classe 1<div class="bar"><span id="p1"></span></div><span id="t1">0%</span></div>
    <div class="row">Classe 2<div class="bar"><span id="p2"></span></div><span id="t2">0%</span></div>
    <div class="row">Classe 3<div class="bar"><span id="p3"></span></div><span id="t3">0%</span></div>

    <h4>Log</h4>
    <pre id="log"></pre>
  </section>
</main>

<script>
(async () => {
  const $ = s => document.querySelector(s);

  const video = $('#video');
  const statusEl = $('#status');
  const fpsEl = $('#fps');
  const predEl = $('#pred');
  const confEl = $('#conf');
  const logEl = $('#log');

  const bars = [$('#p0'), $('#p1'), $('#p2'), $('#p3')];
  const texts = [$('#t0'), $('#t1'), $('#t2'), $('#t3')];
  const counts = [$('#c0'), $('#c1'), $('#c2'), $('#c3')];
  const kInp = $('#kVal');

  async function setupWebcam() {
    const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
  }

  function capture() {
    return tf.tidy(() => tf.browser.fromPixels(video));
  }

  statusEl.textContent = 'Carregando modelo...';
  await setupWebcam();
  const net = await mobilenet.load();
  const classifier = knnClassifier.create();

  // ======= Persistência =======
  function saveDataset() {
    const ds = classifier.getClassifierDataset();
    const obj = {};
    Object.keys(ds).forEach(k => obj[k] = Array.from(ds[k].dataSync()));
    localStorage.setItem('knn-data', JSON.stringify(obj));
  }

  function loadDataset() {
    const raw = localStorage.getItem('knn-data');
    if (!raw) return;
    const parsed = JSON.parse(raw);
    const tensors = {};
    Object.keys(parsed).forEach(k => {
      const arr = parsed[k];
      tensors[k] = tf.tensor(arr, [arr.length / 1024, 1024]);
    });
    classifier.setClassifierDataset(tensors);
  }

  loadDataset();
  updateCounts();

  function updateCounts() {
    const c = classifier.getClassExampleCount();
    for (let i = 0; i < 4; i++) {
      counts[i].textContent = c[i] || 0;
    }
  }

  async function addExample(cls) {
    const img = capture();
    const emb = net.infer(img, true);
    classifier.addExample(emb, cls);
    img.dispose();
    emb.dispose();
    saveDataset();
    updateCounts();
    statusEl.textContent = 'Amostra adicionada: ' + cls;
  }

  document.querySelectorAll('[data-add]')
    .forEach(b => b.onclick = () => addExample(Number(b.dataset.add)));

  $('#btnClear').onclick = () => {
    classifier.clearAllClasses();
    localStorage.removeItem('knn-data');
    updateCounts();
    statusEl.textContent = 'Dataset limpo';
  };

  let running = false, frames = 0, last = performance.now();

  async function loop() {
    while (running) {
      try {
        const img = capture();
        const emb = net.infer(img, true);
        const k = Math.max(1, Number(kInp.value) || 3);

        const res = await classifier.predictClass(emb, k);
        predEl.textContent = res.label;
        confEl.textContent = (res.confidences[res.label] * 100).toFixed(1) + '%';

        for (let i = 0; i < 4; i++) {
          const p = res.confidences[i] || 0;
          bars[i].style.width = Math.round(p * 100) + '%';
          texts[i].textContent = Math.round(p * 100) + '%';
        }

        img.dispose();
        emb.dispose();
      } catch (e) {
        logEl.textContent = e.message;
      }

      frames++;
      const now = performance.now();
      if (now - last > 1000) {
        fpsEl.textContent = frames;
        frames = 0;
        last = now;
      }
      await new Promise(r => requestAnimationFrame(r));
    }
  }

  $('#btnStart').onclick = () => {
    running = true;
    statusEl.textContent = 'Predizendo...';
    loop();
  };

  $('#btnStop').onclick = () => {
    running = false;
    statusEl.textContent = 'Parado';
  };

})();
</script>

</body>
</html>
``
