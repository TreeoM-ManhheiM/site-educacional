<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>8 de Abril IA com Webcam – Treinamento por Exemplos</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #1f2937;
}

main {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

video {
  width: 100%;
  max-height: 45vh;
  background: black;
  border-radius: 12px;
}

.panel {
  background: #111827;
  border-radius: 12px;
  padding: 12px;
}

.train-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.train-buttons button {
  padding: 12px 4px;
  font-size: 14px;
  border-radius: 10px;
  background: #334155;
  border: none;
  color: white;
}

.train-buttons button:active {
  background: #22c55e;
  color: #052e13;
}

.counter {
  display: block;
  font-size: 12px;
  opacity: 0.8;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
  font-size: 15px;
  margin-top: 6px;
}

button.primary { background: #22c55e; color:#052e13; }
button.warn { background: #f59e0b; color:#1b1202; }
button.bad { background: #ef4444; }

.bar {
  height: 18px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 4px;
}

.bar span {
  display: block;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  transition: width 0.25s ease;
}

.label {
  font-size: 13px;
  margin-top: 8px;
}

.status {
  text-align: center;
  font-size: 14px;
  opacity: 0.85;
}
</style>

<!-- ✅ SCRIPTS CORRETOS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.6"></script>
</head>

<body>

<header>
  <b>IA com Webcam</b><br>
  <small>Treine primeiro, execute depois</small>
</header>

<main>

<section class="panel">
  <video id="video" autoplay playsinline muted></video>

  <div class="train-buttons">
    <button data-class="0">Classe 0<span id="c0" class="counter">n=0</span></button>
    <button data-class="1">Classe 1<span id="c1" class="counter">n=0</span></button>
    <button data-class="2">Classe 2<span id="c2" class="counter">n=0</span></button>
    <button data-class="3">Classe 3<span id="c3" class="counter">n=0</span></button>
  </div>

  <div class="status" id="status">Aguardando câmera…</div>

  <button id="startCam" class="primary">📷 Ativar câmera</button>
  <button id="toggleCam">🔄 Trocar câmera</button>
</section>

<section class="panel">
  <button id="run" class="warn">▶ Rodar IA</button>
  <button id="stop">⏹ Parar IA</button>
  <button id="clear" class="bad">🗑️ Limpar treino</button>
</section>

<section class="panel">
  <div class="label">Classe 0 – <b id="t0">0%</b></div>
  <div class="bar"><span id="p0"></span></div>

  <div class="label">Classe 1 – <b id="t1">0%</b></div>
  <div class="bar"><span id="p1"></span></div>

  <div class="label">Classe 2 – <b id="t2">0%</b></div>
  <div class="bar"><span id="p2"></span></div>

  <div class="label">Classe 3 – <b id="t3">0%</b></div>
  <div class="bar"><span id="p3"></span></div>
</section>

</main>

<script>
(async () => {
const video = document.getElementById('video');
const statusEl = document.getElementById('status');

const bars = [
  document.getElementById('p0'),
  document.getElementById('p1'),
  document.getElementById('p2'),
  document.getElementById('p3'),
];
const texts = [
  document.getElementById('t0'),
  document.getElementById('t1'),
  document.getElementById('t2'),
  document.getElementById('t3'),
];
const counters = [
  document.getElementById('c0'),
  document.getElementById('c1'),
  document.getElementById('c2'),
  document.getElementById('c3'),
];

let net, classifier;
let stream = null;
let running = false;
let useFrontCamera = false;
let counts = [0,0,0,0];

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFrontCamera ? "user" : "environment" },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
}

document.getElementById('startCam').onclick = async () => {
  statusEl.textContent = 'Carregando modelo…';
  await startCamera();
  net = await mobilenet.load();
  classifier = knnClassifier.create();
  statusEl.textContent = 'Treine usando os botões';
};

document.getElementById('toggleCam').onclick = async () => {
  useFrontCamera = !useFrontCamera;
  await startCamera();
};

document.querySelectorAll('[data-class]').forEach(btn => {
  btn.onclick = () => {
    const cls = Number(btn.dataset.class);
    tf.tidy(() => {
      const img = tf.browser.fromPixels(video);
      const emb = net.infer(img, true);
      classifier.addExample(emb, cls);
    });
    counts[cls]++;
    counters[cls].textContent = 'n=' + counts[cls];
    statusEl.textContent = `Classe ${cls} treinada`;
  };
});

document.getElementById('clear').onclick = () => {
  classifier.clearAllClasses();
  counts = [0,0,0,0];
  counters.forEach(c => c.textContent = 'n=0');
  bars.forEach(b => b.style.width = '0%');
  texts.forEach(t => t.textContent = '0%');
  statusEl.textContent = 'Treino limpo';
};

document.getElementById('run').onclick = () => {
  if (running) return;
  running = true;
  statusEl.textContent = 'IA rodando…';
  predictLoop();
};

document.getElementById('stop').onclick = () => {
  running = false;
  statusEl.textContent = 'IA parada';
};

async function predictLoop() {
  while (running) {
    tf.tidy(() => {
      const img = tf.browser.fromPixels(video);
      const emb = net.infer(img, true);
      classifier.predictClass(emb).then(res => {
        for (let i = 0; i < 4; i++) {
          const p = (res.confidences[i] || 0) * 100;
          bars[i].style.width = p + '%';
          texts[i].textContent = p.toFixed(1) + '%';
        }
      });
    });
    await new Promise(r => setTimeout(r, 120));
  }
}
})();
</script>

</body>
</html>
