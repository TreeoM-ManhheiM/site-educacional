<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IA com Webcam – Treinar e Rodar</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #1f2937;
}

main {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel {
  background: #111827;
  border-radius: 14px;
  padding: 10px;
}

video {
  width: 100%;
  max-height: 40vh;
  background: black;
  border-radius: 12px;
}

/* ===== BOTÕES DE TREINO ===== */
.train-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.train-buttons button {
  padding: 14px 6px;
  font-size: 14px;
  border-radius: 10px;
  background: #334155;
  color: white;
  border: none;
  transition: transform 0.1s, background 0.15s;
}

.train-buttons button:active {
  transform: scale(0.92);
  background: #4ade80;
  color: #052e13;
}

.counter {
  display: block;
  font-size: 12px;
  opacity: 0.85;
  margin-top: 4px;
}

/* ===== BOTÕES GERAIS ===== */
button {
  padding: 12px;
  margin-top: 6px;
  font-size: 15px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
}

button.primary { background: #22c55e; color: #052e13; }
button.warn { background: #f59e0b; color:#1b1202; }
button.bad { background: #ef4444; }

.status {
  text-align: center;
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.9;
}

/* ===== BARRAS ===== */
.bar {
  height: 18px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 6px;
}

.bar span {
  display: block;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  transition: width 0.3s ease;
}

.pre-label {
  font-size: 13px;
  margin-top: 8px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.6"></script>
</head>

<body>

<header>
  <b>IA com Webcam</b><br>
  <small>Treinar → Rodar</small>
</header>

<main>

<!-- ===== CAMERA + TREINO ===== -->
<section class="panel">
  <video id="video" autoplay playsinline muted></video>

  <div class="train-buttons">
    <button data-cls="0">Classe 0<span id="n0" class="counter">n = 0</span></button>
    <button data-cls="1">Classe 1<span id="n1" class="counter">n = 0</span></button>
    <button data-cls="2">Classe 2<span id="n2" class="counter">n = 0</span></button>
    <button data-cls="3">Classe 3<span id="n3" class="counter">n = 0</span></button>
  </div>

  <div class="status" id="status">Aguardando câmera…</div>

  <button id="startCam" class="primary">📷 Ativar câmera</button>
  <button id="toggleCam">🔄 Trocar câmera</button>
</section>

<!-- ===== RODAR ===== -->
<section class="panel">
  <button id="run" class="warn">▶ Rodar IA</button>
  <button id="stop">⏹ Parar</button>
  <button id="clear" class="bad">🗑️ Limpar treino</button>
</section>

<!-- ===== RESULTADO ===== -->
<section class="panel">
  <div class="pre-label">Predição: <b id="pred">—</b></div>
  <div class="pre-label">Confiança: <b id="conf">—</b></div>

  <div class="pre-label">Classe 0</div>
  <div class="bar"><span id="p0"></span></div>

  <div class="pre-label">Classe 1</div>
  <div class="bar"><span id="p1"></span></div>

  <div class="pre-label">Classe 2</div>
  <div class="bar"><span id="p2"></span></div>

  <div class="pre-label">Classe 3</div>
  <div class="bar"><span id="p3"></span></div>
</section>

</main>

<script>
(async () => {

const $ = s => document.querySelector(s);

const video = $('#video');
const statusEl = $('#status');
const predEl = $('#pred');
const confEl = $('#conf');
const bars = [$('#p0'), $('#p1'), $('#p2'), $('#p3')];
const counters = [$('#n0'), $('#n1'), $('#n2'), $('#n3')];

let net, classifier;
let stream = null;
let running = false;
let useFrontCamera = false;
let counts = [0,0,0,0];

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFrontCamera ? "user" : "environment" }
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
}

function capture() {
  return tf.browser.fromPixels(video);
}

$('#startCam').onclick = async () => {
  statusEl.textContent = 'Carregando modelo…';
  await startCamera();
  net = await mobilenet.load();
  classifier = knnClassifier.create();
  statusEl.textContent = 'Treine usando os botões acima';
};

$('#toggleCam').onclick = async () => {
  useFrontCamera = !useFrontCamera;
  await startCamera();
};

document.querySelectorAll('[data-cls]').forEach(btn => {
  btn.onclick = async () => {
    const cls = Number(btn.dataset.cls);
    const img = capture();
    const emb = net.infer(img, true);
    classifier.addExample(emb, cls);
    img.dispose(); emb.dispose();

    counts[cls]++;
    counters[cls].textContent = `n = ${counts[cls]}`;
    statusEl.textContent = `Classe ${cls} treinada (${counts[cls]})`;
  };
});

$('#clear').onclick = () => {
  classifier.clearAllClasses();
  counts = [0,0,0,0];
  counters.forEach(c => c.textContent = 'n = 0');
  statusEl.textContent = 'Treino limpo';
};

$('#run').onclick = () => {
  running = true;
  statusEl.textContent = 'IA rodando…';
  loop();
};

$('#stop').onclick = () => {
  running = false;
  statusEl.textContent = 'IA parada';
};

async function loop() {
  while (running) {
    const img = capture();
    const emb = net.infer(img, true);
    try {
      const res = await classifier.predictClass(emb);
      predEl.textContent = res.label;
      confEl.textContent =
        (res.confidences[res.label] * 100).toFixed(1) + '%';

      for (let i = 0; i < 4; i++) {
        const p = res.confidences[i] || 0;
        bars[i].style.width = Math.round(p * 100) + '%';
      }
    } catch {}

    img.dispose(); emb.dispose();
    await new Promise(r => requestAnimationFrame(r));
  }
}

})();
</script>

</body>
</html>
