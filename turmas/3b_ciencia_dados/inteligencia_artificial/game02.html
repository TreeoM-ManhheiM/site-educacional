<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IA com Webcam – Treinar e Rodar</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}
header {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #1f2937;
}
main {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.panel {
  background: #111827;
  border-radius: 14px;
  padding: 12px;
}
video {
  width: 100%;
  max-height: 45vh;
  background: black;
  border-radius: 12px;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #334155;
  color: white;
  transition: transform 0.1s, background 0.2s;
}
button:active {
  transform: scale(0.97);
}
button.primary { background: #22c55e; color: #052e13; }
button.warn { background: #f59e0b; color:#1b1202; }
button.bad { background: #ef4444; }

button.flash {
  background: #4ade80 !important;
}

.pill {
  padding: 6px 10px;
  border-radius: 999px;
  background: #0b1220;
  text-align: center;
  margin-bottom: 6px;
}
.bar {
  height: 12px;
  background: #1f2937;
  border-radius: 999px;
  overflow: hidden;
}
.bar span {
  display:block;
  height:100%;
  width:0%;
  background:#22c55e;
}
small {
  opacity: 0.85;
}
pre {
  background:#0b1220;
  padding:8px;
  border-radius:8px;
  font-size:12px;
  max-height:140px;
  overflow:auto;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.6"></script>
</head>

<body>

<header>
  <h3>IA com Webcam</h3>
  <small>Treinar primeiro, rodar depois</small>
</header>

<main>

<section class="panel">
  <video id="video" autoplay playsinline muted></video>
  <div class="pill">Estado: <b id="status">aguardando câmera</b></div>
  <button id="startCam" class="primary">📷 Ativar câmera</button>
  <button id="toggleCam">🔄 Trocar câmera</button>
</section>

<section class="panel">
  <h4>1️⃣ Treinamento</h4>

  <button data-add="0">➕ Classe 0 (n = <span id="c0">0</span>)</button>
  <button data-add="1">➕ Classe 1 (n = <span id="c1">0</span>)</button>
  <button data-add="2">➕ Classe 2 (n = <span id="c2">0</span>)</button>
  <button data-add="3">➕ Classe 3 (n = <span id="c3">0</span>)</button>

  <button id="clear" class="bad">🗑️ Limpar treino</button>
</section>

<section class="panel">
  <h4>2️⃣ Executar IA</h4>
  <button id="run" class="warn">▶ Rodar IA</button>
  <button id="stop">⏹ Parar IA</button>
</section>

<section class="panel">
  <div class="pill">Predição: <b id="pred">—</b></div>
  <div class="pill">Confiança: <b id="conf">—</b></div>
  <div class="bar"><span id="p0"></span></div>
  <div class="bar"><span id="p1"></span></div>
  <div class="bar"><span id="p2"></span></div>
  <div class="bar"><span id="p3"></span></div>
</section>

<section class="panel">
  <pre id="log"></pre>
</section>

</main>

<script>
(async () => {

const $ = s => document.querySelector(s);

const video = $('#video');
const statusEl = $('#status');
const predEl = $('#pred');
const confEl = $('#conf');
const logEl = $('#log');
const bars = [$('#p0'), $('#p1'), $('#p2'), $('#p3')];
const counters = [$('#c0'), $('#c1'), $('#c2'), $('#c3')];

let net, classifier;
let running = false;
let stream = null;
let useFrontCamera = false;

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFrontCamera ? "user" : "environment" },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
}

function capture() {
  return tf.tidy(() => tf.browser.fromPixels(video));
}

$('#startCam').onclick = async () => {
  statusEl.textContent = 'Carregando modelo…';
  await startCamera();
  net = await mobilenet.load();
  classifier = knnClassifier.create();
  statusEl.textContent = 'Pronto para TREINAR';
};

$('#toggleCam').onclick = async () => {
  useFrontCamera = !useFrontCamera;
  await startCamera();
};

function flashButton(btn) {
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 200);
}

async function addExample(cls, btn) {
  const img = capture();
  const emb = net.infer(img, true);
  classifier.addExample(emb, cls);
  img.dispose(); emb.dispose();

  const count = classifier.getClassExampleCount()[cls] || 0;
  counters[cls].textContent = count;

  flashButton(btn);
  statusEl.textContent = `✅ Amostra adicionada na Classe ${cls} (n = ${count})`;
}

document.querySelectorAll('[data-add]').forEach(btn => {
  btn.onclick = () => addExample(Number(btn.dataset.add), btn);
});

$('#clear').onclick = () => {
  classifier.clearAllClasses();
  counters.forEach(c => c.textContent = '0');
  statusEl.textContent = 'Treino limpo';
};

$('#run').onclick = () => {
  running = true;
  statusEl.textContent = 'IA rodando…';
  loop();
};

$('#stop').onclick = () => {
  running = false;
  statusEl.textContent = 'IA parada';
};

async function loop() {
  while (running) {
    try {
      const img = capture();
      const emb = net.infer(img, true);
      const res = await classifier.predictClass(emb);

      predEl.textContent = res.label;
      confEl.textContent =
        (res.confidences[res.label] * 100).toFixed(1) + '%';

      for (let i = 0; i < 4; i++) {
        const p = res.confidences[i] || 0;
        bars[i].style.width = Math.round(p * 100) + '%';
      }

      img.dispose(); emb.dispose();
    } catch (e) {
      logEl.textContent = e.message;
    }
    await new Promise(r => requestAnimationFrame(r));
  }
}

})();
</script>

</body>
</html>
