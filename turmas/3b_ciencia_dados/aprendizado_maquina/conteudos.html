 .top-actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; align-items:center }

    sklearn: `<pre><code># PT/EN: CatBoost (sklearn-like API)\n# pip install catboost\nimport numpy as np\nfrom sklearn.model_selection import train_test_split\nfrom sklearn.metrics import accuracy_score\nfrom catboost import CatBoostClassifier\n\nX = np.array([[5,70],[7,80],[9,90],[4,60],[8,85]], dtype=float)\ny = np.array([0,1,1,0,1], dtype=int)\n\nX_train, X_test, y_train, y_test = train_test_split(\n    X, y, test_size=0.4, random_state=42, stratify=y\n)\n\ncb = CatBoostClassifier(verbose=False, random_state=42)\ncb.fit(X_train, y_train)\n\ny_pred = cb.predict(X_test)\nprint("Acurácia/Accuracy:", accuracy_score(y_test, y_pred))\n\n# INPUT / ENTRADA\nnota = 7.5; presenca = 85.0\nentrada = np.array([[nota, presenca]])\nprint("Entrada (nota, presenca):", entrada.tolist())\nprint("Classe prevista / Predicted class:", int(cb.predict(entrada)[0]))\n</code></pre>`
  }
};

// ====== BUILD SELECTS ======
function buildModelSelects(){
  const selSup = el('algSup');
  const selUns = el('algUnsup');
  selSup.innerHTML=''; selUns.innerHTML='';
  const supOrder = ['regressao','logistica','knn','arvore','randomforest','svm','naivebayes','gboost','xgboost','lightgbm','catboost'];
  const unsOrder = ['kmeans'];
  supOrder.forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=i18n[LANG].models[k]; selSup.appendChild(o); });
  unsOrder.forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=i18n[LANG].models[k]; selUns.appendChild(o); });
}

// ====== APPLY LANGUAGE ======
function applyLang(){
  const t=i18n[LANG];
  el('title').textContent = t.title;
  el('intro').textContent = t.intro;
  el('btnDownloadHTML').textContent = '⬇️ ' + t.downloadPage;
  el('inputTitle').textContent = t.inputTitle;
  el('modelsTitle').textContent = t.modelsTitle;
  el('labSup').textContent = t.supLabel;
  el('labUnsup').textContent = t.unsupLabel;
  el('btnSup').textContent = t.execSup;
  el('btnUnsup').textContent = t.execUnsup;
  el('simNote').textContent = t.simNote;
  el('resultTitle').textContent = t.resultTitle;
  el('formulaTitle').textContent = t.formulaTitle;
  el('codeTitle').textContent = t.codeTitle;
  el('btnDownloadCode').textContent = '⬇️ ' + t.downloadCode;
  buildModelSelects();
  setView(el('algSup').value); // refresh panel
}

// ====== LABELS ======
function setLabelsFor(alg){
  const L = content[alg].labels;
  const arr = (L && L[LANG]) ? L[LANG] : ['Var 1','Var 2','Var 3','Var 4'];
  ['l1','l2','l3','l4'].forEach((id,i)=>{ const lab=document.getElementById(id); if(lab) lab.textContent = arr[i]||`Var ${i+1}`; });
  const ph = i18n[LANG].placeholder;
  inp.v1.placeholder = ph + ' 6';
  inp.v2.placeholder = ph + ' 85';
  inp.v3.placeholder = ph + ' 12';
  inp.v4.placeholder = ph + ' 18';
}

// ====== VIEW/EXEC ======
function setView(alg){
  el('explicacao').innerHTML = content[alg].explain[LANG];
  el('matematica').innerHTML = content[alg].sklearn;
  setLabelsFor(alg);
  if(window.MathJax && MathJax.typeset){ MathJax.typeset(); }
}

function getInputs(){
  const v = [inp.v1.value, inp.v2.value, inp.v3.value, inp.v4.value].map(parseFloat);
  return { v, bad: v.some(x=>Number.isNaN(x)) };
}

function executar(alg){
  const {v, bad} = getInputs();
  const [a,b,c,d] = v;
  const alert = el('alerta');
  alert.style.display='none'; alert.innerHTML='';
  if(bad){ alert.style.display='block'; alert.innerHTML=(LANG==='pt'? 'Preencha os quatro valores numéricos.' : 'Fill in the four numeric values.'); el('resultado').innerHTML='–'; return; }
  const fn = content[alg].calc; let r = fn(a,b,c,d);
  if(!isFinite(r)) r = 0; r = Math.max(-1e6, Math.min(100, r));
  el('resultado').innerHTML = (LANG==='pt'? 'Resultado (simulação): ' : 'Result (simulation): ') + `<b>${r.toFixed(2)}</b>`;
  setView(alg);
  alert.style.display='block'; alert.innerHTML = (LANG==='pt'? i18n.pt.alertSim : i18n.en.alertSim);
}

// ====== EVENTS ======
el('lang').addEventListener('change', (e)=>{ LANG = e.target.value; applyLang(); });

const algSup = el('algSup');
const algUns = el('algUnsup');

document.addEventListener('DOMContentLoaded', ()=>{
  applyLang(); // builds selects and sets default view
  el('btnSup').addEventListener('click', ()=> executar(el('algSup').value));
  el('btnUnsup').addEventListener('click', ()=> executar(el('algUnsup').value));
  el('algSup').addEventListener('change', ()=> setView(el('algSup').value));
  el('algUnsup').addEventListener('change', ()=> setView(el('algUnsup').value));
});

// ====== DOWNLOADS ======
function baixarCodigo(){
  const ext = el('codeFormat').value;
  const codeEl = document.querySelector('#matematica pre code');
  const codigo = codeEl ? codeEl.innerText : '';
  const algAtual = document.getElementById('algSup').value || 'modelo';
  const blob = new Blob([codigo], {type: ext==='py' ? 'text/x-python' : 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = algAtual + (ext==='py'?'.py':'.txt');
  document.body.appendChild(a); a.click(); a.remove();
}

document.getElementById('btnDownloadCode').addEventListener('click', baixarCodigo);

function baixarHTML(){ const doctype='<!DOCTYPE html>\n'; const html=document.documentElement.outerHTML; const blob=new Blob([doctype+html],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='laboratorio_ml_bilingue_pt_en.html'; document.body.appendChild(a); a.click(); a.remove(); }
document.getElementById('btnDownloadHTML').addEventListener('click', baixarHTML);
</script>
