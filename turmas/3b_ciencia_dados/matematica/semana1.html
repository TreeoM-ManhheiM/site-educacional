<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrizes e Sistemas — Laboratório de Computação</title>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            padding: 30px 20px;
        }

        header h1 { margin: 0; font-size: 28px; }
        header p { font-size: 14px; margin-top: 5px; opacity: 0.9; }

        main {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            margin-bottom: 20px;
            cursor: pointer;
        }

        button {
            background: #2563eb;
            color: white;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        button:hover { background: #1d4ed8; }

        .matriz-grid {
            display: inline-grid;
            gap: 10px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
        }

        .matriz-2x2 { grid-template-columns: repeat(3, 70px); }
        .matriz-3x3 { grid-template-columns: repeat(4, 70px); }

        input[type="number"] {
            width: 100%;
            padding: 10px 0;
            text-align: center;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
        }

        .resultado-box {
            background: #e0f2fe;
            padding: 25px;
            border-radius: 8px;
            border-left: 5px solid #0284c7;
            text-align: left;
            margin-top: 20px;
            font-size: 16px;
            overflow-x: auto;
        }

        h3 { color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        .passo-det { background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #bae6fd; margin-bottom: 15px; }
        
        .solucao-final {
            background: #ecfdf5;
            border: 2px solid #34d399;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Simulador de Matrizes e Sistemas 🧮</h1>
    <p>Resolva sistemas de 1º grau (2x2 e 3x3) passo a passo usando a Regra de Cramer</p>
</header>

<main>
    <div class="container">
        <h3>1. Escolha o Tamanho do Sistema</h3>
        <select id="tipo-sistema" onchange="mudarSistema()">
            <option value="2">Sistema 2x2 (Variáveis X e Y)</option>
            <option value="3">Sistema 3x3 (Variáveis X, Y e Z)</option>
        </select>

        <h3>2. Digite os Valores da Matriz</h3>
        <p>Preencha os coeficientes ($A$) e os resultados ($b$).</p>
        
        <div id="area-matriz"></div>

        <br><br>
        <button onclick="calcularCramer()">GERAR RESOLUÇÃO PASSO A PASSO</button>
    </div>

    <div class="container" id="area-resultado" style="display: none;">
        <h3>3. Resolução Detalhada (Regra de Cramer)</h3>
        <div class="resultado-box" id="texto-resultado"></div>
    </div>
</main>

<script>
    // Função auxiliar para formatar números negativos com parênteses
    function fmt(n) { return n < 0 ? `(${n})` : n; }

    function mudarSistema() {
        const tipo = document.getElementById('tipo-sistema').value;
        const area = document.getElementById('area-matriz');
        let html = '';

        if (tipo === '2') {
            html = `
            <div class="matriz-grid matriz-2x2">
                <input type="number" id="a11" value="2" title="x1"> <input type="number" id="a12" value="1" title="y1"> <input type="number" id="b1" value="5" title="Resultado 1" style="background:#dbeafe; color:#0369a1;">
                <input type="number" id="a21" value="1" title="x2"> <input type="number" id="a22" value="-3" title="y2"> <input type="number" id="b2" value="-1" title="Resultado 2" style="background:#dbeafe; color:#0369a1;">
            </div>
            `;
        } else {
            html = `
            <div class="matriz-grid matriz-3x3">
                <input type="number" id="a11" value="1"> <input type="number" id="a12" value="2"> <input type="number" id="a13" value="-1"> <input type="number" id="b1" value="2" style="background:#dbeafe; color:#0369a1;">
                <input type="number" id="a21" value="2"> <input type="number" id="a22" value="-1"> <input type="number" id="a23" value="1"> <input type="number" id="b2" value="3" style="background:#dbeafe; color:#0369a1;">
                <input type="number" id="a31" value="1"> <input type="number" id="a32" value="1"> <input type="number" id="a33" value="1"> <input type="number" id="b3" value="6" style="background:#dbeafe; color:#0369a1;">
            </div>
            `;
        }
        area.innerHTML = html;
        document.getElementById('area-resultado').style.display = 'none';
    }

    // Função para gerar o passo a passo de um Determinante 2x2
    function gerarPassoDet2x2(matriz, nomeDet) {
        let p = matriz[0][0] * matriz[1][1];
        let s = matriz[0][1] * matriz[1][0];
        let res = p - s;
        let latex = `<div class="passo-det">`;
        latex += `<p><b>Cálculo de $${nomeDet}$:</b> Multiplica-se a diagonal principal e subtrai-se a secundária.</p>`;
        latex += `$$ ${nomeDet} = \\begin{vmatrix} ${matriz[0][0]} & ${matriz[0][1]} \\\\ ${matriz[1][0]} & ${matriz[1][1]} \\end{vmatrix} $$`;
        latex += `$$ ${nomeDet} = (${matriz[0][0]} \\times ${fmt(matriz[1][1])}) - (${matriz[0][1]} \\times ${fmt(matriz[1][0])}) $$`;
        latex += `$$ ${nomeDet} = ${p} - ${fmt(s)} = \\mathbf{${res}} $$`;
        latex += `</div>`;
        return { res: res, latex: latex };
    }

    // Função para gerar o passo a passo de um Determinante 3x3 (Sarrus)
    function gerarPassoDet3x3(m, nomeDet) {
        let p1 = m[0][0]*m[1][1]*m[2][2], p2 = m[0][1]*m[1][2]*m[2][0], p3 = m[0][2]*m[1][0]*m[2][1];
        let s1 = m[0][2]*m[1][1]*m[2][0], s2 = m[0][0]*m[1][2]*m[2][1], s3 = m[0][1]*m[1][0]*m[2][2];
        let sumP = p1+p2+p3;
        let sumS = s1+s2+s3;
        let res = sumP - sumS;

        let latex = `<div class="passo-det">`;
        latex += `<p><b>Cálculo de $${nomeDet}$ (Regra de Sarrus):</b></p>`;
        latex += `$$ \\left| \\begin{array}{ccc|cc} ${m[0][0]} & ${m[0][1]} & ${m[0][2]} & ${m[0][0]} & ${m[0][1]} \\\\ ${m[1][0]} & ${m[1][1]} & ${m[1][2]} & ${m[1][0]} & ${m[1][1]} \\\\ ${m[2][0]} & ${m[2][1]} & ${m[2][2]} & ${m[2][0]} & ${m[2][1]} \\end{array} \\right| $$`;
        latex += `<p>Diagonais Principais ($\\searrow$): ${\\color{#2563eb} (${p1}) + (${p2}) + (${p3}) = ${sumP} }$</p>`;
        latex += `<p>Diagonais Secundárias ($\\swarrow$): ${\\color{#ef4444} (${s1}) + (${s2}) + (${s3}) = ${sumS} }$</p>`;
        latex += `$$ ${nomeDet} = {\\color{#2563eb} ${sumP} } - {\\color{#ef4444} [${sumS}] } = \\mathbf{${res}} $$`;
        latex += `</div>`;
        
        return { res: res, latex: latex };
    }

    function calcularCramer() {
        const tipo = document.getElementById('tipo-sistema').value;
        let resBox = document.getElementById('texto-resultado');
        document.getElementById('area-resultado').style.display = 'block';
        
        let latex = '';

        if (tipo === '2') {
            let a11 = Number(document.getElementById('a11').value), a12 = Number(document.getElementById('a12').value), b1 = Number(document.getElementById('b1').value);
            let a21 = Number(document.getElementById('a21').value), a22 = Number(document.getElementById('a22').value), b2 = Number(document.getElementById('b2').value);

            latex += `<p>O sistema na forma matricial $A\\vec{x} = \\vec{b}$ é:</p>`;
            latex += `$$ \\begin{bmatrix} ${a11} & ${a12} \\\\ ${a21} & ${a22} \\end{bmatrix} \\begin{bmatrix} x \\\\ y \\end{bmatrix} = \\begin{bmatrix} ${b1} \\\\ ${b2} \\end{bmatrix} $$`;

            let calcD = gerarPassoDet2x2([[a11, a12], [a21, a22]], "\\Delta");
            latex += calcD.latex;

            if (calcD.res === 0) {
                latex += `<div style="color:red; font-weight:bold; margin-top:20px;">Atenção: Como $\\Delta = 0$, o sistema não possui uma solução única (é Impossível ou Indeterminado).</div>`;
            } else {
                latex += `<p>Agora substituímos a coluna dos resultados na coluna do $x$ para achar $\\Delta x$, e na coluna do $y$ para achar $\\Delta y$:</p>`;
                
                let calcDx = gerarPassoDet2x2([[b1, a12], [b2, a22]], "\\Delta x");
                latex += calcDx.latex;

                let calcDy = gerarPassoDet2x2([[a11, b1], [a21, b2]], "\\Delta y");
                latex += calcDy.latex;

                let x = calcDx.res / calcD.res;
                let y = calcDy.res / calcD.res;

                latex += `<div class="solucao-final">`;
                latex += `<h4 style="margin-top:0; color:#065f46;">Divisão Final e Solução do Sistema</h4>`;
                latex += `$$ x = \\frac{\\Delta x}{\\Delta} = \\frac{${calcDx.res}}{${calcD.res}} = \\mathbf{${x}} $$`;
                latex += `$$ y = \\frac{\\Delta y}{\\Delta} = \\frac{${calcDy.res}}{${calcD.res}} = \\mathbf{${y}} $$`;
                latex += `<p><b>Conjunto Solução:</b> $S = \\{${x}, ${y}\\}$</p>`;
                latex += `</div>`;
            }

        } else {
            // Lógica para 3x3
            let a11 = Number(document.getElementById('a11').value), a12 = Number(document.getElementById('a12').value), a13 = Number(document.getElementById('a13').value), b1 = Number(document.getElementById('b1').value);
            let a21 = Number(document.getElementById('a21').value), a22 = Number(document.getElementById('a22').value), a23 = Number(document.getElementById('a23').value), b2 = Number(document.getElementById('b2').value);
            let a31 = Number(document.getElementById('a31').value), a32 = Number(document.getElementById('a32').value), a33 = Number(document.getElementById('a33').value), b3 = Number(document.getElementById('b3').value);

            latex += `<p>O sistema na forma matricial $A\\vec{x} = \\vec{b}$ é:</p>`;
            latex += `$$ \\begin{bmatrix} ${a11} & ${a12} & ${a13} \\\\ ${a21} & ${a22} & ${a23} \\\\ ${a31} & ${a32} & ${a33} \\end{bmatrix} \\begin{bmatrix} x \\\\ y \\\\ z \\end{bmatrix} = \\begin{bmatrix} ${b1} \\\\ ${b2} \\\\ ${b3} \\end{bmatrix} $$`;

            let calcD = gerarPassoDet3x3([[a11, a12, a13], [a21, a22, a23], [a31, a32, a33]], "\\Delta");
            latex += calcD.latex;

            if (calcD.res === 0) {
                latex += `<div style="color:red; font-weight:bold; margin-top:20px;">Atenção: Como $\\Delta = 0$, o sistema não possui uma solução única.</div>`;
            } else {
                latex += `<p>Substituímos a coluna dos resultados (em azul) nas posições do $X$, $Y$ e $Z$:</p>`;
                
                let calcDx = gerarPassoDet3x3([[b1, a12, a13], [b2, a22, a23], [b3, a32, a33]], "\\Delta x");
                latex += calcDx.latex;

                let calcDy = gerarPassoDet3x3([[a11, b1, a13], [a21, b2, a23], [a31, b3, a33]], "\\Delta y");
                latex += calcDy.latex;

                let calcDz = gerarPassoDet3x3([[a11, a12, b1], [a21, a22, b2], [a31, a32, b3]], "\\Delta z");
                latex += calcDz.latex;
                
                let x = calcDx.res / calcD.res;
                let y = calcDy.res / calcD.res;
                let z = calcDz.res / calcD.res;

                latex += `<div class="solucao-final">`;
                latex += `<h4 style="margin-top:0; color:#065f46;">Divisão Final e Solução do Sistema</h4>`;
                latex += `$$ x = \\frac{\\Delta x}{\\Delta} = \\frac{${calcDx.res}}{${calcD.res}} = \\mathbf{${Number.isInteger(x) ? x : x.toFixed(2)}} $$`;
                latex += `$$ y = \\frac{\\Delta y}{\\Delta} = \\frac{${calcDy.res}}{${calcD.res}} = \\mathbf{${Number.isInteger(y) ? y : y.toFixed(2)}} $$`;
                latex += `$$ z = \\frac{\\Delta z}{\\Delta} = \\frac{${calcDz.res}}{${calcD.res}} = \\mathbf{${Number.isInteger(z) ? z : z.toFixed(2)}} $$`;
                latex += `<p><b>Conjunto Solução:</b> $S = \\{${Number.isInteger(x) ? x : x.toFixed(2)}, ${Number.isInteger(y) ? y : y.toFixed(2)}, ${Number.isInteger(z) ? z : z.toFixed(2)}\\}$</p>`;
                latex += `</div>`;
            }
        }

        resBox.innerHTML = latex;
        
        // Renderiza as equações usando MathJax
        if (window.MathJax) {
            MathJax.typesetPromise([resBox]);
        }
    }

    // Inicializa o grid na tela
    mudarSistema();
</script>

</body>
</html>
