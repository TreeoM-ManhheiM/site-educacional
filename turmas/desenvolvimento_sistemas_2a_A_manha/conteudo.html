<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro de Usuários</title>

<style>

body{
font-family: Arial;
margin:40px;
}

input{
padding:5px;
margin:5px;
}

button{
padding:6px;
margin:5px;
}

table{
border-collapse: collapse;
margin-top:20px;
}

th,td{
border:1px solid #999;
padding:8px;
}

</style>

</head>

<body>

<h2>Cadastro de Usuários</h2>

Nome
<input id="nome">

Email
<input id="email">

<button onclick="adicionar()">Cadastrar</button>

<h3>Lista de Usuários</h3>

<table id="tabela">

<tr>
<th>Nome</th>
<th>Email</th>
<th>Ação</th>
</tr>

</table>

<h3>Exportar Dados</h3>

<button onclick="baixarJSON()">JSON</button>
<button onclick="baixarCSV()">CSV</button>
<button onclick="baixarXML()">XML</button>
<button onclick="baixarSQL()">SQL</button>

<script>

let usuarios = []

function adicionar(){

let nome = document.getElementById("nome").value
let email = document.getElementById("email").value

usuarios.push({nome,email})

mostrar()

}

function mostrar(){

let tabela = document.getElementById("tabela")

tabela.innerHTML =
"<tr><th>Nome</th><th>Email</th><th>Ação</th></tr>"

usuarios.forEach((u,i)=>{

tabela.innerHTML +=
`<tr>
<td>${u.nome}</td>
<td>${u.email}</td>
<td><button onclick="excluir(${i})">Excluir</button></td>
</tr>`

})

}

function excluir(i){

usuarios.splice(i,1)

mostrar()

}

function baixarJSON(){

let dados = JSON.stringify(usuarios,null,2)

download("usuarios.json",dados)

}

function baixarCSV(){

let csv = "nome,email\n"

usuarios.forEach(u=>{

csv += u.nome + "," + u.email + "\n"

})

download("usuarios.csv",csv)

}

function baixarXML(){

let xml = "<usuarios>\n"

usuarios.forEach(u=>{

xml +=
`<usuario>
<nome>${u.nome}</nome>
<email>${u.email}</email>
</usuario>\n`

})

xml += "</usuarios>"

download("usuarios.xml",xml)

}

function baixarSQL(){

let sql = ""

usuarios.forEach(u=>{

sql +=
`INSERT INTO usuarios (nome,email) VALUES ('${u.nome}','${u.email}');
`

})

download("usuarios.sql",sql)

}

function download(nome,conteudo){

let a = document.createElement("a")

a.href =
"data:text/plain;charset=utf-8,"+
encodeURIComponent(conteudo)

a.download = nome

a.click()

}

</script>

<br><br>

<hr>

<b>Laboratório de Computação</b><br>
Material educacional aberto.<br>
Os estudantes podem baixar, estudar e modificar os arquivos.

</body>
</html>
