<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Rede – v89 (Debug Estável)</title>
<style>
body{font-family:monospace;margin:0;background:#eef2f7}
h1{background:#0f172a;color:#fff;padding:14px;margin:0;text-align:center}
#toolbar{padding:10px;background:#e5e7eb;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
button{padding:6px 10px;font-size:12px;cursor:pointer;border-radius:6px;border:1px solid #999}
#rede{width:1400px;height:580px;margin:10px auto;background:#fff;border:2px solid #0f172a;position:relative;overflow:hidden}
svg{position:absolute;top:0;left:0;width:1400px;height:580px;pointer-events:auto}
.dispositivo{width:140px;height:100px;position:absolute;color:#fff;text-align:center;border-radius:10px;cursor:pointer;font-size:11px;line-height:1.2;padding-top:6px}
.internet{background:#000}.modem{background:#0ea5e9}.firewall{background:#111827}.router{background:#f59e0b}.switch{background:#2563eb}.pc{background:#16a34a}.notebook{background:#22c55e}.server{background:#ef4444}
.selected{outline:3px dashed red}
#console{max-width:1400px;margin:10px auto;background:#020617;color:#22c55e;padding:10px;height:200px;overflow:auto}
</style>
</head>
<body>
<h1>Simulador de Rede – v89 (Debug Estável)</h1>
<div id="toolbar">
<button onclick="addDev('internet')">Internet</button>
<button onclick="addDev('firewall')">Firewall</button>
<button onclick="addDev('switch')">Switch</button>
<button onclick="addDev('pc')">PC</button>
<button onclick="addDev('server')">Servidor</button>
<button onclick="setMode('link')">Ligar</button>
<button onclick="setMode('move')">Mover</button>
<button onclick="setMode('delete')">Deletar</button>
<button onclick="resetAll()">Limpar</button>
</div>
<div id="rede"><svg id="cabos"></svg></div>
<pre id="console">> console iniciado...</pre>
<script>
const rede=document.getElementById('rede');
const svg=document.getElementById('cabos');
const consoleBox=document.getElementById('console');
let devices=[], links=[];
let mode='move';
let selected=null;
let linkFrom=null;
let count={internet:0,firewall:0,switch:0,pc:0,server:0};

function log(t){consoleBox.textContent+="
"+t;consoleBox.scrollTop=consoleBox.scrollHeight}
function center(d){return{ x:d.offsetLeft+d.offsetWidth/2, y:d.offsetTop+d.offsetHeight/2}}

function setMode(m){mode=m;clearSelection();log('> modo: '+m)}

function addDev(type){count[type]++;const d=document.createElement('div');
 d.className='dispositivo '+type;
 d.dataset.name=type.toUpperCase()+count[type];
 d.textContent=d.dataset.name;
 d.style.left=Math.random()*1200+'px';
 d.style.top=Math.random()*450+'px';
 d.addEventListener('click',e=>{e.stopPropagation();handleClick(d)});
 enableDrag(d);
 rede.appendChild(d);
 devices.push(d);
 log('> '+d.dataset.name+' adicionado');}

function handleClick(d){
 clearSelection();
 selected=d; d.classList.add('selected');

 if(mode==='delete'){removeDevice(d);return}

 if(mode==='link'){
  if(!linkFrom){linkFrom=d;log('> origem: '+d.dataset.name)}
  else if(linkFrom!==d){createLink(linkFrom,d);linkFrom=null;clearSelection()}
 }
}

function clearSelection(){devices.forEach(x=>x.classList.remove('selected'))}

function createLink(a,b){const l=document.createElementNS('http://www.w3.org/2000/svg','line');
 updateLink(l,a,b); l.setAttribute('stroke','#000');l.setAttribute('stroke-width','2');
 l.addEventListener('click',e=>{e.stopPropagation();if(mode==='delete')removeLink(l)});
 svg.appendChild(l); links.push({a,b,l}); log('> ligação '+a.dataset.name+' <-> '+b.dataset.name)}

function updateLink(l,a,b){const p1=center(a),p2=center(b);
 l.setAttribute('x1',p1.x);l.setAttribute('y1',p1.y);
 l.setAttribute('x2',p2.x);l.setAttribute('y2',p2.y)}

function removeLink(l){links=links.filter(x=>{if(x.l===l){x.l.remove();return false}return true});log('> ligação removida')}

function removeDevice(d){links=links.filter(x=>{if(x.a===d||x.b===d){x.l.remove();return false}return true});
 devices=devices.filter(x=>x!==d); d.remove(); log('> '+d.dataset.name+' removido')}

function enableDrag(d){let ox,oy;d.addEventListener('mousedown',e=>{if(mode!=='move')return;
 ox=e.offsetX;oy=e.offsetY;
 document.onmousemove=m=>{d.style.left=(m.pageX-rede.offsetLeft-ox)+'px';d.style.top=(m.pageY-rede.offsetTop-oy)+'px';links.forEach(x=>updateLink(x.l,x.a,x.b))};
 document.onmouseup=()=>document.onmousemove=null})}

function resetAll(){rede.innerHTML='<svg id="cabos"></svg>';svg=document.getElementById('cabos');devices=[];links=[];selected=null;linkFrom=null;consoleBox.textContent='> console iniciado...'}
</script>
</body>
</html>
