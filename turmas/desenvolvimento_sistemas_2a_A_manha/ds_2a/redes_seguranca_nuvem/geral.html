<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Rede – v64 (wlan/lan)</title>
<style>
body{font-family:monospace;margin:0;background:#eef2f7}
h1{background:#0f172a;color:#fff;padding:14px;margin:0;text-align:center}
#toolbar{padding:10px;background:#e5e7eb;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
button{padding:6px 10px;font-size:12px;cursor:pointer;border-radius:6px;border:1px solid #999}
#rede{width:1400px;height:580px;margin:10px auto;background:#fff;border:2px solid #0f172a;position:relative;overflow:hidden}
svg{position:absolute;top:0;left:0;width:1400px;height:580px}
.dispositivo{width:140px;height:100px;position:absolute;color:#fff;text-align:center;border-radius:10px;cursor:move;font-size:11px;line-height:1.2;padding-top:6px}
.internet{background:#000}.modem{background:#0ea5e9}.firewall{background:#111827}.router{background:#f59e0b}.switch{background:#2563eb}.pc{background:#16a34a}.notebook{background:#22c55e}.server{background:#ef4444}
.selected{outline:3px dashed red}
#console{max-width:1400px;margin:10px auto;background:#020617;color:#22c55e;padding:10px;height:200px;overflow:auto}
#config{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
#configBox{background:#fff;padding:14px;border-radius:8px;width:380px}
label{display:block;margin-top:6px;font-size:12px}
input{width:100%;padding:5px}
</style>
</head>
<body>
<h1>Simulador de Rede – 8 de Abril 2026</h1>
<div id="toolbar">
<button onclick="addDev('internet')">Internet</button>
<button onclick="addDev('modem')">Modem</button>
<button onclick="addDev('firewall')">Firewall</button>
<button onclick="addDev('router')">Roteador</button>
<button onclick="addDev('switch')">Switch</button>
<button onclick="addDev('pc')">PC</button>
<button onclick="addDev('notebook')">Notebook</button>
<button onclick="addDev('server')">Servidor</button>
<button onclick="mode='link'">Ligar</button>
<button onclick="mode='normal'">Mover</button>
<button onclick="resetAll()">Limpar</button>
</div>
<div id="rede">
<svg id="cabos"></svg>
</div>
<pre id="console">> console iniciado...</pre>
<div id="config"><div id="configBox">
<h3>Configuração</h3>
<div id="cfgName"></div>
<label>IP</label><input id="ip">
<label>Máscara</label><input id="mask">
<label>Gateway</label><input id="gw">
<label id="lan_ip_lbl">LAN IP</label><input id="lan_ip">
<label id="lan_mask_lbl">LAN Máscara</label><input id="lan_mask">
<div style="margin-top:10px;text-align:right">
<button onclick="saveCfg()">Salvar</button>
<button onclick="closeCfg()">Cancelar</button>
</div></div></div>
<script>
const rede=document.getElementById('rede');
const svg=document.getElementById('cabos');
const cfg=document.getElementById('config');
const cfgName=document.getElementById('cfgName');
const consoleBox=document.getElementById('console');
let devices=[], links=[], selCfg=null, mode='normal', linkOrigem=null;
let count={internet:0,modem:0,firewall:0,router:0,switch:0,pc:0,notebook:0,server:0};

function label(d){return `${d.dataset.name}<br>IP:${d.dataset.ip||'-'}<br>M:${d.dataset.mask||'-'}<br>GW:${d.dataset.gw||'-'}`;}
function center(d){return{ x:d.offsetLeft+d.offsetWidth/2, y:d.offsetTop+d.offsetHeight/2}}

function addDev(type){count[type]++;const d=document.createElement('div');
 d.className='dispositivo '+type;
 d.dataset.type=type;
 d.dataset.name=type.toUpperCase()+count[type];
 d.dataset.ip='';d.dataset.mask='';d.dataset.gw='';
 d.innerHTML=label(d);
 d.style.left=Math.random()*1200+'px';
 d.style.top=Math.random()*450+'px';
 d.onclick=()=>clickDev(d);
 d.ondblclick=()=>openCfg(d);
 drag(d);
 rede.appendChild(d);
 devices.push(d);
 consoleBox.textContent+=`
> ${d.dataset.name} adicionado`;
}

function clickDev(d){
 if(mode==='link'){
  if(!linkOrigem){linkOrigem=d;d.classList.add('selected');}
  else if(linkOrigem!==d){criarLink(linkOrigem,d);linkOrigem.classList.remove('selected');linkOrigem=null;}
 }
}

function criarLink(a,b){
 const l=document.createElementNS('http://www.w3.org/2000/svg','line');
 atualizarLink(l,a,b);
 l.setAttribute('stroke','#000');l.setAttribute('stroke-width','2');
 svg.appendChild(l);
 links.push({a,b,l});
 consoleBox.textContent+=`
> Ligação: ${a.dataset.name} <-> ${b.dataset.name}`;
}

function atualizarLink(l,a,b){const p1=center(a),p2=center(b);
 l.setAttribute('x1',p1.x);l.setAttribute('y1',p1.y);
 l.setAttribute('x2',p2.x);l.setAttribute('y2',p2.y);
}

function drag(el){let ox,oy;el.onmousedown=e=>{if(mode!=='normal')return;ox=e.offsetX;oy=e.offsetY;
 document.onmousemove=m=>{el.style.left=(m.pageX-rede.offsetLeft-ox)+'px';el.style.top=(m.pageY-rede.offsetTop-oy)+'px';links.forEach(x=>atualizarLink(x.l,x.a,x.b));};
 document.onmouseup=()=>document.onmousemove=null;};}

function openCfg(d){selCfg=d;cfg.style.display='flex';cfgName.textContent=d.dataset.name;
 ip.value=d.dataset.ip||'';mask.value=d.dataset.mask||'';gw.value=d.dataset.gw||'';
 const dual=['modem','router','firewall'].includes(d.dataset.type);
 lan_ip_lbl.style.display=lan_ip.style.display=lan_mask_lbl.style.display=lan_mask.style.display=dual?'block':'none';
 if(dual){lan_ip.value=d.dataset.lan_ip||'192.168.0.1';lan_mask.value=d.dataset.lan_mask||'255.255.255.0';}
}
function closeCfg(){cfg.style.display='none';selCfg=null;}
function saveCfg(){if(!selCfg)return;selCfg.dataset.ip=ip.value;selCfg.dataset.mask=mask.value;selCfg.dataset.gw=gw.value;
 if(['modem','router','firewall'].includes(selCfg.dataset.type)){
  selCfg.dataset.lan_ip=lan_ip.value;selCfg.dataset.lan_mask=lan_mask.value;
 }
 selCfg.innerHTML=label(selCfg);
 consoleBox.textContent+=`
> Configurado ${selCfg.dataset.name}`;
 closeCfg();}
function resetAll(){rede.innerHTML='<svg id="cabos"></svg>';links=[];devices=[];consoleBox.textContent='> console iniciado...';}
</script>
</body>
</html>
