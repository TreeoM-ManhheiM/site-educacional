<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Laboratório de Redes</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: #e5e7eb;
}
header {
    text-align: center;
    padding: 15px;
    background: #020617;
    position: sticky;
    top: 0;
}
.score {
    font-size: 18px;
    margin-top: 5px;
}
.container {
    padding: 15px;
}
.card {
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    display: none;
}
.card.active {
    display: block;
}
h2 {
    font-size: 18px;
    margin-bottom: 10px;
}
p {
    font-size: 14px;
}
input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
}
button {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}
button:disabled {
    background: #475569;
}
.result {
    margin-top: 10px;
    font-size: 14px;
}
.ok { color: #22c55e; }
.err { color: #f87171; }
</style>
</head>

<body>

<header>
    <h1>Laboratório de Redes</h1>
    <div class="score">Pontos: <span id="pontos">0</span></div>
</header>

<div class="container" id="quiz"></div>

<script>
const perguntas = [
 {q:"Informe um IP válido da rede 192.168.1.0/24", tipo:"ip"},
 {q:"Qual é a máscara da rede 192.168.1.0/24?", a:"255.255.255.0"},
 {q:"Qual é o endereço de broadcast dessa rede?", a:"192.168.1.255"},
 {q:"Quantos hosts válidos uma rede /24 possui?", a:"254"}
];

let pontos = 0;
const tentativas = [];
const quiz = document.getElementById("quiz");

perguntas.forEach((item, i) => {
    tentativas[i] = 0;

    const card = document.createElement("div");
    card.className = "card" + (i === 0 ? " active" : "");
    card.id = "q" + i;

    card.innerHTML = `
        <h2>Missão ${i + 1}</h2>
        <p>${item.q}</p>
        <input id="inp${i}">
        <button id="btn${i}">Responder</button>
        <div class="result" id="res${i}"></div>
    `;

    quiz.appendChild(card);

    document.getElementById("btn" + i).onclick = () => {
        const input = document.getElementById("inp" + i);
        const btn = document.getElementById("btn" + i);
        const res = document.getElementById("res" + i);

        tentativas[i]++;
        let correto = false;
        const resposta = input.value.trim().toLowerCase();

        /* ✅ LÓGICA CORRETA PARA IP VÁLIDO */
        if (item.tipo === "ip") {
            const p = resposta.split(".");
            if (p.length === 4) {
                const a = Number(p[0]), b = Number(p[1]), c = Number(p[2]), d = Number(p[3]);
                if (
                    a === 192 &&
                    b === 168 &&
                    c === 1 &&
                    d >= 1 &&
                    d <= 254
                ) {
                    correto = true;
                }
            }
        } else {
            correto = resposta === item.a;
        }

        if (correto) {
            pontos += 10;
            document.getElementById("pontos").innerText = pontos;
            res.innerHTML = "✅ Correto";
            res.className = "result ok";
            input.disabled = true;
            btn.disabled = true;

            const prox = document.getElementById("q" + (i + 1));
            if (prox) prox.classList.add("active");
        } else {
            if (tentativas[i] >= 2) {
                res.innerHTML = "❌ Errado duas vezes. Pulando para a próxima.";
                res.className = "result err";
                input.disabled = true;
                btn.disabled = true;

                const prox = document.getElementById("q" + (i + 1));
                if (prox) prox.classList.add("active");
            } else {
                res.innerHTML = "❌ Errado. Última tentativa.";
                res.className = "result err";
            }
        }
    };
});
</script>

</body>
</html>
