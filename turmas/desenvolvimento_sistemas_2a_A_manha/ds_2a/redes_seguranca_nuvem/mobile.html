<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Rede – Mobile Friendly</title>
<style>
body{font-family:monospace;margin:0;background:#eef2f7}
h1{background:#0f172a;color:#fff;padding:14px;margin:0;text-align:center}
#toolbar{padding:8px;background:#e5e7eb;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
button{padding:12px;font-size:14px;border-radius:8px;border:1px solid #888;touch-action:manipulation}
#rede{width:100%;height:70vh;margin:auto;background:#fff;border:2px solid #0f172a;position:relative;overflow:hidden;touch-action:none}
svg{position:absolute;top:0;left:0;width:100%;height:100%}
.dispositivo{width:140px;height:100px;position:absolute;border-radius:10px;color:#fff;text-align:center;font-size:11px;line-height:1.2;padding-top:6px;user-select:none}
.internet{background:#000}.modem{background:#0ea5e9}.firewall{background:#111827}.router{background:#f59e0b}.switch{background:#2563eb}
.pc{background:#16a34a}.notebook{background:#22c55e}.smartphone{background:#4ade80}.tablet{background:#2dd4bf}.printer{background:#64748b}.camera{background:#ef4444}.tv{background:#9333ea}.console{background:#be185d}.iot{background:#a16207}.server{background:#dc2626}
.selected{outline:3px dashed red}
#console{background:#020617;color:#22c55e;padding:8px;height:120px;overflow:auto}
#cfg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center}
#cfgBox{background:#fff;padding:15px;border-radius:8px;width:90%;max-height:90vh;overflow:auto}
#cfgBox label{display:block;margin-top:6px;font-size:14px}
#cfgBox input{width:100%;font-size:16px;padding:10px}
.hidden{display:none}
@media(min-width:769px){#toolbar button{flex:initial}}
</style>
</head>
<body>
<h1>Simulador de Rede – Versão Mobile</h1>
<div id="toolbar">
<button data-add="internet">Internet</button>
<button data-add="modem">Modem</button>
<button data-add="firewall">Firewall</button>
<button data-add="router">Roteador</button>
<button data-add="switch">Switch</button>
<button data-add="pc">PC</button>
<button data-add="notebook">Notebook</button>
<button data-add="smartphone">Smartphone</button>
<button data-add="tablet">Tablet</button>
<button data-mode="link">Ligar</button>
<button data-mode="move">Mover</button>
<button data-mode="delete">Deletar</button>
<button onclick="saveTopo()">Salvar JSON</button>
</div>
<div id="rede"><svg id="cabos"></svg></div>
<pre id="console">> console iniciado...</pre>
</body>
</html>
