<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Rede – Laboratório</title>

<style>
body{font-family:monospace;margin:0;background:#eef2f7}
h1{background:#0f172a;color:#fff;padding:14px;margin:0;text-align:center}
#toolbar{padding:10px;background:#e5e7eb;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
button{padding:6px 12px;font-size:12px;cursor:pointer;border-radius:6px;border:1px solid #888}

#rede{width:1400px;height:580px;margin:10px auto;background:#fff;border:2px solid #0f172a;position:relative;overflow:hidden}
svg{position:absolute;top:0;left:0;width:1400px;height:580px}

.dispositivo{
  width:180px;height:135px;position:absolute;border-radius:10px;
  color:#fff;text-align:center;font-size:11px;line-height:1.2;
  padding-top:6px;cursor:pointer;user-select:none
}

/* INFRA */
.internet{background:#000}
.modem{background:#0ea5e9}
.firewall{background:#111827}
.switch{background:#2563eb}
.router{background:#f59e0b}

/* HOSTS */
.pc{background:#16a34a}
.notebook{background:#22c55e}
.smartphone{background:#4ade80}
.tablet{background:#2dd4bf}
.printer{background:#64748b}
.camera{background:#ef4444}
.tv{background:#9333ea}
.console{background:#be185d}
.iot{background:#a16207}
.server{background:#dc2626}

.selected{outline:3px dashed red}

#console{
  max-width:1400px;margin:10px auto;
  background:#020617;color:#22c55e;
  padding:10px;height:200px;overflow:auto
}

/* MODAL */
#cfg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center}
#cfgBox{background:#fff;padding:15px;border-radius:8px;width:350px}
#cfgBox label{display:block;margin-top:6px}
#cfgBox input{width:100%}
.hidden{display:none}


/* ===== ANDROID 13 + MOBILE RESPONSIVO ===== */
svg{pointer-events:none}
#toolbar{position:relative;z-index:10}
#cfg{z-index:1000}

@media (max-width: 768px){
  #toolbar{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
  }
  #toolbar button{
    padding:14px;
    font-size:14px;
  }
  #rede{
    width:100%;
    height:75vh;
  }
  .dispositivo{
    width:100px;
    height:80px;
    font-size:9px;
    line-height:1.1;
    padding-top:4px;
  }
  #console{
    height:100px;
    font-size:11px;
  }
}

</style>
</head>

<body>
<h1>Simulador de Rede – Laboratório de Pensamento em Redes</h1>

<div id="toolbar">
  <!-- Infra -->
  <button data-add="internet">Internet</button>
  <button data-add="modem">Modem</button>
  <button data-add="firewall">Firewall</button>
  <button data-add="router">Roteador</button>
  <button data-add="switch">Switch</button>

  <!-- Hosts -->
  <button data-add="pc">PC</button>
  <button data-add="notebook">Notebook</button>
  <button data-add="smartphone">Smartphone</button>
  <button data-add="tablet">Tablet</button>
  <button data-add="printer">Impressora</button>
  <button data-add="camera">Câmera IP</button>
  <button data-add="tv">Smart TV</button>
  <button data-add="console">Console</button>
  <button data-add="iot">IoT</button>
  <button data-add="server">Servidor</button>

  <!-- Ações -->
  <button data-mode="link">Ligar</button>
  <button data-mode="move">Mover</button>
  <button data-mode="delete">Deletar</button>

  <button onclick="saveTopo()">Salvar topologia.json</button>
  <button onclick="resetAll()">Limpar</button>
</div>

<div id="rede"><svg id="cabos"></svg></div>
<pre id="console">> console iniciado...</pre>

<!-- MODAL CONFIG -->
<div id="cfg">
  <div id="cfgBox">
    <h3 id="cfgTitle">Configuração</h3>

    <!-- LAN (Internet + Hosts) -->
    <div id="lanBlock">
      <label>LAN IP</label><input id="lan_ip">
      <label>LAN Máscara</label><input id="lan_mask">
      <label>LAN Gateway</label><input id="lan_gw">
    </div>

    <!-- WLAN (Modem / Firewall / Router) -->
    <div id="wlanBlock">
      <label>WLAN IP (Público)</label><input id="wlan_ip">
      <label>WLAN Máscara</label><input id="wlan_mask">
      <label>WLAN Gateway</label><input id="wlan_gw">
    </div>

    <div style="margin-top:10px;text-align:right">
      <button onclick="saveConfig()">Salvar</button>
      <button onclick="closeConfig()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const rede=document.getElementById('rede');
const svg=document.getElementById('cabos');
const consoleBox=document.getElementById('console');

let devices=[],links=[],mode='move',origem=null,cfgDevice=null;
let count={};

document.querySelectorAll('[data-add]').forEach(b=>count[b.dataset.add]=0);

function log(t){consoleBox.textContent+='\n'+t;consoleBox.scrollTop=consoleBox.scrollHeight;}
function center(d){return{x:d.offsetLeft+d.offsetWidth/2,y:d.offsetTop+d.offsetHeight/2};}

document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addDev(b.dataset.add));
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;origem=null;clearSelection();log('> modo: '+mode);});

function addDev(type){
  count[type]++;
  const d=document.createElement('div');
  d.className='dispositivo '+type;
  d.dataset.type=type;
  d.textContent=type.toUpperCase()+count[type];
  d.style.left=Math.random()*1200+'px';
  d.style.top=Math.random()*450+'px';
  d.onclick=()=>clickDev(d);
  d.ondblclick=()=>openConfig(d);
  drag(d);
  rede.appendChild(d);
  devices.push(d);
}

function clickDev(d){
  if(mode==='delete'){removeDev(d);return;}
  if(mode==='link'){
    if(!origem){origem=d;d.classList.add('selected');}
    else if(origem!==d){createLink(origem,d);origem.classList.remove('selected');origem=null;}
  }
}

/* GRAFO (INALTERADO) */
function createLink(a,b){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  updateLink(l,a,b);
  l.setAttribute('stroke','#000');
  l.setAttribute('stroke-width','2');
  l.onclick=e=>{e.stopPropagation();if(mode==='delete')removeLink(l);};
  svg.appendChild(l);links.push({a,b,l});
}
function updateLink(l,a,b){
  const p1=center(a),p2=center(b);
  l.setAttribute('x1',p1.x);l.setAttribute('y1',p1.y);
  l.setAttribute('x2',p2.x);l.setAttribute('y2',p2.y);
}
function drag(d){
  let ox,oy;
  d.onmousedown=e=>{
    if(mode!=='move')return;
    ox=e.offsetX;oy=e.offsetY;
    document.onmousemove=m=>{
      d.style.left=(m.pageX-rede.offsetLeft-ox)+'px';
      d.style.top=(m.pageY-rede.offsetTop-oy)+'px';
      links.forEach(x=>updateLink(x.l,x.a,x.b));
    };
    document.onmouseup=()=>document.onmousemove=null;
  };
}
function removeDev(d){
  links=links.filter(x=>{if(x.a===d||x.b===d){x.l.remove();return false;}return true;});
  devices=devices.filter(x=>x!==d);d.remove();
}
function removeLink(l){links=links.filter(x=>{if(x.l===l){l.remove();return false;}return true;});}
function clearSelection(){devices.forEach(d=>d.classList.remove('selected'));}
function resetAll(){svg.innerHTML='';devices.forEach(d=>d.remove());devices=[];links=[];origem=null;consoleBox.textContent='> console iniciado...';for(let k in count)count[k]=0;}

/* CONFIGURAÇÃO */
function openConfig(d){
  cfgDevice=d;
  cfg.style.display='flex';
  cfgTitle.textContent=d.textContent;

  const dual=['modem','firewall','router'].includes(d.dataset.type);
  wlanBlock.classList.toggle('hidden',!dual);

  lan_ip.value=d.dataset.lan_ip||'';
  lan_mask.value=d.dataset.lan_mask||'';
  lan_gw.value=d.dataset.lan_gw||'';

  wlan_ip.value=d.dataset.wlan_ip||'';
  wlan_mask.value=d.dataset.wlan_mask||'';
  wlan_gw.value=d.dataset.wlan_gw||'';
}
function closeConfig(){cfg.style.display='none';}
function saveConfig(){
  if(!cfgDevice)return;
  cfgDevice.dataset.lan_ip=lan_ip.value;
  cfgDevice.dataset.lan_mask=lan_mask.value;
  cfgDevice.dataset.lan_gw=lan_gw.value;
  cfgDevice.dataset.wlan_ip=wlan_ip.value;
  cfgDevice.dataset.wlan_mask=wlan_mask.value;
  cfgDevice.dataset.wlan_gw=wlan_gw.value;

  let html=cfgDevice.textContent.split('<')[0];
  if(wlan_ip.value) html+=`<br>WLAN ${wlan_ip.value}`;
  if(lan_ip.value) html+=`<br>LAN ${lan_ip.value}`;
  cfgDevice.innerHTML=html;
  closeConfig();
}

/* SALVAR */
function saveTopo(){
  const data={
    dispositivos:devices.map(d=>({
      tipo:d.dataset.type,nome:d.textContent,
      x:d.style.left,y:d.style.top,
      lan:{ip:d.dataset.lan_ip||'',mask:d.dataset.lan_mask||'',gw:d.dataset.lan_gw||''},
      wlan:{ip:d.dataset.wlan_ip||'',mask:d.dataset.wlan_mask||'',gw:d.dataset.wlan_gw||''}
    })),
    ligacoes:links.map(l=>({de:devices.indexOf(l.a),para:devices.indexOf(l.b)}))
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='topologia.json';
  a.click();
}
</script>
</body>
</html>
