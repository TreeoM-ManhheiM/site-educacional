<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>FluxoGame Python Pro — 20 Exercícios (DEBUGADO)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ 
    startOnLoad: false, 
    theme: "dark", 
    securityLevel: "loose",
    fontFamily: "monospace"
  });
  window.mermaid = mermaid;
</script>

<style>
  :root { --primary: #6366f1; --success: #22c55e; --bg: #0b0f17; --card-bg: #111827; --border: #1f2937; --text: #e5e7eb; }
  body{margin:0;font-family:system-ui,Arial;background:var(--bg);color:var(--text);overflow-x:hidden}
  header{padding: 12px 20px; border-bottom: 1px solid var(--border); background: #0f172a; display: flex; flex-wrap: wrap; align-items: center; gap: 20px; position: sticky; top: 0; z-index: 100;}
  .stats-container { display: flex; gap: 15px; align-items: center; background: #1e293b; padding: 6px 15px; border-radius: 20px; font-size: 14px; border: 1px solid var(--primary); }
  .xp-bar-bg { width: 120px; height: 10px; background: #334155; border-radius: 5px; overflow: hidden; }
  #xp-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s ease; }
  select{padding:8px;border-radius:8px;background:#020617;color:var(--text);border:1px solid #334155;cursor:pointer}
  .grid{display:grid;grid-template-columns:1.2fr 0.8fr;gap:16px;padding:16px;min-height:80vh}
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column}
  h2{margin-top:0;font-size:16px;color:#94a3b8;display:flex;justify-content:space-between}
  pre{background:#020617;padding:15px;border-radius:8px;overflow:auto;font-family:'Fira Code',monospace;font-size:14px;border:1px solid #1e293b;flex-grow:1;min-height: 400px; white-space: pre-wrap;}
  #mmd{background:#020617;border-radius:8px;padding:10px;cursor:pointer;min-height:450px;display:flex;justify-content:center;align-items:flex-start}
  .hint{color:#9ca3af;font-size:13px;margin-top:12px;padding:8px;background:#1e293b;border-radius:6px}
  button{background:#334155;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;transition: 0.2s}
  button:hover{background:var(--primary)}
  .badge { width: 35px; height: 35px; border-radius: 50%; background: #1f2937; display: flex; align-items: center; justify-content: center; filter: grayscale(1); opacity: 0.3; transition: 0.3s; border: 1px solid #374151; font-size: 18px; }
  .badge.earned { filter: grayscale(0); opacity: 1; background: #1e1b4b; border-color: var(--primary); box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <strong>FluxoGame 🔄 Master</strong>
  <div class="stats-container">
    <span id="lvl-display">Nível 1</span>
    <div class="xp-bar-bg"><div id="xp-fill"></div></div>
    <span id="xp-text">0 / 500 XP</span>
  </div>
  <select id="sel"></select>
  <div class="badges-row" id="badge-list" style="display:flex; gap:8px">
    <div class="badge" title="Iniciante" id="b1">🎯</div>
    <div class="badge" title="Lógico" id="b2">🧠</div>
    <div class="badge" title="Ciclo" id="b3">🔄</div>
    <div class="badge" title="Mestre" id="b4">🏆</div>
  </div>
  <button onclick="resetar()" style="margin-left:auto">Limpar Tela</button>
</header>

<main class="grid">
  <section class="card">
    <h2>Fluxograma Iterativo <span id="exercise-status" style="font-size:12px"></span></h2>
    <div id="mmd"></div>
    <div class="hint">🚀 <b>Como jogar:</b> Clique nos blocos do fluxograma na ordem lógica para construir o código Python ao lado.</div>
  </section>
  <section class="card">
    <h2>Código Python (Modo Loop)</h2>
    <pre id="code"></pre>
  </section>
</main>

<script>

    blocos: { s: '# Clima\n', w: 'while True:\n', l: '    t = float(input("Temp: "))\n', c: '    if t < 15: print("Frio")\n', d: '    else: print("Quente")\n', e: '# Verificado\n', q: '    if input("Sair? (s/n)") == "s": break\n', z: '# Fim' }
  },
  "19": {
    nome: "19. Metros para KM",
    fluxo: `flowchart TD\n A(["Início"]) --> L["while True:"]\n L --> B["Metros?"]\n B --> C["KM = M / 1000"]\n C --> D{"Sair?"}\n D -- "Não" --> L\n D -- "Sim" --> Z(["Fim"])\n click A call passo("s")\n click L call passo("w")\n click B call passo("l")\n click C call passo("c")\n click D call passo("q")\n click Z call passo("z")`,
    blocos: { s: '# Conversor\n', w: 'while True:\n', l: '    m = float(input("Metros: "))\n', c: '    k = m / 1000\n    print(f"{k} km")\n', q: '    if input("Sair? (s/n)") == "s": break\n', z: '# Fim' }
  },
  "20": {
    nome: "20. Conta de Luz",
    fluxo: `flowchart TD\n A(["Início"]) --> L["while True:"]\n L --> B["kWh e Bandeira"]\n B --> C{"Verde?"}\n C -- "Sim" --> D["Preço base"]\n C -- "Não" --> E["Acréscimo"]\n D --> F{"Sair?"}\n E --> F\n F -- "Não" --> L\n F -- "Sim" --> Z(["Fim"])\n click A call passo("s")\n click L call passo("w")\n click B call passo("l")\n click C call passo("c")\n click D call passo("d")\n click E call passo("e")\n click F call passo("q")\n click Z call passo("z")`,
    blocos: { s: '# Luz\n', w: 'while True:\n', l: '    k=float(input("kWh: ")); b=input("Cor: ")\n', c: '    if b=="verde": t=0.50\n', d: '    else: t=0.65\n', e: '    print(f"Total: {k*t:.2f}")\n', q: '    if input("Sair? (s/n)") == "s": break\n', z: '# Fim' }
  }
};

// =================== LÓGICA DE JOGO ===================
let game = JSON.parse(localStorage.getItem('flowgame_vDebug')) || { xp: 0, concluidos: [] };

function updateStats() {
  const lvl = Math.floor(game.xp / 500) + 1;
  const xpAtual = game.xp % 500;
  document.getElementById('lvl-display').innerText = `Nível ${lvl}`;
  document.getElementById('xp-text').innerText = `${xpAtual} / 500 XP`;
  document.getElementById('xp-fill').style.width = (xpAtual / 5) + "%";
  
  if(game.concluidos.length >= 1) document.getElementById('b1').classList.add('earned');
  if(game.concluidos.length >= 10) document.getElementById('b2').classList.add('earned');
  if(game.concluidos.length >= 20) document.getElementById('b4').classList.add('earned');
  if(game.xp >= 1000) document.getElementById('b3').classList.add('earned');

  localStorage.setItem('flowgame_vDebug', JSON.stringify(game));
}

const sel = document.getElementById('sel');
const mmd = document.getElementById('mmd');
const code = document.getElementById('code');
let atual = null; let usados = new Set();

for(const k in EX){
  const opt = document.createElement('option');
  opt.value = k; opt.textContent = EX[k].nome; sel.appendChild(opt);
}

async function render() {
  const k = sel.value; 
  atual = EX[k]; 
  usados.clear();
  code.textContent = "";
  
  const statusEl = document.getElementById('exercise-status');
  statusEl.textContent = game.concluidos.includes(k) ? "✅ Concluído" : "⏳ Pendente";
  statusEl.style.color = game.concluidos.includes(k) ? "#22c55e" : "#94a3b8";

  mmd.innerHTML = atual.fluxo;
  mmd.removeAttribute('data-processed');
  if(window.mermaid) await mermaid.run({ nodes: [mmd] });
}

window.passo = function(id) {
  if(!atual || usados.has(id)) return;
  const snippet = atual.blocos[id];
  if(snippet) {
    code.textContent += snippet;
    usados.add(id);
    // Rolagem automática do código
    code.scrollTop = code.scrollHeight;
    
    if(usados.size === Object.keys(atual.blocos).length) {
      if(!game.concluidos.includes(sel.value)) {
        game.xp += 100;
        game.concluidos.push(sel.value);
        updateStats();
        alert("Parabéns! Código construído com sucesso! +100 XP");
      }
      render();
    }
  }
};

window.resetar = () => {
    usados.clear();
    code.textContent = "";
    render();
};

sel.onchange = () => render();

updateStats();
setTimeout(render, 500);
</script>
