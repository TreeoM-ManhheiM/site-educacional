<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Fluxograma → Código (20 exercícios interativos)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ 
    startOnLoad: false, 
    theme: "dark", 
    securityLevel: "loose",
    fontFamily: "monospace"
  });
  window.mermaid = mermaid;
</script>

<style>
  body{margin:0;font-family:system-ui,Arial;background:#0b0f17;color:#e5e7eb;overflow-x:hidden}
  header{padding:12px 16px;border-bottom:1px solid #1f2937;background:#0f172a;display:flex;align-items:center;gap:12px}
  select{padding:8px;border-radius:8px;background:#020617;color:#e5e7eb;border:1px solid #334155;cursor:pointer}
  .grid{display:grid;grid-template-columns:1.2fr 0.8fr;gap:16px;padding:16px;min-height:85vh}
  .card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:16px;display:flex;flex-direction:column}
  h2{margin-top:0;font-size:18px;color:#94a3b8}
  pre{background:#020617;padding:15px;border-radius:8px;overflow:auto;font-family:'Fira Code',monospace;font-size:14px;border:1px solid #1e293b;flex-grow:1}
  #mmd{background:#020617;border-radius:8px;padding:10px;cursor:pointer;min-height:400px;display:flex;justify-content:center;align-items:flex-start}
  .hint{color:#9ca3af;font-size:13px;margin-top:12px;padding:8px;background:#1e293b;border-radius:6px}
  button{background:#334155;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600}
  button:hover{background:#475569}
  @media (max-width:800px){ .grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<header>
  <strong>Fluxograma → Código (20 exercícios)</strong>
  <select id="sel"></select>
  <button onclick="resetar()">Reiniciar</button>
</header>

<main class="grid">
  <section class="card">
    <h2>Fluxograma</h2>
    <div id="mmd"></div>
    <div class="hint">Dica: clique de cima para baixo (Início → ... → Fim). Cliques repetidos são ignorados.</div>
  </section>

  <section class="card">
    <h2>Código Python</h2>
    <pre id="code"></pre>
  </section>
</main>

<script>
// =================== BANCO DE DADOS DOS 20 EXERCÍCIOS ===================
const EX = {
  "01": {
    nome: "01. Par ou Ímpar",
    fluxo: `flowchart TD
      A(["Início"]) --> B["Leia N"]
      B --> C{"N % 2 == 0?"}
      C -- "Sim" --> D["Imprima Par"]
      C -- "Não" --> E["Imprima Ímpar"]
      D --> Z(["Fim"]) 
      E --> Z
      click A call passo("s")
      click B call passo("l")
      click C call passo("d")
      click D call passo("p")
      click E call passo("i")
      click Z call passo("f")`,
    blocos: { s: '# 01. Par ou Ímpar\n', l: 'n = int(input("N: "))\n', d: 'if n % 2 == 0:\n', p: '    print("Par")\n', i: 'else:\n    print("Ímpar")\n', f: '# Fim\n' }
  },

    nome: "02. Positivo, Negativo ou Zero",

      E -- "Sim" --> F["Imprima Zero"]
      E -- "Não" --> G["Imprima Negativo"]
      D --> Z(["Fim"]) 
      F --> Z
      G --> Z
      click A call passo("s")
      click B call passo("l")
      click C call passo("d1")
      click D call passo("pos")
      click E call passo("d2")
      click F call passo("zer")

  },
  "20": {
    nome: "20. Bandeira Tarifária",
    fluxo: `flowchart TD
      A(["Início"]) --> B["Leia cons, band"]
      B --> C{"Verde?"}
      C -- "Sim" --> D["Tarifa Base"]
      C -- "Não" --> E{"Amarela?"}
      E -- "Sim" --> F["Base + 0.018"]
      E -- "Não" --> G["Base + 0.039"]
      D --> H["Total = cons * tarifa"]
      F --> H
      G --> H
      H --> Z(["Fim"]) 
      click A call passo("s")
      click B call passo("l")
      click C call passo("d1")
      click D call passo("tv")
      click E call passo("d2")
      click F call passo("ta")
      click G call passo("tr")
      click H call passo("tot")
      click Z call passo("f")`,
    blocos: { s: '# 20. Conta de Luz\n', l: 'c = float(input("kWh: "))\nb = input("Bandeira: ").lower()\nbase = 0.50\n', d1: 'if b == "verde":\n', tv: '    t = base\n', d2: 'elif b == "amarela":\n', ta: '    t = base + 0.018\n', tr: 'else:\n    t = base + 0.039\n', tot: 'print(f"Total: R$ {c * t:.2f}")\n', f: '# Fim\n' }
  }
};

// =================== LÓGICA DE FUNCIONAMENTO ===================
const sel = document.getElementById('sel');
const mmd = document.getElementById('mmd');
const code = document.getElementById('code');
let atual = null;
let usados = new Set();

// Preencher o select
for(const k in EX){
  const opt = document.createElement('option');
  opt.value = k;
  opt.textContent = EX[k].nome;
  sel.appendChild(opt);
}

// Função para renderizar o fluxograma
async function render() {
  const k = sel.value;
  atual = EX[k];
  usados.clear();
  code.textContent = "";
  
  mmd.innerHTML = atual.fluxo;
  mmd.removeAttribute('data-processed');
  
  if(window.mermaid) {
    await mermaid.run({ nodes: [mmd] });
  }
}

// Função chamada pelo clique no Mermaid
window.passo = function(id) {
  if(!atual || usados.has(id)) return;
  
  const snippet = atual.blocos[id];
  if(snippet) {
    code.textContent += snippet;
    usados.add(id);
    // Auto-scroll do código
    code.scrollTop = code.scrollHeight;
  }
};

function resetar() {
  render();
}

sel.addEventListener('change', render);

// Inicialização atrasada para garantir que o Mermaid carregou
setTimeout(render, 500);

</script>
