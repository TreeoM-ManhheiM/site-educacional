<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Fluxograma → Código</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ Mermaid GLOBAL -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: "dark",
    securityLevel: "loose"
  });
</script>

<style>
body{margin:0;font-family:system-ui;background:#0b0f17;color:#e5e7eb}
header{padding:12px;border-bottom:1px solid #1f2937}
.container{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px}
pre{background:#020617;padding:12px;border-radius:8px}
</style>
</head>

<body>

<header>
<select id="sel">
  <option value="01">01. Par ou Ímpar</option>
  <option value="02">02. Positivo / Negativo</option>
</select>
</header>

<div class="container">
  <div class="card">
    <pre class="mermaid" id="mmd"></pre>
  </div>
  <div class="card">
    <pre id="code"># clique no fluxograma</pre>
  </div>
</div>

<script>
const EX = {

"01": `
flowchart TD
A(["Início"])-->B["Leia N"]
B-->C{"N é par?"}
C--"Sim"-->D["Par"]
C--"Não"-->E["Ímpar"]
D-->F(["Fim"])
E-->F

click A call passo("a")
click B call passo("b")
click C call passo("c")
click D call passo("d")
click E call passo("e")
click F call passo("f")
`,

"02": `
flowchart TD
A(["Início"])-->B["Leia X"]
B-->C{"X é positivo?"}
C--"Sim"-->D["Positivo"]
C--"Não"-->E["Negativo"]
D-->F(["Fim"])
E-->F

click A call passo("a")
click B call passo("b")
click C call passo("c")
click D call passo("d")
click E call passo("e")
click F call passo("f")
`
};

const codeBox = document.getElementById("code");
const mmd = document.getElementById("mmd");
const used = new Set();

window.passo = function(id){
  if(used.has(id)) return;
  used.add(id);
  codeBox.textContent += `# passo ${id}\n`;
};

function carregar(id){
  used.clear();
  codeBox.textContent="# exercício "+id+"\n\n";
  mmd.textContent = EX[id];
  mermaid.run({ querySelector:"#mmd" });
}

document.getElementById("sel").onchange = e => carregar(e.target.value);
carregar("01");
</script>

</body>
</html>
``
