<style>

<body>

<header>
  <strong>Fluxograma → Código (20 exercícios interativos)</strong><br>
  <label>Exercício:</label>
  <select id="sel"></select>
  <button id="reset">Reiniciar</button>
</header>

<div class="grid">

  </div>

  <div class="card">

    <pre id="code"># Selecione um exercício e clique no fluxograma</pre>

</div>

click G call passo("ta")
click H call passo("tr")
click I call passo("f")`,
  blocos:{
    s:'# Início\n',
    co:'cons=float(input("Consumo (kWh): "))\n',
    ba:'bandeira=input("Bandeira (verde/amarela/vermelha): ").strip().lower()\nbase=0.5\n',
    d1:'if bandeira=="verde":\n',
    tv:'    print(cons*base)\n',
    d2:'elif bandeira=="amarela":\n',
    ta:'    print(cons*(base+0.018))\n',
    tr:'else:\n    print(cons*(base+0.039))\n',
    f:'# Fim\n'
  }
}

};
// ==================================================

const sel = document.getElementById('sel');
const mmd = document.getElementById('mmd');
const code = document.getElementById('code');
let atual=null, usados=new Set();

for(const k of Object.keys(EX)){
  const o=document.createElement('option');
  o.value=k; o.textContent=EX[k].nome; sel.appendChild(o);
}

window.passo = function(id){
  if(usados.has(id)) return;
  usados.add(id);
  code.textContent += (atual.blocos[id]||'');
}

function carregar(id){
  atual = EX[id];
  usados.clear();
  code.textContent = '# '+atual.nome+'\n\n';
  mmd.textContent = atual.fluxo;
  mermaid.run({ querySelector:'#mmd' });
}

document.getElementById('reset').addEventListener('click', ()=>{ if(sel.value) carregar(sel.value); });
sel.addEventListener('change', e=>carregar(e.target.value));

// inicial
sel.value = '01';
carregar('01');
</script>
