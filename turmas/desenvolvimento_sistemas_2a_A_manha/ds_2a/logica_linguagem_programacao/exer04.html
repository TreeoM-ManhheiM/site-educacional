<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Fluxograma → Código (12 exemplos)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ MERMAID GLOBAL (ESSENCIAL) -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: "dark",
    securityLevel: "loose"
  });
</script>

<style>
body{margin:0;font-family:system-ui;background:#0b0f17;color:#e5e7eb}
header{padding:12px;border-bottom:1px solid #1f2937}
select{padding:8px;border-radius:8px;background:#020617;color:#e5e7eb}
.container{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px}
pre{background:#020617;padding:12px;border-radius:8px;overflow:auto}
</style>
</head>

<body>

<header>
<label>Exercício:</label>
<select id="sel"></select>
</header>

<div class="container">
  <div class="card">
    <pre class="mermaid" id="mmd"></pre>
  </div>
  <div class="card">
    <pre id="code"># clique no fluxograma</pre>
  </div>
</div>

<script>
const EX = {

"01":{
nome:"01. Par ou Ímpar",
fluxo:`flowchart TD
A(["Início"])-->B["Leia N"]
B-->C{"N é par?"}
C--"Sim"-->D["Par"]
C--"Não"-->E["Ímpar"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("p")
click E call passo("i")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'n=int(input("N: "))\n',
d:"if n % 2 == 0:\n",
p:'    print("Par")\n',
i:'else:\n    print("Ímpar")\n',
f:"# Fim\n"
}
},

"02":{
nome:"02. Positivo ou Negativo",
fluxo:`flowchart TD
A(["Início"])-->B["Leia X"]
B-->C{"X é positivo?"}
C--"Sim"-->D["Positivo"]
C--"Não"-->E["Negativo"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("p")
click E call passo("n")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'x=int(input("X: "))\n',
d:"if x > 0:\n",
p:'    print("Positivo")\n',
n:'else:\n    print("Negativo")\n',
f:"# Fim\n"
}
},

"03":{
nome:"03. Maior de Dois",
fluxo:`flowchart TD
A(["Início"])-->B["Leia A e B"]
B-->C{"A é maior?"}
C--"Sim"-->D["A maior"]
C--"Não"-->E["B maior"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("a")
click E call passo("b")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'a=int(input("A: "))\nb=int(input("B: "))\n',
d:"if a > b:\n",
a:'    print("A maior")\n',
b:'else:\n    print("B maior")\n',
f:"# Fim\n"
}
},

"04":{
nome:"04. Aprovado ou Reprovado",
fluxo:`flowchart TD
A(["Início"])-->B["Leia Nota"]
B-->C{"Nota suficiente?"}
C--"Sim"-->D["Aprovado"]
C--"Não"-->E["Reprovado"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("a")
click E call passo("r")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'nota=float(input("Nota: "))\n',
d:"if nota >= 6:\n",
a:'    print("Aprovado")\n',
r:'else:\n    print("Reprovado")\n',
f:"# Fim\n"
}
},

"05":{
nome:"05. Pode Dirigir?",
fluxo:`flowchart TD
A(["Início"])-->B["Leia Idade"]
B-->C{"Maior de idade?"}
C--"Sim"-->D["Pode dirigir"]
C--"Não"-->E["Não pode"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("p")
click E call passo("n")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'idade=int(input("Idade: "))\n',
d:"if idade >= 18:\n",
p:'    print("Pode dirigir")\n',
n:'else:\n    print("Não pode dirigir")\n',
f:"# Fim\n"
}
},

"06":{
nome:"06. Maior que 10",
fluxo:`flowchart TD
A(["Início"])-->B["Leia N"]
B-->C{"Maior que 10?"}
C--"Sim"-->D["Maior"]
C--"Não"-->E["Menor ou igual"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("m")
click E call passo("o")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'n=int(input("N: "))\n',
d:"if n > 10:\n",
m:'    print("Maior que 10")\n',
o:'else:\n    print("Menor ou igual a 10")\n',
f:"# Fim\n"
}
},

"07":{
nome:"07. Faixa Etária",
fluxo:`flowchart TD
A(["Início"])-->B["Leia idade"]
B-->C{"Criança?"}
C--"Sim"-->D["Criança"]
C--"Não"-->E["Adulto"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("c")
click E call passo("a")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'i=int(input("Idade: "))\n',
d:"if i < 12:\n",
c:'    print("Criança")\n',
a:'else:\n    print("Adulto")\n',
f:"# Fim\n"
}
},

"08":{
nome:"08. Login Simples",
fluxo:`flowchart TD
A(["Início"])-->B["Leia usuário"]
B-->C["Leia senha"]
C-->D{"Confere?"}
D--"Sim"-->E["Acesso liberado"]
D--"Não"-->F["Acesso negado"]
E-->G(["Fim"])
F-->G
click A call passo("s")
click B call passo("u")
click C call passo("p")
click D call passo("d")
click E call passo("o")
click F call passo("n")
click G call passo("f")`,
blocos:{
s:"# Início\n",
u:'u=input("Usuário: ")\n',
p:'s=input("Senha: ")\n',
d:'if u=="admin" and s=="123":\n',
o:'    print("Acesso liberado")\n',
n:'else:\n    print("Acesso negado")\n',
f:"# Fim\n"
}
},

"09":{
nome:"09. É Fim de Semana?",
fluxo:`flowchart TD
A(["Início"])-->B["Leia dia"]
B-->C{"Fim de semana?"}
C--"Sim"-->D["Fim de semana"]
C--"Não"-->E["Dia útil"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("f1")
click E call passo("d1")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'dia=input("Dia: ").lower()\n',
d:'if dia in ("sab","dom"):\n',
f1:'    print("Fim de semana")\n',
d1:'else:\n    print("Dia útil")\n',
f:"# Fim\n"
}
},

"10":{
nome:"10. Conceito por Nota",
fluxo:`flowchart TD
A(["Início"])-->B["Leia nota"]
B-->C{"Nota suficiente?"}
C--"Sim"-->D["Bom"]
C--"Não"-->E["Ruim"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("b")
click E call passo("r")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'n=float(input("Nota: "))\n',
d:"if n >= 7:\n",
b:'    print("Bom")\n',
r:'else:\n    print("Ruim")\n',
f:"# Fim\n"
}
},

"11":{
nome:"11. Temperatura",
fluxo:`flowchart TD
A(["Início"])-->B["Leia temperatura"]
B-->C{"Alta?"}
C--"Sim"-->D["Febre"]
C--"Não"-->E["Normal"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("f1")
click E call passo("n1")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'t=float(input("Temp: "))\n',
d:'if t > 37.8:\n',
f1:'    print("Febre")\n',
n1:'else:\n    print("Normal")\n',
f:"# Fim\n"
}
},

"12":{
nome:"12. Desconto",
fluxo:`flowchart TD
A(["Início"])-->B["Leia preço"]
B-->C{"À vista?"}
C--"Sim"-->D["Com desconto"]
C--"Não"-->E["Sem desconto"]
D-->F(["Fim"])
E-->F
click A call passo("s")
click B call passo("l")
click C call passo("d")
click D call passo("c")
click E call passo("s1")
click F call passo("f")`,
blocos:{
s:"# Início\n",
l:'p=float(input("Preço: "))\n',
d:'if True:\n',
c:'    print("Com desconto")\n',
s1:'else:\n    print("Sem desconto")\n',
f:"# Fim\n"
}
}

};

const sel=document.getElementById("sel");
const mmd=document.getElementById("mmd");
const code=document.getElementById("code");
let atual=null, usados=new Set();

for(const k in EX){
  const o=document.createElement("option");
  o.value=k; o.textContent=EX[k].nome;
  sel.appendChild(o);
}

window.passo=function(id){
  if(usados.has(id)) return;
  usados.add(id);
  code.textContent+=atual.blocos[id];
};

function carregar(id){
  atual=EX[id];
  usados.clear();
  code.textContent="# "+atual.nome+"\n\n";
  mmd.textContent=atual.fluxo;
  mermaid.run({ querySelector:"#mmd" });
}

sel.onchange = e => carregar(e.target.value);
carregar("01");
</script>

</body>
</html>
