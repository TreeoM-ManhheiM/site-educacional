<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, user-scalable=no" />
  <title>Pinball Arcade — 2.5D Frente Fixa</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #03060c;
      font-family: 'Segoe UI', 'Orbitron', system-ui, monospace;
      touch-action: none; /* ajuda no mobile */
    }

    /* HUD estilo neon arcade */
    #hud {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 12px 20px;
      border: 1px solid rgba(0, 255, 255, 0.35);
      box-shadow: 0 0 12px rgba(0, 180, 255, 0.2);
      font-weight: bold;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
    }
    .hud-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: baseline;
    }
    .stat {
      background: #0a0f1a;
      padding: 6px 14px;
      border-radius: 40px;
      border-left: 3px solid #0ff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    .stat span {
      font-size: 12px;
      color: #8ab3ff;
      margin-right: 8px;
    }
    .stat b {
      font-size: 22px;
      color: #f0f9ff;
      text-shadow: 0 0 5px #0af;
    }
    #hint {
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.85;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-family: monospace;
    }
    kbd {
      background: #11161f;
      border-radius: 8px;
      padding: 3px 8px;
      font-weight: bold;
      color: #0ff;
      border: 1px solid #2a4c7a;
      margin: 0 3px;
      font-size: 11px;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a1428ee;
      backdrop-filter: blur(12px);
      padding: 8px 20px;
      border-radius: 60px;
      color: #c6f0ff;
      border: 1px solid cyan;
      font-size: 14px;
      font-weight: bold;
      z-index: 25;
      white-space: nowrap;
      font-family: monospace;
      transition: 0.2s;
      pointer-events: none;
      opacity: 0;
    }

    .controls-panel {
      position: fixed;
      bottom: 18px;
      right: 18px;
      background: rgba(0,0,0,0.5);
      border-radius: 24px;
      padding: 8px 16px;
      font-size: 10px;
      font-family: monospace;
      color: #8dd0ff;
      backdrop-filter: blur(6px);
      border: 0.5px solid #2f5f8f;
      z-index: 20;
    }

    /* Controles touch */
    #touchControls {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      display: none; /* aparece só em pointer coarse */
      gap: 10px;
      justify-content: space-between;
      z-index: 30;
      pointer-events: none;
    }
    .touchBtn {
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      width: 32%;
      height: 64px;
      border-radius: 22px;
      border: 1px solid rgba(0,255,255,0.35);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      color: #bff6ff;
      font-family: monospace;
      font-weight: 800;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(0,180,255,0.15);
    }
    .touchBtn:active {
      transform: translateY(1px);
      filter: brightness(1.1);
    }

    /* Barra do plunger */
    #plungerBarWrap{
      margin-top: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(0,255,255,0.22);
      overflow: hidden;
    }
    #plungerBar{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ccff, #ff44aa);
      box-shadow: 0 0 10px rgba(0,255,255,0.35);
      transition: width 0.05s linear;
    }
  </style>
</head>

<body>
  <div id="hud">
    <div class="hud-row">
      <div class="stat"><span>🎯 SCORE</span> <b id="score">0</b></div>
      <div class="stat"><span>💥 BALLS</span> <b id="balls">3</b></div>
      <div class="stat"><span>⚡ MULTI</span> <b id="multiplier">1x</b></div>
    </div>

    <div id="plungerBarWrap" title="Plunger (segure para carregar)">
      <div id="plungerBar"></div>
    </div>

    <div id="hint">
      <span>🕹️ <kbd>←</kbd> <kbd>→</kbd> FLIPPERS</span>
      <span>🚀 <kbd>SPACE</kbd> PLUNGER (SEGURE/SOLTE)</span>
      <span>🔄 <kbd>R</kbd> RESET</span>
      <span>⏸️ <kbd>P</kbd> PAUSE</span>
    </div>
  </div>

  <div id="toast"></div>

  <div class="controls-panel">
    🎮 VIEW: FRONT FIXED (2.5D) • PINBALL CLASSIC
  </div>

  <div id="touchControls">
    <div class="touchBtn" id="btnLeft">⟵ FLIP</div>
    <div class="touchBtn" id="btnLaunch">HOLD • LAUNCH</div>
    <div class="touchBtn" id="btnRight">FLIP ⟶</div>
  </div>

  <!-- Import Three.js via importmap -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

    // ---------- UI Elements ----------
    const scoreEl = document.getElementById('score');
    const ballsEl = document.getElementById('balls');
    const multEl  = document.getElementById('multiplier');
    const toastDiv = document.getElementById('toast');
    const plungerBar = document.getElementById('plungerBar');

    // Touch
    const touchWrap = document.getElementById('touchControls');
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    const btnLaunch = document.getElementById('btnLaunch');

    const isCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
    if (isCoarsePointer) touchWrap.style.display = 'flex';

    let showToastTimer = null;
    function showMessage(msg, duration = 1300) {
      toastDiv.textContent = msg;
      toastDiv.style.opacity = '1';
      if (showToastTimer) clearTimeout(showToastTimer);
      showToastTimer = setTimeout(() => toastDiv.style.opacity = '0', duration);
    }

    // ---------- CONFIG ----------
    const CFG = {
      tilt: 0.19,            // agora tilt é aplicado via gravidade (robusto)
      gravity: 17.2,
      restitution: 0.56,
      friction: 0.085,
      ballRadius: 0.19,
      flipper: {
        length: 1.08,
        width: 0.24,
        height: 0.13,
        maxForce: 80,     // mais firme
        speedUp: 24,
        speedDown: -18
      },
      plunger: {
        maxCharge: 1.0,      // 0..1
        chargeRate: 0.75,    // por segundo
        minZ: -8.0,
        maxZ: -14.0,
        minY: 1.6,
        maxY: 4.0,
        xJitter: 0.45
      },
      table: { w: 6.4, h: 10.8, wall: 0.38, drainGap: 1.25 }
    };

    // ---------- Three.js ----------
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setClearColor(0x03060c, 1);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x03060c, 0.025);

    // CÂMERA FIXA
    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 60);
    camera.position.set(0, 5.5, 12.6);
    camera.lookAt(0, 1.2, 0);

    // Luzes
    const ambient = new THREE.AmbientLight(0x222a44, 0.45);
    scene.add(ambient);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
    mainLight.position.set(4, 9, 5);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);

    const fillLight = new THREE.PointLight(0x4466cc, 0.65);
    fillLight.position.set(-2, 3.5, 4);
    scene.add(fillLight);

    const backRim = new THREE.PointLight(0xff44aa, 0.55);
    backRim.position.set(0, 2.5, -5);
    scene.add(backRim);

    const neonUnder = new THREE.PointLight(0x00ccff, 0.9);
    neonUnder.position.set(0, -0.5, 0);
    scene.add(neonUnder);

    const gridHelper = new THREE.GridHelper(20, 20, 0x00aaff, 0x3366aa);
    gridHelper.position.y = -1.8;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.25;
    scene.add(gridHelper);

    // ---------- Cannon ----------
    const world = new CANNON.World();
    // Broadphase melhor que Naive
    world.broadphase = new CANNON.SAPBroadphase(world);
    world.allowSleep = true;
    world.solver.iterations = 20;

    // Tilt robusto: NÃO inclina plano físico. Inclina a gravidade no eixo Z (descida para +Z)
    const g = CFG.gravity;
    const t = CFG.tilt;
    world.gravity.set(0, -g * Math.cos(t), +g * Math.sin(t));

    const matBall = new CANNON.Material('ball');
    const matTable = new CANNON.Material('table');
    const matBumper = new CANNON.Material('bumper');
    const matFlipper = new CANNON.Material('flipper');

    world.addContactMaterial(new CANNON.ContactMaterial(matBall, matTable, {
      friction: 0.07, restitution: CFG.restitution,
      contactEquationStiffness: 1e8, contactEquationRelaxation: 3
    }));
    world.addContactMaterial(new CANNON.ContactMaterial(matBall, matBumper, {
      friction: 0.02, restitution: 0.86,
      contactEquationStiffness: 1e8, contactEquationRelaxation: 3
    }));
    world.addContactMaterial(new CANNON.ContactMaterial(matBall, matFlipper, {
      friction: 0.045, restitution: 0.62, // um pouco menos elástico => mais estável
      contactEquationStiffness: 1e8, contactEquationRelaxation: 4
    }));

    // ---------- Mesa visual + física ----------
    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    // Playfield agora RETO (tilt é via gravidade, evita inconsistência)
    const playfieldMat = new THREE.MeshStandardMaterial({
      color: 0x0b1426, metalness: 0.7, roughness: 0.45,
      emissive: 0x001133, emissiveIntensity: 0.28
    });
    const playfieldPlane = new THREE.Mesh(new THREE.PlaneGeometry(CFG.table.w, CFG.table.h), playfieldMat);
    playfieldPlane.rotation.x = -Math.PI / 2;
    playfieldPlane.position.y = 0;
    playfieldPlane.receiveShadow = true;
    tableGroup.add(playfieldPlane);

    const borderMat = new THREE.MeshStandardMaterial({
      color: 0x0a1120, metalness: 0.9, emissive: 0x0a4c6e, emissiveIntensity: 0.45
    });

    const drainGap = CFG.table.drainGap;
    const halfW = CFG.table.w / 2;
    const halfH = CFG.table.h / 2;

    // Bordas visuais
    const borderL = new THREE.Mesh(new THREE.BoxGeometry(CFG.table.wall, 0.5, CFG.table.h), borderMat);
    borderL.position.set(-halfW - CFG.table.wall/2, 0.2, 0);
    borderL.castShadow = true;
    tableGroup.add(borderL);

    const borderR = new THREE.Mesh(new THREE.BoxGeometry(CFG.table.wall, 0.5, CFG.table.h), borderMat);
    borderR.position.set(halfW + CFG.table.wall/2, 0.2, 0);
    borderR.castShadow = true;
    tableGroup.add(borderR);

    const borderTop = new THREE.Mesh(new THREE.BoxGeometry(CFG.table.w + CFG.table.wall*2, 0.5, CFG.table.wall), borderMat);
    borderTop.position.set(0, 0.2, -halfH - CFG.table.wall/2);
    borderTop.castShadow = true;
    tableGroup.add(borderTop);

    const leftDrainBlock = new THREE.Mesh(new THREE.BoxGeometry((CFG.table.w - drainGap)/2, 0.5, CFG.table.wall), borderMat);
    leftDrainBlock.position.set(-(drainGap/2 + (CFG.table.w - drainGap)/4), 0.2, halfH + CFG.table.wall/2);
    tableGroup.add(leftDrainBlock);

    const rightDrainBlock = new THREE.Mesh(new THREE.BoxGeometry((CFG.table.w - drainGap)/2, 0.5, CFG.table.wall), borderMat);
    rightDrainBlock.position.set((drainGap/2 + (CFG.table.w - drainGap)/4), 0.2, halfH + CFG.table.wall/2);
    tableGroup.add(rightDrainBlock);

    // Paredes físicas
    function addWallBox(w, h, d, x, y, z, material = matTable) {
      const body = new CANNON.Body({ mass: 0, material });
      body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
      body.position.set(x, y, z);
      world.addBody(body);
      return body;
    }
    addWallBox(CFG.table.wall, 0.8, CFG.table.h, -halfW - CFG.table.wall/2, 0.35, 0);
    addWallBox(CFG.table.wall, 0.8, CFG.table.h,  halfW + CFG.table.wall/2, 0.35, 0);
    addWallBox(CFG.table.w + CFG.table.wall*2, 0.8, CFG.table.wall, 0, 0.35, -halfH - CFG.table.wall/2);
    addWallBox((CFG.table.w-drainGap)/2, 0.8, CFG.table.wall,
      -(drainGap/2 + (CFG.table.w-drainGap)/4), 0.35, halfH + CFG.table.wall/2
    );
    addWallBox((CFG.table.w-drainGap)/2, 0.8, CFG.table.wall,
      +(drainGap/2 + (CFG.table.w-drainGap)/4), 0.35, halfH + CFG.table.wall/2
    );

    // Plano físico horizontal
    const tablePlanePhys = new CANNON.Body({ mass: 0, material: matTable });
    tablePlanePhys.addShape(new CANNON.Plane());
    tablePlanePhys.quaternion.setFromEuler(-Math.PI/2, 0, 0);
    world.addBody(tablePlanePhys);

    // ---------- BUMPERS ----------
    const bumpersList = [];
    const bumperMeshes = [];
    const bumperPositions = [
      { x: -2.05, z: -2.4, r: 0.38, pts: 70,  color: 0x0af,    emColor: 0x00ddff },
      { x: 0,     z: -2.9, r: 0.42, pts: 100, color: 0xf0f,    emColor: 0xff44ee },
      { x: 2.1,   z: -2.35,r: 0.38, pts: 70,  color: 0x0af,    emColor: 0x88ff44 },
      { x: 0,     z: -4.5, r: 0.45, pts: 150, color: 0xffaa33, emColor: 0xffaa33 },
      { x: -1.2,  z: -1.1, r: 0.32, pts: 55,  color: 0x66ccff, emColor: 0x2288ff },
      { x: 1.3,   z: -1.05,r: 0.32, pts: 55,  color: 0x66ccff, emColor: 0x2288ff },
    ];

    bumperPositions.forEach((b) => {
      const body = new CANNON.Body({ mass: 0, material: matBumper });
      body.addShape(new CANNON.Sphere(b.r));
      body.position.set(b.x, 0.4, b.z);
      world.addBody(body);
      bumpersList.push({ body, pts: b.pts });

      const cylinderGeo = new THREE.CylinderGeometry(b.r * 0.92, b.r, 0.28, 24);
      const materialCyl = new THREE.MeshStandardMaterial({
        color: b.color, emissive: b.emColor, emissiveIntensity: 0.65, metalness: 0.4
      });
      const mesh = new THREE.Mesh(cylinderGeo, materialCyl);
      mesh.position.set(b.x, 0.2, b.z);
      mesh.castShadow = true;
      tableGroup.add(mesh);
      bumperMeshes.push(mesh);
    });

    // ---------- FLIPPERS ----------
    function createFlipper(isLeft = true) {
      const len = CFG.flipper.length;
      const w = CFG.flipper.width;
      const h = CFG.flipper.height;

      const colorMat = isLeft ? 0x2a6f9f : 0x9f3f8a;
      const emissiveCol = isLeft ? 0x0088aa : 0xff44aa;

      const meshGeo = new THREE.BoxGeometry(len, h, w);
      const meshMat = new THREE.MeshStandardMaterial({
        color: colorMat, metalness: 0.75, emissive: emissiveCol, emissiveIntensity: 0.45
      });
      const mesh = new THREE.Mesh(meshGeo, meshMat);
      mesh.castShadow = true;
      tableGroup.add(mesh);

      // (C) estabilidade: corpo com massa moderada + sleep
      const body = new CANNON.Body({ mass: 0.85, material: matFlipper });
      body.addShape(new CANNON.Box(new CANNON.Vec3(len/2, h/2, w/2)));
      body.allowSleep = true;

      const baseX = isLeft ? -1.05 : 1.05;
      const baseZ = 3.85;
      body.position.set(baseX, 0.23, baseZ);
      world.addBody(body);

      const pivotBody = new CANNON.Body({ mass: 0, material: matTable });
      pivotBody.addShape(new CANNON.Sphere(0.06));
      const pivotOffsetX = isLeft ? -len/2 + 0.18 : len/2 - 0.18;
      pivotBody.position.set(baseX + pivotOffsetX, 0.23, baseZ);
      world.addBody(pivotBody);

      const localPivot = new CANNON.Vec3(isLeft ? -len/2 + 0.18 : len/2 - 0.18, 0, 0);

      const hinge = new CANNON.HingeConstraint(body, pivotBody, {
        pivotA: localPivot,
        axisA: new CANNON.Vec3(0, 1, 0),
        pivotB: new CANNON.Vec3(0, 0, 0),
        axisB: new CANNON.Vec3(0, 1, 0)
      });

      const lowAngle  = isLeft ? -0.72 : -0.22;
      const highAngle = isLeft ?  0.22 :  0.72;
      hinge.setLimits(lowAngle, highAngle, 0.01);
      hinge.enableMotor();
      hinge.setMotorMaxForce(CFG.flipper.maxForce);
      hinge.setMotorSpeed(0);
      world.addConstraint(hinge);

      return { mesh, body, hinge, isLeft, pivotBody };
    }

    const leftFlipper = createFlipper(true);
    const rightFlipper = createFlipper(false);

    // ---------- BOLA ----------
    const ballMeshGeo = new THREE.SphereGeometry(CFG.ballRadius, 48, 48);
    const ballMaterial = new THREE.MeshStandardMaterial({
      color: 0xeef5ff, metalness: 0.92, roughness: 0.12, emissive: 0x2266aa, emissiveIntensity: 0.2
    });
    const ballMesh = new THREE.Mesh(ballMeshGeo, ballMaterial);
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    scene.add(ballMesh);

    const ballBodyPhys = new CANNON.Body({
      mass: 0.6,
      material: matBall,
      linearDamping: 0.10,
      angularDamping: 0.28
    });
    ballBodyPhys.addShape(new CANNON.Sphere(CFG.ballRadius));
    ballBodyPhys.allowSleep = true;
    ballBodyPhys.sleepSpeedLimit = 0.08;
    ballBodyPhys.sleepTimeLimit = 0.2;
    world.addBody(ballBodyPhys);

    // ---------- Estado do jogo ----------
    let score = 0;
    let ballsLeft = 3;
    let multiplier = 1;
    let paused = false;

    let comboTimeout = null;
    let comboCount = 0;

    // Plunger
    let plungerCharging = false;
    let plungerCharge = 0; // 0..1
    let plungerLastTime = performance.now();

    function updateUI() {
      scoreEl.textContent = score;
      ballsEl.textContent = ballsLeft;
      multEl.textContent = `${multiplier}x`;
      plungerBar.style.width = `${Math.round(plungerCharge * 100)}%`;
    }

    function resetBallToLauncher() {
      ballBodyPhys.velocity.set(0, 0, 0);
      ballBodyPhys.angularVelocity.set(0, 0, 0);
      ballBodyPhys.position.set(2.2, 0.5, halfH - 1.15); // ~4.25
      plungerCharge = 0;
      plungerCharging = false;
      updateUI();
    }

    function resetGame() {
      score = 0;
      ballsLeft = 3;
      multiplier = 1;
      comboCount = 0;
      paused = false;
      updateUI();
      resetBallToLauncher();
      showMessage("RESET ⚡ Novo jogo!", 1100);
    }

    function loseBall() {
      if (paused) return;
      ballsLeft--;
      updateUI();
      if (ballsLeft <= 0) {
        paused = true;
        showMessage(`GAME OVER! Pontuação final: ${score} 🏆`, 2800);
      } else {
        showMessage("💔 Bola perdida! Próxima...", 1100);
        resetBallToLauncher();
      }
    }

    function addPoints(basePoints) {
      if (paused) return;
      const gained = basePoints * multiplier;
      score += gained;
      updateUI();
      showMessage(`+${gained} pts!`, 500);

      comboCount++;
      if (comboCount >= 3) {
        multiplier = Math.min(multiplier + 1, 5);
        showMessage(`COMBO x${multiplier}! 🔥`, 650);
        comboCount = 0;
      }
      if (multiplier > 1 && comboTimeout) clearTimeout(comboTimeout);
      comboTimeout = setTimeout(() => {
        multiplier = 1;
        comboCount = 0;
        updateUI();
      }, 3200);
    }

    // Colisão com bumpers
    ballBodyPhys.addEventListener('collide', (e) => {
      const other = e.body;
      for (let i = 0; i < bumpersList.length; i++) {
        if (other === bumpersList[i].body) {
          addPoints(bumpersList[i].pts);

          // impulso extra com controle (menos "explodido" que antes)
          const normal = e.contact.ni.clone();
          const impulseVec = new CANNON.Vec3(-normal.x, (-normal.y + 0.65), -normal.z);
          impulseVec.scale(2.0, impulseVec);
          ballBodyPhys.velocity.vadd(impulseVec, ballBodyPhys.velocity);

          // flash visual
          const mat = bumperMeshes[i]?.material;
          if (mat) {
            const old = mat.emissiveIntensity;
            mat.emissiveIntensity = 1.25;
            setTimeout(() => { if (mat) mat.emissiveIntensity = old; }, 140);
          }
          break;
        }
      }
    });

    // (A) Dreno e out-of-bounds mais coerente com tamanho da mesa
    function checkDrain() {
      const pos = ballBodyPhys.position;

      // caiu abaixo da mesa
      if (pos.y < -1.2) {
        if (ballsLeft > 0 && !paused) loseBall();
        return;
      }

      // passou do fundo da mesa (lado do drain) — z grande
      const drainLineZ = halfH + 1.25; // margem após a parede inferior
      if (pos.z > drainLineZ) {
        if (ballsLeft > 0 && !paused) loseBall();
        else {
          ballBodyPhys.velocity.set(0,0,0);
          ballBodyPhys.position.set(0, 2, 0);
        }
      }

      // segurança lateral
      const maxX = halfW + 0.9;
      if (Math.abs(pos.x) > maxX) {
        ballBodyPhys.position.x = Math.sign(pos.x) * (maxX - 0.2);
      }
    }
