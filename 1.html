<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pinball 3D — Versão Completa (Self-Contained)</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#05060a; font-family:system-ui,Segoe UI,Arial,sans-serif; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      padding: 10px 12px; border-radius: 12px;
      background: rgba(0,0,0,.55); color: #eaf2ff;
      backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.12);
      width: min(360px, calc(100vw - 24px));
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
      pointer-events: none;
    }
    #hud h1 { font-size: 14px; margin: 0 0 6px; letter-spacing: .3px; font-weight: 700; }
    #hud .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .pill {
      display:inline-flex; align-items:center; gap:8px;
      padding: 6px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-size: 12px;
      pointer-events: auto;
    }
    .pill b { color:#9dd6ff; font-weight: 800; }
    #hint { margin-top: 8px; font-size: 12px; line-height: 1.35; opacity:.92; }
    #hint kbd {
      font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size: 11px; padding: 2px 6px; border-radius: 6px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
    }
    #toast {
      position: fixed; right: 12px; top: 12px; z-index: 10;
      padding: 10px 12px; border-radius: 12px;
      background: rgba(15, 23, 42, .85); color: #eaf2ff;
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(6px);
      max-width: min(360px, calc(100vw - 24px));
      display:none;
      font-size: 13px;
      pointer-events: none;
    }
    #toast.show { display:block; }
    canvas { display:block; }
    button.pill {
      pointer-events: auto;
      cursor: pointer;
      background: rgba(255,255,255,.12);
      transition: all 0.1s ease;
    }
    button.pill:hover {
      background: rgba(255,255,255,.24);
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div id="hud">
    <h1>🎱 Pinball 3D — Versão Completa (Self-Contained)</h1>
    <div class="row">
      <div class="pill">🏆 Pontuação: <b id="score">0</b></div>
      <div class="pill">🟡 Bolas: <b id="balls">3</b></div>
      <div class="pill">⚡ FPS: <b id="fps">—</b></div>
      <button id="resetBtn" class="pill" style="border-color:#ffaa44;">🔄 Reset</button>
    </div>
    <div id="hint">
      Controles:
      <div style="margin-top:6px;">
        <kbd>←</kbd>/<kbd>→</kbd> Flippers &nbsp; • &nbsp;
        <kbd>Espaço</kbd> Lançar &nbsp; • &nbsp;
        <kbd>R</kbd> Reset &nbsp; • &nbsp;
        <kbd>P</kbd> Pausar
      </div>
      <div style="margin-top:6px;">
        🖱️ Mouse: arraste para girar câmera (Orbit). Scroll para zoom.
      </div>
    </div>
  </div>
  <div id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    // =========================================================
    // PINBALL 3D - Versão completa com Three.js e Cannon.es
    // NÃO depende de arquivos externos (tudo via CDN confiável)
    // =========================================================
    
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

    // ---------- HUD Elements ----------
    const elScore = document.getElementById('score');
    const elBalls = document.getElementById('balls');
    const elFps   = document.getElementById('fps');
    const toast   = document.getElementById('toast');
    const resetBtn = document.getElementById('resetBtn');

    function showToast(msg, ms=1400) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
    }

    // ---------- CONFIG ----------
    const CFG = {
      tilt: 0.18,
      gravity: 16.0,
      restitution: 0.55,
      friction: 0.10,
      ballRadius: 0.18,
      flipper: { length: 1.10, width: 0.22, height: 0.14, maxForce: 55, speedUp: 18, speedDown: -12 },
      table: { w: 6.2, h: 10.5, wall: 0.35 }
    };

    // ---------- THREE Setup ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05060a);
    scene.fog = new THREE.FogExp2(0x05060a, 0.025);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.05, 200);
    camera.position.set(0, 7.2, 12.8);
    camera.lookAt(0, 0.9, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.9, 0);
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.minDistance = 5;
    controls.maxDistance = 20;

    // ---------- Luzes melhoradas ----------
    const ambientLight = new THREE.AmbientLight(0x88aaff, 0.30);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
    mainLight.position.set(6, 12, 5);
    mainLight.castShadow = true;
    mainLight.receiveShadow = false;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0x4466cc, 0.5);
    fillLight.position.set(-3, 4, 2);
    scene.add(fillLight);
    
    const backLight = new THREE.PointLight(0xffaa66, 0.4);
    backLight.position.set(0, 3, -4);
    scene.add(backLight);
    
    // Luzes neon nos bumpers (serão animadas)
    const neonLeft = new THREE.PointLight(0x00e5ff, 0.8, 12);
    neonLeft.position.set(-1.8, 0.6, -2.0);
    scene.add(neonLeft);
    
    const neonCenter = new THREE.PointLight(0xff2bd6, 0.9, 12);
    neonCenter.position.set(0, 0.7, -2.6);
    scene.add(neonCenter);
    
    const neonRight = new THREE.PointLight(0x7cfc00, 0.7, 12);
    neonRight.position.set(1.9, 0.6, -1.9);
    scene.add(neonRight);
    
    const neonBig = new THREE.PointLight(0xffcc00, 1.0, 14);
    neonBig.position.set(0, 0.8, -4.2);
    scene.add(neonBig);

    // ---------- CANNON World ----------
    const world = new CANNON.World();
    world.gravity = new CANNON.Vec3(0, -CFG.gravity, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 10;
    
    // Materiais
    const matBall = new CANNON.Material('ball');
    const matTable = new CANNON.Material('table');
    const matBumper = new CANNON.Material('bumper');
    const matFlipper = new CANNON.Material('flipper');
    
    const ballTableContact = new CANNON.ContactMaterial(matBall, matTable, {
      friction: 0.08, restitution: CFG.restitution, contactEquationStiffness: 1e8
    });
    world.addContactMaterial(ballTableContact);
    world.defaultContactMaterial.material1 = matBall;
    world.defaultContactMaterial.material2 = matTable;
    world.defaultContactMaterial.restitution = 0.5;
    
    const ballBumperContact = new CANNON.ContactMaterial(matBall, matBumper, {
      friction: 0.02, restitution: 0.9, contactEquationStiffness: 1e8
    });
    world.addContactMaterial(ballBumperContact);
    
    const ballFlipperContact = new CANNON.ContactMaterial(matBall, matFlipper, {
      friction: 0.04, restitution: 0.7, contactEquationStiffness: 1e8
    });
    world.addContactMaterial(ballFlipperContact);

    // ---------- Helpers visuais ----------
    function addMeshWithShadow(mesh) {
      mesh.castShadow = true;
      mesh.receiveShadow = false;
      scene.add(mesh);
      return mesh;
    }
    
    function makeBoxMesh(w,h,d, color=0x101824, emissive=0x000000, intensity=0.0) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: intensity, metalness: 0.3, roughness: 0.5 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      return mesh;
    }
    
    function makeCylinderMesh(r, h, color=0x1c2b44, emissive=0x00e5ff, intensity=0.4) {
      const geo = new THREE.CylinderGeometry(r, r, h, 24);
      const mat = new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: intensity, metalness: 0.2, roughness: 0.3 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      return mesh;
    }

    // ---------- Mesa visual ----------
    const tableGroup = new THREE.Group();
    scene.add(tableGroup);
    
    // Playfield inclinado
    const playfieldMat = new THREE.MeshStandardMaterial({ color: 0x0b1220, metalness: 0.4, roughness: 0.3, emissive: 0x001122, emissiveIntensity: 0.2 });
    const playfieldPlane = new THREE.Mesh(new THREE.PlaneGeometry(CFG.table.w, CFG.table.h), playfieldMat);
    playfieldPlane.rotation.x = -Math.PI/2 + CFG.tilt;
    playfieldPlane.position.y = 0;
    playfieldPlane.receiveShadow = true;
    tableGroup.add(playfieldPlane);
    
    // Paredes decorativas
    const wallColor = 0x111827;
    const wallL = makeBoxMesh(CFG.table.wall, 0.5, CFG.table.h, wallColor, 0x0b5cff, 0.2);
    wallL.position.set(-CFG.table.w/2 - CFG.table.wall/2, 0.25, 0);
    tableGroup.add(wallL);
    
    const wallR = makeBoxMesh(CFG.table.wall, 0.5, CFG.table.h, wallColor, 0x0b5cff, 0.2);
    wallR.position.set(CFG.table.w/2 + CFG.table.wall/2, 0.25, 0);
    tableGroup.add(wallR);
    
    const wallTop = makeBoxMesh(CFG.table.w + CFG.table.wall*2, 0.5, CFG.table.wall, wallColor, 0xff2bd6, 0.2);
    wallTop.position.set(0, 0.25, -CFG.table.h/2 - CFG.table.wall/2);
    tableGroup.add(wallTop);
    
    const gap = 1.15;
    const wallBotL = makeBoxMesh((CFG.table.w-gap)/2, 0.5, CFG.table.wall, wallColor, 0x00e5ff, 0.2);
    wallBotL.position.set(-(gap/2 + (CFG.table.w-gap)/4), 0.25, CFG.table.h/2 + CFG.table.wall/2);
    tableGroup.add(wallBotL);
    
    const wallBotR = makeBoxMesh((CFG.table.w-gap)/2, 0.5, CFG.table.wall, wallColor, 0x00e5ff, 0.2);
    wallBotR.position.set((gap/2 + (CFG.table.w-gap)/4), 0.25, CFG.table.h/2 + CFG.table.wall/2);
    tableGroup.add(wallBotR);
    
    // ---------- Física da mesa ----------
    const tablePlaneBody = new CANNON.Body({ mass: 0, material: matTable });
    tablePlaneBody.addShape(new CANNON.Plane());
    tablePlaneBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2 + CFG.tilt);
    world.addBody(tablePlaneBody);
    
    function addStaticBox(w,h,d, x,y,z, rotY=0) {
      const body = new CANNON.Body({ mass: 0, material: matTable });
      body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
      body.position.set(x, y, z);
      if (rotY) body.quaternion.setFromAxisAngle(new CANNON.Vec3(0,1,0), rotY);
      world.addBody(body);
      return body;
    }
    
    addStaticBox(CFG.table.wall, 0.7, CFG.table.h, -CFG.table.w/2 - CFG.table.wall/2, 0.35, 0);
    addStaticBox(CFG.table.wall, 0.7, CFG.table.h,  CFG.table.w/2 + CFG.table.wall/2, 0.35, 0);
    addStaticBox(CFG.table.w + CFG.table.wall*2, 0.7, CFG.table.wall, 0, 0.35, -CFG.table.h/2 - CFG.table.wall/2);
    addStaticBox((CFG.table.w-gap)/2, 0.7, CFG.table.wall, -(gap/2 + (CFG.table.w-gap)/4), 0.35, CFG.table.h/2 + CFG.table.wall/2);
    addStaticBox((CFG.table.w-gap)/2, 0.7, CFG.table.wall, (gap/2 + (CFG.table.w-gap)/4), 0.35, CFG.table.h/2 + CFG.table.wall/2);
    
    // Piso inferior para evitar queda infinita
    const groundBody = new CANNON.Body({ mass: 0, material: matTable });
    groundBody.addShape(new CANNON.Box(new CANNON.Vec3(20, 0.5, 20)));
    groundBody.position.set(0, -3, 0);
    world.addBody(groundBody);

    // ---------- Bumpers ----------
    const bumpers = [];
    const bumperMeshes = [];
    const bumperLights = [neonLeft, neonCenter, neonRight, neonBig];
    const bumperPositions = [
      { x: -1.8, z: -2.0, r: 0.32, pts: 50,  color: 0x00e5ff },
      { x:  0.0, z: -2.6, r: 0.36, pts: 75,  color: 0xff2bd6 },
      { x:  1.9, z: -1.9, r: 0.32, pts: 50,  color: 0x7cfc00 },
      { x:  0.0, z: -4.2, r: 0.40, pts: 100, color: 0xffcc00 },
    ];
    
    bumperPositions.forEach((b, idx) => {
      const body = new CANNON.Body({ mass: 0, material: matBumper });
      body.addShape(new CANNON.Sphere(b.r));
      body.position.set(b.x, 0.35, b.z);
      world.addBody(body);
      bumpers.push({ body, pts: b.pts, idx });
      
      const mesh = makeCylinderMesh(b.r, 0.28, b.color, b.color, 0.7);
      mesh.position.set(b.x, 0.14, b.z);
      tableGroup.add(mesh);
      bumperMeshes.push(mesh);
    });

    // ---------- Flippers ----------
    class Flipper {
      constructor(isLeft) {
        this.isLeft = isLeft;
        const len = CFG.flipper.length;
        const w = CFG.flipper.width;
        const h = CFG.flipper.height;
        
        this.mesh = makeBoxMesh(len, h, w, 0x1b2a42, isLeft ? 0x00e5ff : 0xff2bd6, 0.6);
        this.mesh.position.y = 0.22;
        tableGroup.add(this.mesh);
        
        this.body = new CANNON.Body({ mass: 0.8, material: matFlipper });
        this.body.addShape(new CANNON.Box(new CANNON.Vec3(len/2, h/2, w/2)));
        
        const baseX = isLeft ? -1.0 : 1.0;
        const baseZ = 3.65;
        this.body.position.set(baseX, 0.22, baseZ);
        world.addBody(this.body);
        
        // Pivô estático
        this.pivot = new CANNON.Body({ mass: 0, material: matTable });
        this.pivot.addShape(new CANNON.Sphere(0.08));
        this.pivot.position.set(baseX + (isLeft ? -len/2 + 0.16 : len/2 - 0.16), 0.22, baseZ);
        world.addBody(this.pivot);
        
        const localPivot = new CANNON.Vec3(isLeft ? -len/2 + 0.16 : len/2 - 0.16, 0, 0);
        this.hinge = new CANNON.HingeConstraint(this.body, this.pivot, {
          pivotA: localPivot,
          axisA: new CANNON.Vec3(0,1,0),
          pivotB: new CANNON.Vec3(0,0,0),
          axisB: new CANNON.Vec3(0,1,0)
        });
        
        const low = isLeft ? -0.7 : -0.2;
        const high = isLeft ? 0.2 : 0.7;
        this.hinge.setLimits(low, high, 0.01);
        this.hinge.enableMotor();
        this.hinge.setMotorMaxForce(CFG.flipper.maxForce);
        this.hinge.setMotorSpeed(0);
        world.addConstraint(this.hinge);
      }
      
      setSpeed(speed) {
        this.hinge.setMotorSpeed(speed);
      }
      
      update() {
        this.mesh.position.copy(this.body.position);
        this.mesh.quaternion.copy(this.body.quaternion);
      }
    }
    
    const flipperLeft = new Flipper(true);
    const flipperRight = new Flipper(false);

    // ---------- Bola ----------
    const ballMesh = new THREE.Mesh(
      new THREE.SphereGeometry(CFG.ballRadius, 48, 32),
      new THREE.MeshStandardMaterial({ color: 0xeaeef7, metalness: 0.9, roughness: 0.12, emissive: 0x111922, emissiveIntensity: 0.08 })
    );
    ballMesh.castShadow = true;
    scene.add(ballMesh);
    
    const ballBody = new CANNON.Body({
      mass: 0.6, material: matBall,
      linearDamping: 0.12, angularDamping: 0.4
    });
    ballBody.addShape(new CANNON.Sphere(CFG.ballRadius));
    world.addBody(ballBody);
    
    // ---------- Estado do jogo ----------
    let score = 0;
    let balls = 3;
    let paused = false;
    let gameActive = true;
    
    function resetBall(toLauncher = true) {
      ballBody.velocity.set(0, 0, 0);
      ballBody.angularVelocity.set(0, 0, 0);
      if (toLauncher) {
        ballBody.position.set(2.45, 0.45, 4.10);
      } else {
        ballBody.position.set(0, 0.55, 0.8);
      }
    }
    
    function resetGame() {
      score = 0;
      balls = 3;
      paused = false;
      gameActive = true;
      elScore.textContent = score;
      elBalls.textContent = balls;
      resetBall(true);
      showToast("🔄 Jogo resetado! Boa sorte!");
    }
    
    function loseBall() {
      if (!gameActive) return;
      balls--;
      elBalls.textContent = balls;
      if (balls <= 0) {
        gameActive = false;
        paused = true;
        showToast(`💀 FIM DE JOGO! Pontuação final: ${score} 💀`, 3000);
      } else {
        showToast("😓 Bola perdida! Próxima bola...", 1200);
        resetBall(true);
      }
    }
    
    resetBall(true);
    
    // Colisões da bola com bumpers
    ballBody.addEventListener('collide', (e) => {
      if (paused || !gameActive) return;
      const other = e.body;
      for (const b of bumpers) {
        if (other === b.body) {
          score += b.pts;
          elScore.textContent = score;
          // Aplica impulso extra
          const impulse = e.contact.ni.clone();
          impulse.scale(2.8, impulse);
          ballBody.applyImpulse(impulse, ballBody.position);
          showToast(`✨ +${b.pts} pts! ✨`);
          // Pisca a luz do bumper
          if (bumperLights[b.idx]) {
            const originalIntensity = bumperLights[b.idx].intensity;
            bumperLights[b.idx].intensity = 1.8;
            setTimeout(() => { if(bumperLights[b.idx]) bumperLights[b.idx].intensity = originalIntensity; }, 150);
          }
          break;
        }
      }
    });
    
    // Verifica dreno
    function checkDrain() {
      if (!gameActive) return;
      const pos = ballBody.position;
      if (pos.y < -2.5 || pos.z > 7.5 || Math.abs(pos.x) > 4.5) {
        loseBall();
      }
    }
    
    // Lançamento
    function launchBall() {
      if (paused || !gameActive) return;
      const pos = ballBody.position;
      if (pos.z > 3.8 && pos.x > 1.8) {
        const vel = ballBody.velocity;
        vel.set(-1.2 + Math.random() * 0.8, 2.2, -9.5);
        ballBody.velocity = vel;
        showToast("🚀 Bola lançada!");
      }
    }
    
    // ---------- Input ----------
    const keys = new Set();
    window.addEventListener('keydown', (e) => {
      const code = e.code;
      keys.add(code);
      
      if (code === 'KeyP') {
        paused = !paused;
        showToast(paused ? "⏸️ Pausado" : "▶️ Retomando");
        e.preventDefault();
      }
      if (code === 'KeyR') {
        resetGame();
        e.preventDefault();
      }
      if (code === 'Space') {
        launchBall();
        e.preventDefault();
      }
      // Evitar scroll com setas
      if (code === 'ArrowLeft' || code === 'ArrowRight') {
        e.preventDefault();
      }
    });
    
    window.addEventListener('keyup', (e) => {
      keys.delete(e.code);
    });
    
    resetBtn.addEventListener('click', () => {
      resetGame();
    });
    
    function updateFlippers() {
      if (paused) {
        flipperLeft.setSpeed(0);
        flipperRight.setSpeed(0);
        return;
      }
      const leftActive = keys.has('ArrowLeft');
      const rightActive = keys.has('ArrowRight');
      flipperLeft.setSpeed(leftActive ? CFG.flipper.speedUp : CFG.flipper.speedDown);
      flipperRight.setSpeed(rightActive ? -CFG.flipper.speedUp : -CFG.flipper.speedDown);
    }
    
    // ---------- Loop de animação ----------
    let lastTime = performance.now();
    let frameCount = 0;
    let lastFpsUpdate = performance.now();
    let accumulator = 0;
    const STEP = 1 / 60;
    
    function animate() {
      const now = performance.now();
      let dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;
      
      // FPS counter
      frameCount++;
      if (now - lastFpsUpdate >= 500) {
        elFps.textContent = Math.round(frameCount / ((now - lastFpsUpdate) / 1000));
        frameCount = 0;
        lastFpsUpdate = now;
      }
      
      // Atualiza flippers
      updateFlippers();
      
      // Física
      if (!paused && gameActive) {
        accumulator += dt;
        while (accumulator >= STEP) {
          world.step(STEP);
          accumulator -= STEP;
        }
        checkDrain();
      }
      
      // Atualiza posições dos objetos 3D
      ballMesh.position.copy(ballBody.position);
      ballMesh.quaternion.copy(ballBody.quaternion);
      flipperLeft.update();
      flipperRight.update();
      
      // Anima luzes neon dos bumpers
      const t = now * 0.004;
      bumperLights.forEach((light, idx) => {
        if (light) {
          light.intensity = 0.6 + Math.sin(t + idx) * 0.3;
        }
      });
      
      // Anima emissive dos bumpers visuais
      bumperMeshes.forEach((mesh, idx) => {
        if (mesh.material) {
          mesh.material.emissiveIntensity = 0.5 + Math.sin(t * 1.5 + idx) * 0.3;
        }
      });
      
      // Controles de câmera
      controls.update();
      
      // Renderiza
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    // Inicia
    resetGame();
    showToast("🎮 Pinball 3D carregado! Use ← → e Espaço.", 2000);
    animate();
    
    // Ajuste de tela
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
