<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pinball 2.5D - Working Flippers & Physics</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 12px 24px;
      border-radius: 30px;
      color: white;
      backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 10;
      font-weight: bold;
      border-left: 4px solid #0ff;
      box-shadow: 0 0 15px rgba(0,255,255,0.3);
    }
    #score, #balls { color: #0ff; font-size: 1.4em; margin-left: 8px; }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      font-size: 14px;
      color: #ccc;
      font-family: monospace;
      pointer-events: none;
      z-index: 10;
    }
    kbd {
      background: #222;
      border-radius: 6px;
      padding: 2px 8px;
      margin: 0 4px;
      color: #0ff;
      font-weight: bold;
    }
    @media (max-width: 700px) {
      #ui { font-size: 12px; padding: 8px 16px; }
      #controls { font-size: 10px; }
    }
  </style>
</head>
<body>
<div id="ui">
  <span>🎯 SCORE: <span id="score">0</span></span>&nbsp;&nbsp;|&nbsp;
  <span>💥 BALLS: <span id="balls">3</span></span>&nbsp;&nbsp;|&nbsp;
  <span>⚡ MULTI: <span id="multiplier">1x</span></span>
</div>
<div id="controls">
  🎮 <kbd>←</kbd> <kbd>→</kbd> flippers &nbsp;|&nbsp;
  🚀 <kbd>SPACE</kbd> (hold to charge, release to launch) &nbsp;|&nbsp;
  🔄 <kbd>R</kbd> reset &nbsp;|&nbsp;
  ⏸️ <kbd>P</kbd> pause
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import * as CANNON from 'cannon-es';

  // ---------- UI elements ----------
  const scoreElem = document.getElementById('score');
  const ballsElem = document.getElementById('balls');
  const multiplierElem = document.getElementById('multiplier');

  // ---------- Game state ----------
  let score = 0;
  let balls = 3;
  let multiplier = 1;
  let paused = false;
  let comboCounter = 0;
  let comboTimeout = null;

  // Helper: show temporary message
  let msgTimeout = null;
  function showMessage(msg, duration = 1200) {
    const div = document.getElementById('ui');
    const oldMsg = document.getElementById('tempMsg');
    if(oldMsg) oldMsg.remove();
    const span = document.createElement('div');
    span.id = 'tempMsg';
    span.style.position = 'absolute';
    span.style.bottom = '-30px';
    span.style.left = '0';
    span.style.background = '#0ff';
    span.style.color = '#000';
    span.style.padding = '4px 12px';
    span.style.borderRadius = '20px';
    span.style.fontSize = '12px';
    span.style.whiteSpace = 'nowrap';
    span.innerText = msg;
    div.appendChild(span);
    setTimeout(() => span.remove(), duration);
  }

  function updateUI() {
    scoreElem.innerText = score;
    ballsElem.innerText = balls;
    multiplierElem.innerText = multiplier + 'x';
  }

  // ---------- Physics config ----------
  const CFG = {
    tilt: 0.18,
    gravity: 20,
    ballRadius: 0.22,
    tableWidth: 6.2,
    tableHeight: 10.2,
    wallThick: 0.4,
    flipperLength: 1.1,
    flipperWidth: 0.26,
    flipperHeight: 0.14,
    flipperSpeed: 18,
    flipperMaxForce: 200
  };

  // ---------- Three.js setup ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.setClearColor(0x050b1a);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050b1a, 0.02);

  // Fixed camera (2.5D front view)
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
  camera.position.set(0, 5.2, 12.5);
  camera.lookAt(0, 1.2, 0);

  // Lighting
  const ambient = new THREE.AmbientLight(0x334466, 0.55);
  scene.add(ambient);
  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(5, 12, 6);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.width = 1024;
  mainLight.shadow.mapSize.height = 1024;
  scene.add(mainLight);
  const fillLight = new THREE.PointLight(0x4488ff, 0.6);
  fillLight.position.set(-2, 3, 4);
  scene.add(fillLight);
  const backLight = new THREE.PointLight(0xff66aa, 0.5);
  backLight.position.set(0, 2.5, -5);
  scene.add(backLight);
  const rimLight = new THREE.PointLight(0x88aaff, 0.7);
  rimLight.position.set(3, 4, 3);
  scene.add(rimLight);

  // ---------- Cannon.js world ----------
  const world = new CANNON.World();
  world.gravity = new CANNON.Vec3(0, -CFG.gravity, 0);
  world.broadphase = new CANNON.NaiveBroadphase();
  world.solver.iterations = 15;
  world.defaultContactMaterial.restitution = 0.55;

  // Materials
  const ballMat = new CANNON.Material('ball');
  const tableMat = new CANNON.Material('table');
  const bumperMat = new CANNON.Material('bumper');
  const flipperMat = new CANNON.Material('flipper');

  // Contact materials
  const ballTable = new CANNON.ContactMaterial(ballMat, tableMat, { friction: 0.05, restitution: 0.65, contactEquationStiffness: 1e9 });
  const ballBumper = new CANNON.ContactMaterial(ballMat, bumperMat, { friction: 0.02, restitution: 0.92, contactEquationStiffness: 1e9 });
  const ballFlipper = new CANNON.ContactMaterial(ballMat, flipperMat, { friction: 0.04, restitution: 0.78, contactEquationStiffness: 1e9 });
  world.addContactMaterial(ballTable);
  world.addContactMaterial(ballBumper);
  world.addContactMaterial(ballFlipper);
  world.defaultContactMaterial.material1 = tableMat;
  world.defaultContactMaterial.material2 = ballMat;

  // ---------- Visual table group ----------
  const tableGroup = new THREE.Group();
  scene.add(tableGroup);

  // Playfield (inclined)
  const playfieldMat = new THREE.MeshStandardMaterial({ color: 0x0c1430, metalness: 0.65, roughness: 0.4, emissive: 0x001133, emissiveIntensity: 0.2 });
  const playfield = new THREE.Mesh(new THREE.PlaneGeometry(CFG.tableWidth, CFG.tableHeight), playfieldMat);
  playfield.rotation.x = -Math.PI / 2 + CFG.tilt;
  playfield.position.y = 0;
  playfield.receiveShadow = true;
  tableGroup.add(playfield);

  // Inclined physics plane
  const tablePlane = new CANNON.Body({ mass: 0, material: tableMat });
  tablePlane.addShape(new CANNON.Plane());
  tablePlane.quaternion.setFromEuler(-Math.PI / 2 + CFG.tilt, 0, 0);
  world.addBody(tablePlane);

  // Walls (visual + physics)
  const wallColor = new THREE.MeshStandardMaterial({ color: 0x111a2a, metalness: 0.7, emissive: 0x0a2a4a });
  function addWall(x, z, w, d, rotY = 0) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.6, d), wallColor);
    mesh.position.set(x, 0.25, z);
    mesh.castShadow = true;
    tableGroup.add(mesh);
    // physics
    const body = new CANNON.Body({ mass: 0, material: tableMat });
    body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, 0.3, d / 2)));
    body.position.set(x, 0.3, z);
    world.addBody(body);
  }

  // borders
  addWall(-CFG.tableWidth / 2 - 0.2, 0, CFG.wallThick, CFG.tableHeight);
  addWall(CFG.tableWidth / 2 + 0.2, 0, CFG.wallThick, CFG.tableHeight);
  addWall(0, -CFG.tableHeight / 2 - 0.2, CFG.tableWidth + 0.8, CFG.wallThick);
  // bottom gap for drain
  const gap = 1.3;
  addWall(-(gap / 2 + (CFG.tableWidth - gap) / 4), CFG.tableHeight / 2 + 0.2, (CFG.tableWidth - gap) / 2, CFG.wallThick);
  addWall((gap / 2 + (CFG.tableWidth - gap) / 4), CFG.tableHeight / 2 + 0.2, (CFG.tableWidth - gap) / 2, CFG.wallThick);

  // ---------- Bumpers ----------
  const bumpers = [];
  const bumperMeshes = [];
  const bumperData = [
    { x: -1.9, z: -2.3, r: 0.38, pts: 70, color: 0x33ccff },
    { x: 0, z: -2.8, r: 0.42, pts: 100, color: 0xff44ff },
    { x: 1.95, z: -2.25, r: 0.38, pts: 70, color: 0x88ff44 },
    { x: 0, z: -4.4, r: 0.46, pts: 150, color: 0xffaa44 },
    { x: -1.2, z: -1.0, r: 0.33, pts: 55, color: 0x66aaff },
    { x: 1.25, z: -0.95, r: 0.33, pts: 55, color: 0x66aaff }
  ];

  bumperData.forEach(b => {
    const body = new CANNON.Body({ mass: 0, material: bumperMat });
    body.addShape(new CANNON.Sphere(b.r));
    body.position.set(b.x, 0.4, b.z);
    world.addBody(body);
    bumpers.push({ body, pts: b.pts });

    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(b.r * 0.92, b.r, 0.3, 24), new THREE.MeshStandardMaterial({ color: b.color, emissive: b.color, emissiveIntensity: 0.7 }));
    cyl.position.set(b.x, 0.2, b.z);
    cyl.castShadow = true;
    tableGroup.add(cyl);
    bumperMeshes.push(cyl);
  });

  // ---------- Flippers using HingeConstraint (cannon-es compatible) ----------
  function createFlipper(isLeft) {
    const len = CFG.flipperLength;
    const w = CFG.flipperWidth;
    const h = CFG.flipperHeight;
    const color = isLeft ? 0x2a7fbf : 0xbf3f8a;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, h, w), new THREE.MeshStandardMaterial({ color, metalness: 0.8, emissive: isLeft ? 0x0088aa : 0xff55aa, emissiveIntensity: 0.4 }));
    mesh.castShadow = true;
    tableGroup.add(mesh);

    const body = new CANNON.Body({ mass: 0.9, material: flipperMat });
    body.addShape(new CANNON.Box(new CANNON.Vec3(len / 2, h / 2, w / 2)));
    const baseX = isLeft ? -1.1 : 1.1;
    const baseZ = 3.9;
    body.position.set(baseX, 0.25, baseZ);
    world.addBody(body);

    // pivot position relative to body
    const pivotOffsetX = isLeft ? -len / 2 + 0.18 : len / 2 - 0.18;
    const pivotWorld = new CANNON.Body({ mass: 0 });
    pivotWorld.position.set(baseX + pivotOffsetX, 0.25, baseZ);
    world.addBody(pivotWorld);

    // Hinge constraint
    const hinge = new CANNON.HingeConstraint(body, pivotWorld, {
      pivotA: new CANNON.Vec3(pivotOffsetX, 0, 0),
      axisA: new CANNON.Vec3(0, 1, 0),
      pivotB: new CANNON.Vec3(0, 0, 0),
      axisB: new CANNON.Vec3(0, 1, 0),
      maxForce: CFG.flipperMaxForce
    });
    // set angle limits (radians)
    const low = isLeft ? -0.75 : -0.25;
    const high = isLeft ? 0.25 : 0.75;
    hinge.setLimits(low, high);
    hinge.enableMotor();
    hinge.setMotorMaxForce(CFG.flipperMaxForce);
    hinge.setMotorSpeed(0);
    world.addConstraint(hinge);

    return { mesh, body, hinge, isLeft };
  }

  const leftFlipper = createFlipper(true);
  const rightFlipper = createFlipper(false);

  // ---------- Ball ----------
  const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(CFG.ballRadius, 48, 48), new THREE.MeshStandardMaterial({ color: 0xeeffff, metalness: 0.95, roughness: 0.1, emissive: 0x2266aa, emissiveIntensity: 0.1 }));
  ballMesh.castShadow = true;
  scene.add(ballMesh);

  const ballBody = new CANNON.Body({ mass: 0.65, material: ballMat, linearDamping: 0.12, angularDamping: 0.2 });
  ballBody.addShape(new CANNON.Sphere(CFG.ballRadius));
  world.addBody(ballBody);

  // ---------- Game logic ----------
  function resetBallToLauncher() {
    ballBody.velocity.set(0, 0, 0);
    ballBody.angularVelocity.set(0, 0, 0);
    ballBody.position.set(2.4, 0.6, 4.4);
  }

  function addPoints(pts) {
    if (paused) return;
    const gain = pts * multiplier;
    score += gain;
    updateUI();
    showMessage(`+${gain}`);
    comboCounter++;
    if (comboCounter >= 3 && multiplier < 5) {
      multiplier++;
      updateUI();
      showMessage(`🔥 COMBO x${multiplier}!`);
      comboCounter = 0;
    }
    if (comboTimeout) clearTimeout(comboTimeout);
    comboTimeout = setTimeout(() => {
      multiplier = 1;
      comboCounter = 0;
      updateUI();
    }, 2800);
  }

  function loseBall() {
    if (paused) return;
    balls--;
    updateUI();
    if (balls <= 0) {
      paused = true;
      showMessage(`GAME OVER! Score: ${score}`, 3000);
    } else {
      showMessage("BALL LOST");
      resetBallToLauncher();
    }
  }

  function checkDrain() {
    const pos = ballBody.position;
    if (pos.y < -1.2 || pos.z > 7.9 || Math.abs(pos.x) > 4.0) {
      if (balls > 0) loseBall();
      else ballBody.velocity.set(0, 0, 0);
    }
    // keep inside side walls
    if (Math.abs(pos.x) > 3.85) ballBody.position.x *= 0.98;
  }

  // ---------- Plunger (charge & launch) ----------
  let plungerPower = 0;
  let charging = false;
  let plungerInterval = null;

  function startCharge() {
    if (paused || balls <= 0) return;
    charging = true;
    plungerPower = 0;
  }

  function releaseCharge() {
    if (!charging || paused) {
      charging = false;
      plungerPower = 0;
      return;
    }
    const power = Math.min(plungerPower, 1.0);
    const pos = ballBody.position;
    // check if ball is in launcher area
    if (pos.z > 3.9 && (pos.x > 1.5 || pos.x < -1.5)) {
      const vx = (Math.random() - 0.5) * 0.9;
      const vz = -7.0 - power * 6.5;
      const vy = 1.8 + power * 2.0;
      ballBody.velocity.set(vx, vy, vz);
      showMessage(`LAUNCH! ${Math.floor(power * 100)}%`);
    } else {
      showMessage("Ball not in launcher!");
    }
    charging = false;
    plungerPower = 0;
  }

  // update plunger charge (called each frame)
  function updatePlunger(dt) {
    if (charging && !paused) {
      plungerPower = Math.min(plungerPower + dt * 2.2, 1.0);
    }
  }

  // ---------- Input handling ----------
  const keys = { left: false, right: false };

  window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
    if (e.code === 'ArrowRight') { keys.right = true; e.preventDefault(); }
    if (e.code === 'Space') { startCharge(); e.preventDefault(); }
    if (e.code === 'KeyR') {
      score = 0; balls = 3; multiplier = 1; paused = false; comboCounter = 0;
      updateUI();
      resetBallToLauncher();
      showMessage("RESET GAME");
    }
    if (e.code === 'KeyP') {
      paused = !paused;
      showMessage(paused ? "PAUSED" : "RESUME");
    }
  });

  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') releaseCharge();
  });

  function updateFlippers() {
    const leftSpeed = keys.left ? CFG.flipperSpeed : -CFG.flipperSpeed;
    const rightSpeed = keys.right ? -CFG.flipperSpeed : CFG.flipperSpeed;
    leftFlipper.hinge.setMotorSpeed(leftSpeed);
    rightFlipper.hinge.setMotorSpeed(rightSpeed);
  }

  // ---------- Collision events for bumpers ----------
  ballBody.addEventListener('collide', (e) => {
    for (let i = 0; i < bumpers.length; i++) {
      if (e.body === bumpers[i].body) {
        addPoints(bumpers[i].pts);
        // add a little bounce impulse
        const normal = e.contact.ni.clone();
        const impulse = new CANNON.Vec3(-normal.x, -normal.y + 0.5, -normal.z);
        impulse.scale(2.2, impulse);
        ballBody.velocity.vadd(impulse, ballBody.velocity);
        // flash bumper
        if (bumperMeshes[i].material) {
          bumperMeshes[i].material.emissiveIntensity = 1.2;
          setTimeout(() => { if (bumperMeshes[i].material) bumperMeshes[i].material.emissiveIntensity = 0.7; }, 150);
        }
        break;
      }
    }
  });

  // ---------- Animation loop ----------
  let lastTime = performance.now();
  let accumulator = 0;
  let time = 0;

  function animate(now) {
    requestAnimationFrame(animate);
    let dt = Math.min((now - lastTime) / 1000, 0.033);
    lastTime = now;

    if (!paused) {
      updateFlippers();
      updatePlunger(dt);
      accumulator += dt;
      while (accumulator >= 1 / 120) {
        world.step(1 / 120);
        accumulator -= 1 / 120;
      }
      checkDrain();
    }

    // sync visuals
    ballMesh.position.copy(ballBody.position);
    ballMesh.quaternion.copy(ballBody.quaternion);
    leftFlipper.mesh.position.copy(leftFlipper.body.position);
    leftFlipper.mesh.quaternion.copy(leftFlipper.body.quaternion);
    rightFlipper.mesh.position.copy(rightFlipper.body.position);
    rightFlipper.mesh.quaternion.copy(rightFlipper.body.quaternion);

    // animate bumpers emissive
    time += dt;
    bumperMeshes.forEach((m, idx) => {
      if (m.material) m.material.emissiveIntensity = 0.6 + Math.sin(time * 3 + idx) * 0.2;
    });

    renderer.render(scene, camera);
  }

  // start game
  resetBallToLauncher();
  updateUI();
  showMessage("READY! ← → flippers, HOLD SPACE to launch", 2500);
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // decorative stars
  const starCount = 800;
  const starPos = [];
  for (let i = 0; i < starCount; i++) {
    starPos.push((Math.random() - 0.5) * 200);
    starPos.push((Math.random() - 0.5) * 80);
    starPos.push((Math.random() - 0.5) * 80 - 40);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
  const starMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.08 });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);
</script>
</body>
</html>
