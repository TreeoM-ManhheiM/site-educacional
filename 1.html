<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Pinball 2.5D — Flippers + Plunger + Mobile</title>
  <style>
    * {
      user-select: none;
      touch-action: manipulation;
    }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #03060c;
      font-family: 'Segoe UI', system-ui, monospace;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 10px 16px;
      border: 1px solid rgba(0, 255, 255, 0.4);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-weight: bold;
      font-size: 14px;
    }
    .stat {
      background: #0a0f1a;
      padding: 4px 12px;
      border-radius: 32px;
      border-left: 2px solid #0ff;
    }
    .stat span { color: #8ab3ff; margin-right: 6px; }
    .stat b { color: #0ff; font-size: 20px; }
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a1428ee;
      backdrop-filter: blur(12px);
      padding: 6px 18px;
      border-radius: 40px;
      color: #0ff;
      font-size: 13px;
      z-index: 25;
      white-space: nowrap;
      transition: 0.2s;
      pointer-events: none;
      font-family: monospace;
    }
    /* Mobile touch buttons */
    .touch-panel {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 30;
      padding: 10px;
      pointer-events: none;
    }
    .touch-btn {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid #0ff;
      border-radius: 60px;
      padding: 12px 24px;
      font-size: 20px;
      font-weight: bold;
      color: #0ff;
      text-align: center;
      min-width: 80px;
      box-shadow: 0 0 12px rgba(0,255,255,0.3);
      transition: 0.05s linear;
      touch-action: manipulation;
      cursor: pointer;
      font-family: monospace;
    }
    .touch-btn:active {
      transform: scale(0.96);
      background: #0ff22a;
      color: #000;
    }
    .plunger-bar {
      position: fixed;
      bottom: 120px;
      right: 20px;
      width: 40px;
      height: 120px;
      background: #111;
      border: 2px solid #0ff;
      border-radius: 20px;
      overflow: hidden;
      z-index: 30;
    }
    .plunger-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #0ff;
      transition: height 0.02s linear;
      height: 0%;
    }
    @media (max-width: 700px) {
      .touch-btn { padding: 8px 16px; font-size: 16px; min-width: 65px; }
      .stat b { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="stat"><span>🎯</span> <b id="score">0</b></div>
    <div class="stat"><span>💥</span> <b id="balls">3</b></div>
    <div class="stat"><span>⚡</span> <b id="multiplier">1x</b></div>
  </div>
  <div id="toast"></div>
  
  <div class="touch-panel">
    <div class="touch-btn" id="touchLeft">◀ FLIP</div>
    <div class="touch-btn" id="touchRight">FLIP ▶</div>
    <div class="touch-btn" id="touchPlunger">🎯 PLUNGER</div>
  </div>
  <div class="plunger-bar" id="plungerBar">
    <div class="plunger-fill" id="plungerFill"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';

    // ---------- UI ----------
    const scoreEl = document.getElementById('score');
    const ballsEl = document.getElementById('balls');
    const multEl = document.getElementById('multiplier');
    const toastDiv = document.getElementById('toast');
    const plungerFill = document.getElementById('plungerFill');
    
    function showMessage(msg, duration = 1200) {
      toastDiv.textContent = msg;
      toastDiv.style.opacity = '1';
      if (window.toastTimer) clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toastDiv.style.opacity = '0', duration);
    }

    // ---------- CONFIG FÍSICA CORRIGIDA ----------
    const CFG = {
      tilt: 0.19,
      gravity: 18.0,
      restitution: 0.62,
      friction: 0.08,
      ballRadius: 0.19,
      flipper: {
        length: 1.08, width: 0.24, height: 0.13,
        maxForce: 120, speedUp: 28, speedDown: -18
      },
      table: { w: 6.4, h: 10.8, wall: 0.38 }
    };

    // --- Three.js (câmera fixa 2.5D)
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.setClearColor(0x03060c);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x03060c, 0.02);
    
    const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 50);
    camera.position.set(0, 5.2, 12.8);
    camera.lookAt(0, 1.2, 0);
    
    // Luzes
    const ambient = new THREE.AmbientLight(0x223366, 0.55);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
    mainLight.position.set(4, 10, 5);
    mainLight.castShadow = true;
    scene.add(mainLight);
    const fill = new THREE.PointLight(0x4488ff, 0.7);
    fill.position.set(-2, 3, 4);
    scene.add(fill);
    const neonBack = new THREE.PointLight(0xff44aa, 0.5);
    neonBack.position.set(0, 2, -5);
    scene.add(neonBack);
    
    // --- Mundo físico com mais precisão
    const world = new CANNON.World();
    world.gravity = new CANNON.Vec3(0, -CFG.gravity, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 18;
    world.defaultContactMaterial.restitution = 0.55;
    
    const matBall = new CANNON.Material('ball');
    const matTable = new CANNON.Material('table');
    const matBumper = new CANNON.Material('bumper');
    const matFlipper = new CANNON.Material('flipper');
    
    world.addContactMaterial(new CANNON.ContactMaterial(matBall, matTable, { friction: 0.06, restitution: CFG.restitution, contactEquationStiffness: 1e9 }));
    world.addContactMaterial(new CANNON.ContactMaterial(matBall, matBumper, { friction: 0.02, restitution: 0.92, contactEquationStiffness: 1e9 }));
    world.addContactMaterial(new CANNON.ContactMaterial(matBall, matFlipper, { friction: 0.03, restitution: 0.78, contactEquationStiffness: 1e9 }));
    
    // --- Mesa visual
    const tableGroup = new THREE.Group();
    scene.add(tableGroup);
    const playMat = new THREE.MeshStandardMaterial({ color: 0x0b1426, metalness: 0.7, roughness: 0.4, emissive: 0x001133 });
    const planeGeo = new THREE.PlaneGeometry(CFG.table.w, CFG.table.h);
    const playfield = new THREE.Mesh(planeGeo, playMat);
    playfield.rotation.x = -Math.PI/2 + CFG.tilt;
    playfield.position.y = 0;
    playfield.receiveShadow = true;
    tableGroup.add(playfield);
    
    // Bordas
    const borderMat = new THREE.MeshStandardMaterial({ color: 0x0a1120, metalness: 0.8, emissive: 0x0a4c6e });
    const addBorder = (x, z, w, d) => {
      const box = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), borderMat);
      box.position.set(x, 0.2, z);
      box.castShadow = true;
      tableGroup.add(box);
    };
    addBorder(-CFG.table.w/2 - 0.19, 0, CFG.table.wall, CFG.table.h);
    addBorder( CFG.table.w/2 + 0.19, 0, CFG.table.wall, CFG.table.h);
    addBorder(0, -CFG.table.h/2 - 0.19, CFG.table.w + 0.76, CFG.table.wall);
    const drainGap = 1.25;
    addBorder(-(drainGap/2 + (CFG.table.w-drainGap)/4), CFG.table.h/2 + 0.19, (CFG.table.w-drainGap)/2, CFG.table.wall);
    addBorder( (drainGap/2 + (CFG.table.w-drainGap)/4), CFG.table.h/2 + 0.19, (CFG.table.w-drainGap)/2, CFG.table.wall);
    
    // Paredes físicas
    function addPhysBox(w,h,d, x,y,z, mat=matTable) {
      const body = new CANNON.Body({ mass:0, material:mat });
      body.addShape(new CANNON.Box(new CANNON.Vec3(w/2,h/2,d/2)));
      body.position.set(x,y,z);
      world.addBody(body);
    }
    addPhysBox(CFG.table.wall,0.7,CFG.table.h, -CFG.table.w/2-0.19,0.35,0);
    addPhysBox(CFG.table.wall,0.7,CFG.table.h,  CFG.table.w/2+0.19,0.35,0);
    addPhysBox(CFG.table.w+0.8,0.7,CFG.table.wall, 0,0.35,-CFG.table.h/2-0.19);
    addPhysBox((CFG.table.w-drainGap)/2,0.7,CFG.table.wall, -(drainGap/2 + (CFG.table.w-drainGap)/4),0.35, CFG.table.h/2+0.19);
    addPhysBox((CFG.table.w-drainGap)/2,0.7,CFG.table.wall,  (drainGap/2 + (CFG.table.w-drainGap)/4),0.35, CFG.table.h/2+0.19);
    
    // Plano inclinado
    const inclinePlane = new CANNON.Body({ mass:0, material:matTable });
    inclinePlane.addShape(new CANNON.Plane());
    inclinePlane.quaternion.setFromEuler(-Math.PI/2 + CFG.tilt, 0, 0);
    world.addBody(inclinePlane);
    
    // --- Bumpers
    const bumpers = [];
    const bumperMeshes = [];
    const positions = [
      { x:-2.05, z:-2.4, r:0.38, pts:70, col:0x0af },
      { x:0, z:-2.9, r:0.42, pts:100, col:0xf0f },
      { x:2.1, z:-2.35, r:0.38, pts:70, col:0x8f8 },
      { x:0, z:-4.5, r:0.45, pts:150, col:0xfa3 },
      { x:-1.2, z:-1.1, r:0.32, pts:55, col:0x6cf },
      { x:1.3, z:-1.05, r:0.32, pts:55, col:0x6cf }
    ];
    positions.forEach(b => {
      const body = new CANNON.Body({ mass:0, material:matBumper });
      body.addShape(new CANNON.Sphere(b.r));
      body.position.set(b.x, 0.4, b.z);
      world.addBody(body);
      bumpers.push({ body, pts: b.pts });
      const cyl = new THREE.Mesh(new THREE.CylinderGeometry(b.r*0.92, b.r, 0.28, 24), new THREE.MeshStandardMaterial({ color: b.col, emissive: b.col, emissiveIntensity: 0.7 }));
      cyl.position.set(b.x, 0.2, b.z);
      tableGroup.add(cyl);
      bumperMeshes.push(cyl);
    });
    
    // --- FLIPPERS com HingeConstraint funcional (cannon-es correto)
    function createFlipper(isLeft) {
      const len = CFG.flipper.length, w = CFG.flipper.width, h = CFG.flipper.height;
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, h, w), new THREE.MeshStandardMaterial({ color: isLeft ? 0x2a6f9f : 0x9f3f8a, metalness: 0.7, emissive: isLeft ? 0x0088aa : 0xff66cc }));
      mesh.castShadow = true;
      tableGroup.add(mesh);
      
      const body = new CANNON.Body({ mass: 0.9, material: matFlipper });
      body.addShape(new CANNON.Box(new CANNON.Vec3(len/2, h/2, w/2)));
      const baseX = isLeft ? -1.05 : 1.05;
      const baseZ = 3.85;
      body.position.set(baseX, 0.23, baseZ);
      world.addBody(body);
      
      const pivotOffsetX = isLeft ? -len/2 + 0.17 : len/2 - 0.17;
      const pivotWorld = new CANNON.Body({ mass: 0, material: matTable });
      pivotWorld.addShape(new CANNON.Sphere(0.05));
      pivotWorld.position.set(baseX + pivotOffsetX, 0.23, baseZ);
      world.addBody(pivotWorld);
      
      // HingeConstraint: eixo Y
      const hinge = new CANNON.HingeConstraint(body, pivotWorld, {
        pivotA: new CANNON.Vec3(pivotOffsetX, 0, 0),
        axisA: new CANNON.Vec3(0, 1, 0),
        pivotB: new CANNON.Vec3(0, 0, 0),
        axisB: new CANNON.Vec3(0, 1, 0),
        maxForce: 1e6
      });
      const low = isLeft ? -0.72 : -0.22;
      const high = isLeft ? 0.22 : 0.72;
      hinge.setLimits(low, high);
      hinge.enableMotor();
      hinge.setMotorMaxForce(CFG.flipper.maxForce);
      hinge.setMotorSpeed(0);
      world.addConstraint(hinge);
      
      return { mesh, body, hinge, isLeft };
    }
    
    const leftFlip = createFlipper(true);
    const rightFlip = createFlipper(false);
    
    // --- Bola
    const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(CFG.ballRadius, 48, 48), new THREE.MeshStandardMaterial({ color: 0xeef5ff, metalness: 0.92, emissive: 0x2266aa }));
    ballMesh.castShadow = true;
    scene.add(ballMesh);
    const ballBody = new CANNON.Body({ mass: 0.62, material: matBall, linearDamping: 0.1, angularDamping: 0.25 });
    ballBody.addShape(new CANNON.Sphere(CFG.ballRadius));
    world.addBody(ballBody);
    
    // --- Game state
    let score = 0, balls = 3, multiplier = 1, paused = false, comboCount = 0, comboTimeout;
    let plungerPower = 0;
    let plungerCharging = false;
    
    function updateUI() {
      scoreEl.textContent = score;
      ballsEl.textContent = balls;
      multEl.textContent = `${multiplier}x`;
    }
    
    function resetBallLauncher() {
      ballBody.velocity.set(0,0,0);
      ballBody.angularVelocity.set(0,0,0);
      ballBody.position.set(2.3, 0.55, 4.3);
    }
    
    function addPoints(base) {
      if(paused) return;
      const gain = base * multiplier;
      score += gain;
      updateUI();
      showMessage(`+${gain}`);
      comboCount++;
      if(comboCount >= 3 && multiplier < 5) { multiplier++; updateUI(); showMessage(`COMBO x${multiplier}!`); comboCount=0; }
      clearTimeout(comboTimeout);
      comboTimeout = setTimeout(() => { multiplier = 1; comboCount=0; updateUI(); }, 3000);
    }
    
    function loseBall() {
      if(paused) return;
      balls--;
      updateUI();
      if(balls <= 0) { paused = true; showMessage(`GAME OVER - ${score} pts`); }
      else { showMessage("Bola perdida!"); resetBallLauncher(); }
    }
    
    function checkDrain() {
      if(ballBody.position.y < -1.3 || ballBody.position.z > 7.7) loseBall();
      if(Math.abs(ballBody.position.x) > 3.85) ballBody.position.x *= 0.98;
    }
    
    // --- PLUNGER (segurar espaço / touch)
    function startCharge() { if(!paused && balls>0) plungerCharging = true; }
    function releaseCharge() {
      if(!plungerCharging || paused) { plungerCharging=false; plungerPower=0; plungerFill.style.height='0%'; return; }
      const power = Math.min(plungerPower, 1.0);
      const pos = ballBody.position;
      if(pos.z > 3.7 && (pos.x > 1.2 || pos.x < -1.2)) {
        const vx = (Math.random()-0.5)*0.8;
        const vz = -7.5 - power * 5.5;
        ballBody.velocity.set(vx, 2.2 + power*1.5, vz);
        showMessage(`LANÇAR! ${Math.floor(power*100)}%`);
      } else showMessage("Bola fora do lançador");
      plungerCharging = false;
      plungerPower = 0;
      plungerFill.style.height = '0%';
    }
    
    // Atualização do plunger (keyboard + touch)
    let plungerInterval = null;
    function updatePlungerCharge(dt) {
      if(plungerCharging && !paused) {
        plungerPower = Math.min(plungerPower + dt * 2.2, 1.0);
        plungerFill.style.height = `${plungerPower * 100}%`;
      }
    }
    
    // --- Inputs (teclado + mobile)
    const keys = { left: false, right: false };
    window.addEventListener('keydown', (e) => {
      if(e.code === 'ArrowLeft') { keys.left=true; e.preventDefault(); }
      if(e.code === 'ArrowRight') { keys.right=true; e.preventDefault(); }
      if(e.code === 'Space') { startCharge(); e.preventDefault(); }
      if(e.code === 'KeyR') { score=0; balls=3; multiplier=1; paused=false; updateUI(); resetBallLauncher(); showMessage("RESET"); }
      if(e.code === 'KeyP') { paused=!paused; showMessage(paused?"PAUSE":"PLAY"); }
    });
    window.addEventListener('keyup', (e) => {
      if(e.code === 'ArrowLeft') keys.left=false;
      if(e.code === 'ArrowRight') keys.right=false;
      if(e.code === 'Space') releaseCharge();
    });
    // Mobile touch
    document.getElementById('touchLeft').addEventListener('touchstart', (e) => { keys.left=true; e.preventDefault(); });
    document.getElementById('touchLeft').addEventListener('touchend', () => keys.left=false);
    document.getElementById('touchRight').addEventListener('touchstart', (e) => { keys.right=true; e.preventDefault(); });
    document.getElementById('touchRight').addEventListener('touchend', () => keys.right=false);
    const plungerBtn = document.getElementById('touchPlunger');
    plungerBtn.addEventListener('touchstart', (e) => { startCharge(); e.preventDefault(); });
    plungerBtn.addEventListener('touchend', () => releaseCharge());
    // Mouse support para testar
    plungerBtn.addEventListener('mousedown', startCharge);
    window.addEventListener('mouseup', (e) => { if(plungerCharging) releaseCharge(); });
    
    function updateFlippers(dt) {
      const leftSpd = keys.left ? CFG.flipper.speedUp : CFG.flipper.speedDown;
      const rightSpd = keys.right ? CFG.flipper.speedUp : CFG.flipper.speedDown;
      leftFlip.hinge.setMotorSpeed(leftSpd);
      rightFlip.hinge.setMotorSpeed(rightSpd);
    }
    
    // --- LOOP PRINCIPAL
    let lastTime = performance.now();
    let accumulator = 0;
    let timeAnim = 0;
    
    function animate(now) {
      requestAnimationFrame(animate);
      let dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      
      if(!paused) {
        updateFlippers(dt);
        updatePlungerCharge(dt);
        accumulator += dt;
        while(accumulator >= 1/120) { world.step(1/120); accumulator -= 1/120; }
        checkDrain();
      }
      
      // Sync
      ballMesh.position.copy(ballBody.position);
      leftFlip.mesh.position.copy(leftFlip.body.position);
      leftFlip.mesh.quaternion.copy(leftFlip.body.quaternion);
      rightFlip.mesh.position.copy(rightFlip.body.position);
      rightFlip.mesh.quaternion.copy(rightFlip.body.quaternion);
      
      timeAnim += dt;
      bumperMeshes.forEach((m, i) => { if(m.material) m.material.emissiveIntensity = 0.55 + Math.sin(timeAnim*3 + i)*0.25; });
      
      camera.lookAt(0, 1.2, 0);
      renderer.render(scene, camera);
    }
    
    resetBallLauncher();
    updateUI();
    showMessage("PINBALL 2.5D | ← → | SEGURE ESPAÇO p/ PLUNGER");
    requestAnimationFrame(animate);
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // estrelas
    const starGeo = new THREE.BufferGeometry();
    const starsPos = [];
    for(let i=0;i<800;i++) starsPos.push((Math.random()-0.5)*200, (Math.random()-0.5)*80, (Math.random()-0.5)*80-40);
    starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPos), 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.08 })));
  </script>
</body>
</html>
