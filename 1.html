<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pinball 3D — Versão Completa (Sem Dependências Externas)</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#05060a; font-family:system-ui,Segoe UI,Arial,sans-serif; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      padding: 10px 12px; border-radius: 12px;
      background: rgba(0,0,0,.55); color: #eaf2ff;
      backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.12);
      width: min(360px, calc(100vw - 24px));
      pointer-events: none;
    }
    #hud h1 { font-size: 14px; margin: 0 0 6px; font-weight: 700; }
    #hud .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .pill {
      display:inline-flex; align-items:center; gap:8px;
      padding: 6px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-size: 12px;
      pointer-events: auto;
    }
    .pill b { color:#9dd6ff; font-weight: 800; }
    #hint { margin-top: 8px; font-size: 12px; line-height: 1.35; opacity:.92; }
    #hint kbd {
      font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size: 11px; padding: 2px 6px; border-radius: 6px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
    }
    #toast {
      position: fixed; right: 12px; top: 12px; z-index: 10;
      padding: 10px 12px; border-radius: 12px;
      background: rgba(15, 23, 42, .85); color: #eaf2ff;
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(6px);
      max-width: min(360px, calc(100vw - 24px));
      display:none;
      font-size: 13px;
      pointer-events: none;
    }
    #toast.show { display:block; }
    canvas { display:block; }
    button.pill {
      pointer-events: auto;
      cursor: pointer;
      background: rgba(255,255,255,.12);
      transition: all 0.1s ease;
    }
    button.pill:hover {
      background: rgba(255,255,255,.24);
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div id="hud">
    <h1>🎱 Pinball 3D — Versão Completa</h1>
    <div class="row">
      <div class="pill">🏆 Pontuação: <b id="score">0</b></div>
      <div class="pill">🟡 Bolas: <b id="balls">3</b></div>
      <div class="pill">⚡ FPS: <b id="fps">—</b></div>
      <button id="resetBtn" class="pill" style="border-color:#ffaa44;">🔄 Reset</button>
    </div>
    <div id="hint">
      Controles:
      <div style="margin-top:6px;">
        <kbd>←</kbd>/<kbd>→</kbd> Flippers &nbsp; • &nbsp;
        <kbd>Espaço</kbd> Lançar &nbsp; • &nbsp;
        <kbd>R</kbd> Reset &nbsp; • &nbsp;
        <kbd>P</kbd> Pausar
      </div>
      <div style="margin-top:6px;">
        🖱️ Mouse: arraste para girar câmera. Scroll para zoom.
      </div>
    </div>
  </div>
  <div id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    
    // ---------- HUD Elements ----------
    const elScore = document.getElementById('score');
    const elBalls = document.getElementById('balls');
    const elFps   = document.getElementById('fps');
    const toast   = document.getElementById('toast');
    const resetBtn = document.getElementById('resetBtn');
    
    function showToast(msg, ms=1400) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
    }
    
    // ========== CONFIGURAÇÃO ==========
    const CFG = {
      tilt: 0.18,
      gravity: 16,
      ballRadius: 0.18,
      tableW: 6.2,
      tableH: 10.5,
      wallThick: 0.35
    };
    
    // ========== VARIÁVEIS GLOBAIS ==========
    let scene, camera, renderer, controls;
    let ballMesh;
    let ballPos = new THREE.Vector3(2.45, 0.45, 4.10);
    let ballVel = new THREE.Vector3(0, 0, 0);
    let flipperLeftAngle = 0, flipperRightAngle = 0;
    let flipperLeftMesh, flipperRightMesh;
    let leftPressed = false, rightPressed = false;
    let score = 0, balls = 3, paused = false, gameActive = true;
    let bumperMeshes = [];
    let bumperPositions = [];
    let bumperPoints = [];
    let lastTimestamp = 0;
    let frameCount = 0, lastFpsUpdate = 0;
    
    // ========== FUNÇÕES DE FÍSICA ==========
    function checkCollisionWithSphere(center, radius) {
      const dx = ballPos.x - center.x;
      const dz = ballPos.z - center.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist < CFG.ballRadius + radius) {
        const overlap = (CFG.ballRadius + radius) - dist;
        const nx = dx / dist;
        const nz = dz / dist;
        ballPos.x += nx * overlap;
        ballPos.z += nz * overlap;
        const dot = ballVel.x * nx + ballVel.z * nz;
        if (dot < 0) {
          const impulse = 1.6;
          ballVel.x -= nx * dot * impulse;
          ballVel.z -= nz * dot * impulse;
        }
        return true;
      }
      return false;
    }
    
    function updatePhysics(dt) {
      if (paused || !gameActive) return;
      
      // Gravidade
      ballVel.y -= CFG.gravity * dt;
      
      // Movimento
      ballPos.x += ballVel.x * dt;
      ballPos.y += ballVel.y * dt;
      ballPos.z += ballVel.z * dt;
      
      // Damping
      ballVel.x *= 0.995;
      ballVel.z *= 0.995;
      
      // Plano da mesa (inclinado)
      const tableY = 0.2 + (ballPos.z + 4) * 0.025;
      if (ballPos.y - CFG.ballRadius < tableY) {
        ballPos.y = tableY + CFG.ballRadius;
        ballVel.y = -ballVel.y * 0.55;
        // Atrito
        ballVel.x *= 0.98;
        ballVel.z *= 0.98;
      }
      
      // Limites da mesa (paredes)
      const limitX = CFG.tableW/2 - CFG.ballRadius;
      const limitZ_front = CFG.tableH/2 - CFG.ballRadius;
      const limitZ_back = -CFG.tableH/2 + CFG.ballRadius;
      
      if (ballPos.x > limitX) { ballPos.x = limitX; ballVel.x = -ballVel.x * 0.5; }
      if (ballPos.x < -limitX) { ballPos.x = -limitX; ballVel.x = -ballVel.x * 0.5; }
      if (ballPos.z > limitZ_front) { ballPos.z = limitZ_front; ballVel.z = -ballVel.z * 0.5; }
      if (ballPos.z < limitZ_back) { ballPos.z = limitZ_back; ballVel.z = -ballVel.z * 0.5; }
      
      // Dreno (saída da bola)
      if (ballPos.z > 5.2 && Math.abs(ballPos.x) < 0.8) {
        loseBall();
      }
      
      // Colisão com bumpers
      for (let i = 0; i < bumperPositions.length; i++) {
        if (checkCollisionWithSphere(bumperPositions[i], 0.32)) {
          score += bumperPoints[i];
          elScore.textContent = score;
          showToast(`+${bumperPoints[i]} pts!`);
          // Efeito visual no bumper
          if (bumperMeshes[i] && bumperMeshes[i].material) {
            bumperMeshes[i].material.emissiveIntensity = 1.2;
            setTimeout(() => {
              if (bumperMeshes[i] && bumperMeshes[i].material) bumperMeshes[i].material.emissiveIntensity = 0.5;
            }, 150);
          }
        }
      }
      
      // Colisão com flippers
      const flipperColLeft = checkFlipperCollision(-1.0, 3.65, flipperLeftAngle, true);
      const flipperColRight = checkFlipperCollision(1.0, 3.65, flipperRightAngle, false);
      
      // Atualiza rotação dos flippers
      const targetLeft = leftPressed ? 0.6 : -0.5;
      const targetRight = rightPressed ? -0.6 : 0.5;
      flipperLeftAngle += (targetLeft - flipperLeftAngle) * 0.3;
      flipperRightAngle += (targetRight - flipperRightAngle) * 0.3;
      
      if (flipperLeftMesh) flipperLeftMesh.rotation.z = flipperLeftAngle;
      if (flipperRightMesh) flipperRightMesh.rotation.z = flipperRightAngle;
    }
    
    function checkFlipperCollision(fx, fz, angle, isLeft) {
      // Simplificado: área aproximada do flipper
      const dx = ballPos.x - fx;
      const dz = ballPos.z - fz;
      const len = 1.1;
      const rot = angle;
      // Rotaciona o ponto relativo
      const localX = dx * Math.cos(rot) + dz * Math.sin(rot);
      const localZ = -dx * Math.sin(rot) + dz * Math.cos(rot);
      
      if (Math.abs(localX) < 0.25 && localZ > 0 && localZ < len && Math.abs(ballPos.y - 0.35) < 0.25) {
        // Aplica impulso
        const force = (isLeft ? 8 : -8);
        ballVel.x += force;
        ballVel.z = -6;
        return true;
      }
      return false;
    }
    
    function loseBall() {
      if (!gameActive) return;
      balls--;
      elBalls.textContent = balls;
      if (balls <= 0) {
        gameActive = false;
        paused = true;
        showToast(`💀 FIM DE JOGO! Pontuação: ${score}`, 3000);
      } else {
        showToast("😓 Bola perdida!", 1000);
        resetBall(true);
      }
    }
    
    function resetBall(toLauncher = true) {
      ballVel.set(0, 0, 0);
      if (toLauncher) {
        ballPos.set(2.45, 0.45, 4.10);
      } else {
        ballPos.set(0, 0.55, 0.8);
      }
    }
    
    function launchBall() {
      if (paused || !gameActive) return;
      if (ballPos.z > 3.8 && ballPos.x > 1.7) {
        ballVel.set(-1.5 + Math.random() * 1, 2.5, -10);
        showToast("🚀 Lançada!");
      }
    }
    
    function resetGame() {
      score = 0;
      balls = 3;
      paused = false;
      gameActive = true;
      elScore.textContent = score;
      elBalls.textContent = balls;
      resetBall(true);
      showToast("🔄 Jogo resetado!");
    }
    
    // ========== CRIAÇÃO DA CENA ==========
    function init() {
      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);
      
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05060a);
      scene.fog = new THREE.FogExp2(0x05060a, 0.02);
      
      // Camera
      camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
      camera.position.set(0, 7, 13);
      camera.lookAt(0, 1, 0);
      
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 1, 0);
      controls.maxPolarAngle = Math.PI / 2.2;
      
      // Luzes
      const ambient = new THREE.AmbientLight(0x88aaff, 0.35);
      scene.add(ambient);
      
      const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
      mainLight.position.set(5, 10, 5);
      mainLight.castShadow = true;
      scene.add(mainLight);
      
      const fillLight = new THREE.PointLight(0x4466cc, 0.5);
      fillLight.position.set(-3, 4, 2);
      scene.add(fillLight);
      
      // Mesa
      const tableGroup = new THREE.Group();
      
      // Playfield (inclinado)
      const planeMat = new THREE.MeshStandardMaterial({ color: 0x0b1220, metalness: 0.4, roughness: 0.3, emissive: 0x001122, emissiveIntensity: 0.2 });
      const playfield = new THREE.Mesh(new THREE.PlaneGeometry(CFG.tableW, CFG.tableH), planeMat);
      playfield.rotation.x = -Math.PI/2 + CFG.tilt;
      playfield.position.y = 0;
      playfield.receiveShadow = true;
      tableGroup.add(playfield);
      
      // Paredes
      const wallMat = new THREE.MeshStandardMaterial({ color: 0x111827, metalness: 0.3 });
      
      const leftWall = new THREE.Mesh(new THREE.BoxGeometry(CFG.wallThick, 0.5, CFG.tableH), wallMat);
      leftWall.position.set(-CFG.tableW/2 - CFG.wallThick/2, 0.25, 0);
      tableGroup.add(leftWall);
      
      const rightWall = new THREE.Mesh(new THREE.BoxGeometry(CFG.wallThick, 0.5, CFG.tableH), wallMat);
      rightWall.position.set(CFG.tableW/2 + CFG.wallThick/2, 0.25, 0);
      tableGroup.add(rightWall);
      
      const topWall = new THREE.Mesh(new THREE.BoxGeometry(CFG.tableW + CFG.wallThick*2, 0.5, CFG.wallThick), wallMat);
      topWall.position.set(0, 0.25, -CFG.tableH/2 - CFG.wallThick/2);
      tableGroup.add(topWall);
      
      // Bumpers
      const bumperData = [
        { x: -1.8, z: -2.0, pts: 50, color: 0x00e5ff },
        { x: 0, z: -2.6, pts: 75, color: 0xff2bd6 },
        { x: 1.9, z: -1.9, pts: 50, color: 0x7cfc00 },
        { x: 0, z: -4.2, pts: 100, color: 0xffcc00 }
      ];
      
      bumperData.forEach((data, idx) => {
        const geo = new THREE.CylinderGeometry(0.32, 0.32, 0.28, 24);
        const mat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.6 });
        const bumper = new THREE.Mesh(geo, mat);
        bumper.position.set(data.x, 0.14, data.z);
        bumper.castShadow = true;
        tableGroup.add(bumper);
        bumperMeshes.push(bumper);
        bumperPositions.push(new THREE.Vector3(data.x, 0.35, data.z));
        bumperPoints.push(data.pts);
        
        // Luz pontual no bumper
        const light = new THREE.PointLight(data.color, 0.5, 8);
        light.position.set(data.x, 0.5, data.z);
        scene.add(light);
      });
      
      // Flippers
      const flipperMat = new THREE.MeshStandardMaterial({ color: 0x1b2a42, metalness: 0.6, emissive: 0x00e5ff, emissiveIntensity: 0.3 });
      const leftFlipperGeo = new THREE.BoxGeometry(1.1, 0.14, 0.22);
      flipperLeftMesh = new THREE.Mesh(leftFlipperGeo, flipperMat);
      flipperLeftMesh.position.set(-1.0, 0.22, 3.65);
      flipperLeftMesh.castShadow = true;
      tableGroup.add(flipperLeftMesh);
      
      const rightFlipperGeo = new THREE.BoxGeometry(1.1, 0.14, 0.22);
      flipperRightMesh = new THREE.Mesh(rightFlipperGeo, flipperMat);
      flipperRightMesh.position.set(1.0, 0.22, 3.65);
      flipperRightMesh.castShadow = true;
      tableGroup.add(flipperRightMesh);
      
      scene.add(tableGroup);
      
      // Bola
      const ballMat = new THREE.MeshStandardMaterial({ color: 0xeaeef7, metalness: 0.9, roughness: 0.12 });
      ballMesh = new THREE.Mesh(new THREE.SphereGeometry(CFG.ballRadius, 48, 48), ballMat);
      ballMesh.castShadow = true;
      scene.add(ballMesh);
      
      // Grid auxiliar (opcional)
      const gridHelper = new THREE.GridHelper(15, 20, 0x88aaff, 0x335588);
      gridHelper.position.y = -0.5;
      scene.add(gridHelper);
      
      // ========== INPUT ==========
      window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
        if (e.code === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
        if (e.code === 'Space') { launchBall(); e.preventDefault(); }
        if (e.code === 'KeyR') { resetGame(); e.preventDefault(); }
        if (e.code === 'KeyP') { paused = !paused; showToast(paused ? "⏸️ Pausado" : "▶️ Rodando"); e.preventDefault(); }
      });
      
      window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft') leftPressed = false;
        if (e.code === 'ArrowRight') rightPressed = false;
      });
      
      resetBtn.addEventListener('click', () => resetGame());
      
      // ========== LOOP ==========
      let lastTime = performance.now();
      
      function animate() {
        const now = performance.now();
        let dt = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        
        // FPS counter
        frameCount++;
        if (now - lastFpsUpdate > 500) {
          elFps.textContent = Math.round(frameCount / ((now - lastFpsUpdate) / 1000));
          frameCount = 0;
          lastFpsUpdate = now;
        }
        
        updatePhysics(dt);
        
        // Atualiza posição da bola
        ballMesh.position.copy(ballPos);
        
        // Animação dos bumpers
        const t = now * 0.005;
        bumperMeshes.forEach((mesh, idx) => {
          if (mesh.material) mesh.material.emissiveIntensity = 0.5 + Math.sin(t + idx) * 0.3;
        });
        
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      
      resetGame();
      showToast("🎮 Pinball 3D pronto! Use ← → e Espaço.", 2000);
      animate();
    }
    
    // Inicialização
    init();
    
    window.addEventListener('resize', () => {
      if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>
</html>
