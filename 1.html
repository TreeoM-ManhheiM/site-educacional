<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pinball 2.5D — Funcional!</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
    #info {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 20px;
      color: cyan;
      backdrop-filter: blur(6px);
      pointer-events: none;
      z-index: 10;
      font-weight: bold;
      font-size: 14px;
      border-left: 3px solid cyan;
    }
    #score, #balls { color: #ffaa44; font-size: 1.2em; }
    #controls {
      position: absolute;
      bottom: 15px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      font-size: 12px;
      color: #aaa;
      font-family: monospace;
      z-index: 10;
    }
    kbd {
      background: #222;
      border-radius: 4px;
      padding: 2px 6px;
      margin: 0 3px;
      color: #0ff;
    }
    @media (max-width: 700px) {
      #info { font-size: 10px; top: 8px; left: 8px; }
      #controls { font-size: 9px; }
    }
  </style>
</head>
<body>
<div id="info">
  🎯 SCORE: <span id="score">0</span> &nbsp;|&nbsp;
  💥 BALLS: <span id="balls">3</span> &nbsp;|&nbsp;
  ⚡ MULTI: <span id="mult">1x</span>
</div>
<div id="controls">
  🕹️ <kbd>←</kbd> <kbd>→</kbd> FLIPPERS &nbsp;&nbsp;|&nbsp;&nbsp;
  🚀 <kbd>ESPACE</kbd> (segurar para carregar, soltar para lançar) &nbsp;&nbsp;|&nbsp;&nbsp;
  🔄 <kbd>R</kbd> RESET &nbsp;&nbsp;|&nbsp;&nbsp;
  ⏸️ <kbd>P</kbd> PAUSE
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import * as CANNON from 'cannon-es';

  // ---------- UI ----------
  const scoreSpan = document.getElementById('score');
  const ballsSpan = document.getElementById('balls');
  const multSpan = document.getElementById('mult');

  let score = 0;
  let ballsLeft = 3;
  let multiplier = 1;
  let paused = false;
  let comboCounter = 0;
  let comboTimer = null;

  function updateUI() {
    scoreSpan.textContent = score;
    ballsSpan.textContent = ballsLeft;
    multSpan.textContent = `${multiplier}x`;
  }

  function showMsg(msg, duration = 1200) {
    const el = document.createElement('div');
    el.textContent = msg;
    el.style.position = 'absolute';
    el.style.bottom = '50px';
    el.style.left = '50%';
    el.style.transform = 'translateX(-50%)';
    el.style.backgroundColor = '#0ff';
    el.style.color = '#000';
    el.style.padding = '4px 12px';
    el.style.borderRadius = '20px';
    el.style.fontSize = '14px';
    el.style.fontWeight = 'bold';
    el.style.zIndex = '20';
    el.style.whiteSpace = 'nowrap';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), duration);
  }

  // ---------- CONFIGURAÇÃO FÍSICA ----------
  const CFG = {
    tilt: 0.18,
    gravity: 18,
    ballRadius: 0.22,
    tableW: 6.0,
    tableH: 10.0,
    wall: 0.4,
    flipperLen: 1.05,
    flipperW: 0.25,
    flipperH: 0.14,
    flipperSpeed: 22,
    flipperForce: 180
  };

  // --- Three.js
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.setClearColor(0x030614);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x030614, 0.025);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 40);
  camera.position.set(0, 5.4, 12.2);
  camera.lookAt(0, 1.2, 0);

  // Luzes
  const ambient = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambient);
  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(4, 12, 5);
  mainLight.castShadow = true;
  scene.add(mainLight);
  const fill = new THREE.PointLight(0x4488ff, 0.6);
  fill.position.set(-2, 3, 4);
  scene.add(fill);
  const rim = new THREE.PointLight(0xff66aa, 0.5);
  rim.position.set(0, 2.5, -4);
  scene.add(rim);

  // --- Mundo CANNON
  const world = new CANNON.World();
  world.gravity = new CANNON.Vec3(0, -CFG.gravity, 0);
  world.broadphase = new CANNON.NaiveBroadphase();
  world.solver.iterations = 16;

  const matBall = new CANNON.Material('ball');
  const matTable = new CANNON.Material('table');
  const matBumper = new CANNON.Material('bumper');
  const matFlipper = new CANNON.Material('flipper');

  world.addContactMaterial(new CANNON.ContactMaterial(matBall, matTable, { friction: 0.06, restitution: 0.65, contactEquationStiffness: 1e9 }));
  world.addContactMaterial(new CANNON.ContactMaterial(matBall, matBumper, { friction: 0.02, restitution: 0.92, contactEquationStiffness: 1e9 }));
  world.addContactMaterial(new CANNON.ContactMaterial(matBall, matFlipper, { friction: 0.04, restitution: 0.8, contactEquationStiffness: 1e9 }));
  world.defaultContactMaterial.material1 = matTable;
  world.defaultContactMaterial.material2 = matBall;

  // --- Mesa visual + física
  const tableGroup = new THREE.Group();
  scene.add(tableGroup);

  // Plano inclinado
  const playMat = new THREE.MeshStandardMaterial({ color: 0x0c1430, metalness: 0.7, roughness: 0.4, emissive: 0x001133 });
  const plane = new THREE.Mesh(new THREE.PlaneGeometry(CFG.tableW, CFG.tableH), playMat);
  plane.rotation.x = -Math.PI/2 + CFG.tilt;
  plane.position.y = 0;
  plane.receiveShadow = true;
  tableGroup.add(plane);

  const inclineBody = new CANNON.Body({ mass: 0, material: matTable });
  inclineBody.addShape(new CANNON.Plane());
  inclineBody.quaternion.setFromEuler(-Math.PI/2 + CFG.tilt, 0, 0);
  world.addBody(inclineBody);

  // Bordas
  function addWallPhys(x, z, w, d) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: 0x111a2a, metalness: 0.7 }));
    mesh.position.set(x, 0.2, z);
    mesh.castShadow = true;
    tableGroup.add(mesh);
    const body = new CANNON.Body({ mass: 0, material: matTable });
    body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, 0.25, d/2)));
    body.position.set(x, 0.25, z);
    world.addBody(body);
  }

  addWallPhys(-CFG.tableW/2 - 0.2, 0, CFG.wall, CFG.tableH);
  addWallPhys( CFG.tableW/2 + 0.2, 0, CFG.wall, CFG.tableH);
  addWallPhys(0, -CFG.tableH/2 - 0.2, CFG.tableW + 0.8, CFG.wall);
  const drainGap = 1.2;
  addWallPhys(-(drainGap/2 + (CFG.tableW-drainGap)/4), CFG.tableH/2 + 0.2, (CFG.tableW-drainGap)/2, CFG.wall);
  addWallPhys( (drainGap/2 + (CFG.tableW-drainGap)/4), CFG.tableH/2 + 0.2, (CFG.tableW-drainGap)/2, CFG.wall);

  // --- Bumpers
  const bumpers = [];
  const bumperMeshes = [];
  const bumperList = [
    { x: -1.85, z: -2.2, r: 0.38, pts: 70, col: 0x33ccff },
    { x: 0, z: -2.7, r: 0.42, pts: 100, col: 0xff44ff },
    { x: 1.9, z: -2.15, r: 0.38, pts: 70, col: 0x88ff44 },
    { x: 0, z: -4.3, r: 0.46, pts: 150, col: 0xffaa44 },
    { x: -1.2, z: -0.9, r: 0.33, pts: 55, col: 0x66aaff },
    { x: 1.25, z: -0.85, r: 0.33, pts: 55, col: 0x66aaff }
  ];

  bumperList.forEach(b => {
    const body = new CANNON.Body({ mass: 0, material: matBumper });
    body.addShape(new CANNON.Sphere(b.r));
    body.position.set(b.x, 0.4, b.z);
    world.addBody(body);
    bumpers.push({ body, pts: b.pts });
    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(b.r*0.92, b.r, 0.28, 24), new THREE.MeshStandardMaterial({ color: b.col, emissive: b.col, emissiveIntensity: 0.7 }));
    cyl.position.set(b.x, 0.2, b.z);
    cyl.castShadow = true;
    tableGroup.add(cyl);
    bumperMeshes.push(cyl);
  });

  // --- Flippers com HingeConstraint (funcional)
  function createFlipper(isLeft) {
    const len = CFG.flipperLen;
    const w = CFG.flipperW;
    const h = CFG.flipperH;
    const color = isLeft ? 0x2a7fbf : 0xbf3f8a;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, h, w), new THREE.MeshStandardMaterial({ color, metalness: 0.8, emissive: isLeft ? 0x0088aa : 0xff55aa }));
    mesh.castShadow = true;
    tableGroup.add(mesh);

    const body = new CANNON.Body({ mass: 0.85, material: matFlipper });
    body.addShape(new CANNON.Box(new CANNON.Vec3(len/2, h/2, w/2)));
    const baseX = isLeft ? -1.08 : 1.08;
    const baseZ = 3.85;
    body.position.set(baseX, 0.25, baseZ);
    world.addBody(body);

    const pivotOff = isLeft ? -len/2 + 0.18 : len/2 - 0.18;
    const pivotBody = new CANNON.Body({ mass: 0 });
    pivotBody.position.set(baseX + pivotOff, 0.25, baseZ);
    world.addBody(pivotBody);

    const hinge = new CANNON.HingeConstraint(body, pivotBody, {
      pivotA: new CANNON.Vec3(pivotOff, 0, 0),
      axisA: new CANNON.Vec3(0, 1, 0),
      pivotB: new CANNON.Vec3(0, 0, 0),
      axisB: new CANNON.Vec3(0, 1, 0),
      maxForce: CFG.flipperForce
    });
    const low = isLeft ? -0.72 : -0.25;
    const high = isLeft ? 0.25 : 0.72;
    hinge.setLimits(low, high);
    hinge.enableMotor();
    hinge.setMotorMaxForce(CFG.flipperForce);
    hinge.setMotorSpeed(0);
    world.addConstraint(hinge);

    return { mesh, body, hinge, isLeft };
  }

  const leftFlip = createFlipper(true);
  const rightFlip = createFlipper(false);

  // --- Bola
  const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(CFG.ballRadius, 48, 48), new THREE.MeshStandardMaterial({ color: 0xeeffff, metalness: 0.95, roughness: 0.1, emissive: 0x2266aa }));
  ballMesh.castShadow = true;
  scene.add(ballMesh);

  const ballBody = new CANNON.Body({ mass: 0.62, material: matBall, linearDamping: 0.1, angularDamping: 0.2 });
  ballBody.addShape(new CANNON.Sphere(CFG.ballRadius));
  world.addBody(ballBody);

  // --- Lógica do jogo
  function resetBall() {
    ballBody.velocity.set(0, 0, 0);
    ballBody.angularVelocity.set(0, 0, 0);
    ballBody.position.set(2.35, 0.6, 4.45);
  }

  function addPoints(pts) {
    if (paused) return;
    const gain = pts * multiplier;
    score += gain;
    updateUI();
    showMsg(`+${gain}`);
    comboCounter++;
    if (comboCounter >= 3 && multiplier < 5) {
      multiplier++;
      updateUI();
      showMsg(`🔥 COMBO x${multiplier}!`);
      comboCounter = 0;
    }
    if (comboTimer) clearTimeout(comboTimer);
    comboTimer = setTimeout(() => {
      multiplier = 1;
      comboCounter = 0;
      updateUI();
    }, 2800);
  }

  function loseBall() {
    if (paused) return;
    ballsLeft--;
    updateUI();
    if (ballsLeft <= 0) {
      paused = true;
      showMsg(`GAME OVER! Score: ${score}`, 3000);
    } else {
      showMsg("Bola perdida!");
      resetBall();
    }
  }

  function checkDrain() {
    const p = ballBody.position;
    if (p.y < -1.2 || p.z > 7.8 || Math.abs(p.x) > 3.9) {
      if (ballsLeft > 0) loseBall();
      else ballBody.velocity.set(0,0,0);
    }
    if (Math.abs(p.x) > 3.8) p.x *= 0.98;
  }

  // --- Plunger
  let charging = false;
  let power = 0;
  function startCharge() { if (!paused && ballsLeft > 0) charging = true; }
  function releaseCharge() {
    if (!charging || paused) { charging = false; power = 0; return; }
    const p = ballBody.position;
    if (p.z > 4.0 && (p.x > 1.5 || p.x < -1.5)) {
      const force = Math.min(power, 1.0);
      ballBody.velocity.set((Math.random()-0.5)*0.8, 1.8 + force*2.2, -7.2 - force*6.0);
      showMsg(`LANÇAR ${Math.floor(force*100)}%`);
    } else showMsg("Bola não está no lançador");
    charging = false;
    power = 0;
  }
  function updatePlunger(dt) {
    if (charging && !paused) power = Math.min(power + dt * 2.5, 1.0);
  }

  // --- Inputs
  const keys = { left: false, right: false };
  window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
    if (e.code === 'ArrowRight') { keys.right = true; e.preventDefault(); }
    if (e.code === 'Space') { startCharge(); e.preventDefault(); }
    if (e.code === 'KeyR') {
      score = 0; ballsLeft = 3; multiplier = 1; paused = false; comboCounter = 0;
      updateUI(); resetBall(); showMsg("RESET!");
    }
    if (e.code === 'KeyP') { paused = !paused; showMsg(paused ? "PAUSADO" : "JOGANDO"); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') releaseCharge();
  });

  function updateFlippers() {
    leftFlip.hinge.setMotorSpeed(keys.left ? CFG.flipperSpeed : -CFG.flipperSpeed);
    rightFlip.hinge.setMotorSpeed(keys.right ? -CFG.flipperSpeed : CFG.flipperSpeed);
  }

  // --- Colisão com bumpers
  ballBody.addEventListener('collide', (e) => {
    for (let i = 0; i < bumpers.length; i++) {
      if (e.body === bumpers[i].body) {
        addPoints(bumpers[i].pts);
        const n = e.contact.ni.clone();
        const imp = new CANNON.Vec3(-n.x, -n.y+0.5, -n.z);
        imp.scale(2.3, imp);
        ballBody.velocity.vadd(imp, ballBody.velocity);
        if (bumperMeshes[i].material) {
          bumperMeshes[i].material.emissiveIntensity = 1.3;
          setTimeout(() => { if (bumperMeshes[i].material) bumperMeshes[i].material.emissiveIntensity = 0.7; }, 150);
        }
        break;
      }
    }
  });

  // --- Animação loop
  let lastTime = performance.now();
  let acc = 0;
  let animTime = 0;

  function animate(now) {
    requestAnimationFrame(animate);
    let dt = Math.min((now - lastTime)/1000, 0.033);
    lastTime = now;

    if (!paused) {
      updateFlippers();
      updatePlunger(dt);
      acc += dt;
      while (acc >= 1/120) { world.step(1/120); acc -= 1/120; }
      checkDrain();
    }

    ballMesh.position.copy(ballBody.position);
    leftFlip.mesh.position.copy(leftFlip.body.position);
    leftFlip.mesh.quaternion.copy(leftFlip.body.quaternion);
    rightFlip.mesh.position.copy(rightFlip.body.position);
    rightFlip.mesh.quaternion.copy(rightFlip.body.quaternion);

    animTime += dt;
    bumperMeshes.forEach((m, i) => { if(m.material) m.material.emissiveIntensity = 0.6 + Math.sin(animTime*3 + i)*0.2; });

    renderer.render(scene, camera);
  }

  resetBall();
  updateUI();
  showMsg("✅ Pinball pronto! Use ← → e segure ESPAÇO para lançar", 2500);
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Estrelas
  const starPos = [];
  for (let i=0;i<800;i++) starPos.push((Math.random()-0.5)*200, (Math.random()-0.5)*80, (Math.random()-0.5)*80-40);
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.07 })));
</script>
</body>
</html>
