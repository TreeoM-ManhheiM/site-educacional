<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EE. 8 de Abril Lógico 🧠 — Dominó Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --domino-ivory: #fdf6e3;
            --domino-pips: #1a1a1a;
            --table-green: #0d5c36;
            --blue-accent: #3b82f6;
            --bg-dark: #0f172a;
        }

        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            min-height: 100vh;
        }
        
        header { padding: 20px; background: rgba(0,0,0,0.3); }
        header h1 { margin: 0; font-size: 24px; color: #fff; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* LOBBY AJUSTADO */
        .game-box { 
            background: #1e293b; 
            border-radius: 20px; 
            padding: 40px 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: inline-block;
            width: 100%;
            max-width: 500px;
        }

        .input-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        input { 
            padding: 12px; 
            font-size: 16px; 
            border: 2px solid #334155; 
            background: #000; 
            color: #fff; 
            border-radius: 8px; 
            width: 80%; 
        }

        button { 
            background: var(--blue-accent); 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 800;
            transition: 0.2s;
        }

        button:hover { transform: scale(1.05); background: #2563eb; }

        /* MESA DE JOGO - ONDE AS PEÇAS FICAM */
        #tela-jogo { display: none; width: 100%; }
        
        #mesa {
            background-color: var(--table-green);
            min-height: 300px; 
            border-radius: 20px; 
            padding: 40px; 
            display: flex; 
            flex-wrap: wrap; /* Permite que as peças quebrem a linha se não couberem */
            justify-content: center; 
            align-items: center; 
            gap: 10px; /* Espaço entre as peças na mesa */
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6); 
            border: 8px solid #3e2723;
            margin: 20px 0;
            overflow: hidden;
        }

        /* DESIGN DAS PEÇAS */
        .peca-domino {
            background: var(--domino-ivory); 
            border-radius: 6px; 
            font-weight: 800; 
            color: var(--domino-pips);
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-shrink: 0; /* Impede a peça de "esmagar" */
            transition: 0.2s;
        }

        .p-horiz { 
            width: 70px; 
            height: 35px; 
            flex-direction: row; 
            font-size: 18px; 
            border-bottom: 3px solid #d1d1d1;
        }
        .p-horiz::after { content:''; width: 1px; height: 70%; background: #ccc; margin: 0 8px; }

        .p-vert { 
            width: 35px; 
            height: 70px; 
            flex-direction: column; 
            font-size: 18px; 
            border-right: 3px solid #d1d1d1;
        }
        .p-vert::after { content:''; width: 70%; height: 1px; background: #ccc; margin: 8px 0; }

        /* MINHA MÃO */
        #minhas-pecas { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            flex-wrap: wrap; 
            margin-top: 20px; 
            padding: 20px;
        }
        
        .peca-domino:hover { cursor: pointer; transform: translateY(-5px); border-color: var(--blue-accent); }

        #status-turno { font-size: 20px; font-weight: 800; margin: 20px 0; color: #fbbf24; }
    </style>
</head>
<body>

    <header>
        <h1>EE. 8 de Abril Lógico 🧠</h1>
    </header>

    <div class="container">
        <div id="lobby" class="game-box">
            <h2>Novo Jogo</h2>
            <div class="input-group">
                <input type="text" id="nome-jogador" placeholder="Seu Apelido" maxlength="12">
                <input type="text" id="nome-sala" placeholder="Nome da Sala">
                <button onclick="entrar()">ENTRAR</button>
            </div>
            
            <div id="espera" style="display: none; margin-top: 30px;">
                <p>Aguardando jogadores...</p>
                <ul id="lista-jogadores" style="list-style: none; padding: 0; font-size: 18px; color: #60a5fa;"></ul>
                <button id="btn-iniciar" onclick="iniciar()" disabled>COMEÇAR JOGO</button>
            </div>
        </div>

        <div id="tela-jogo">
            <div id="status-turno">Aguardando...</div>
            <div id="mesa"></div>
            <p style="opacity: 0.6;">SUAS PEÇAS (Clique para jogar):</p>
            <div id="minhas-pecas"></div>
            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                <button onclick="socket.emit('comprarPeca')" style="background:#4b5563">📥 Comprar</button>
                <button onclick="socket.emit('passarVez')" style="background:#4b5563">⏭️ Passar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        const socket = io("https://motor-domino.onrender.com");
        let meuNome = "";

        function entrar() {
            meuNome = document.getElementById('nome-jogador').value.trim();
            const sala = document.getElementById('nome-sala').value.trim();
            if (!meuNome || !sala) return alert("Preencha os campos!");
            socket.emit('entrarSala', { apelido: meuNome, sala: sala });
        }

        function iniciar() { socket.emit('marcarPronto'); }

        socket.on('estadoLobby', (dados) => {
            document.getElementById('espera').style.display = 'block';
            const ul = document.getElementById('lista-jogadores');
            ul.innerHTML = dados.jogadoresInfo.map(j => `<li>● ${j.nome}</li>`).join('');
            document.getElementById('btn-iniciar').disabled = dados.jogadoresInfo.length < 2;
            
            if(dados.rodando) {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('tela-jogo').style.display = 'block';
            }
        });

        socket.on('atualizarMesa', (mesa) => {
            const divMesa = document.getElementById('mesa');
            divMesa.innerHTML = mesa.map(p => {
                const estilo = (p[0] === p[1]) ? 'p-vert' : 'p-horiz';
                return `<div class="peca-domino ${estilo}"><span>${p[0]}</span><span>${p[1]}</span></div>`;
            }).join('');
        });

        socket.on('atualizarMao', (mao) => {
            const div = document.getElementById('minhas-pecas');
            div.innerHTML = mao.map((p, i) => {
                const estilo = (p[0] === p[1]) ? 'p-vert' : 'p-horiz';
                return `<div class="peca-domino ${estilo}" onclick="jogar(${i})">
                    <span>${p[0]}</span><span>${p[1]}</span>
                </div>`;
            }).join('');
        });

        socket.on('mudarTurno', (dados) => {
            const status = document.getElementById('status-turno');
            status.innerText = (dados.nome === meuNome) ? "⭐ SUA VEZ!" : `Vez de: ${dados.nome}`;
            status.style.color = (dados.nome === meuNome) ? "#10b981" : "#fbbf24";
        });

        function jogar(index) {
            socket.emit('jogarPeca', { index, lado: 'dir' });
        }

        socket.on('erro', msg => alert(msg));
        socket.on('resetJogo', () => location.reload());
    </script>
</body>
</html>
