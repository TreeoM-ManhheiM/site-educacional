<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arena Lógica - Fatec</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 20px; }
        h1 { color: #10b981; }
        #tela-login { margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 10px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #tela-login input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; }
        #tela-login button { background-color: #10b981; width: 100%; border: none; padding: 12px; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        #lobby, #area-jogo { display: none; }
        #mesa { background: #1e293b; padding: 25px; min-height: 120px; margin: 20px auto; border-radius: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; border: 2px dashed #334155; }
        .peca { background: white; color: black; padding: 12px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-weight: bold; font-size: 20px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); transition: 0.2s; }
        .peca:hover { transform: translateY(-5px); }
        .linha-v { width: 2px; height: 20px; background: #0f172a; }
        .info-game { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: inline-block; min-width: 200px; }
        .destaque { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Mesa de Dominó Lógico 🧠</h1>
    <div id="status" style="color: #94a3b8; margin-bottom: 15px;">Aguardando Conexão...</div>

    <div id="tela-login">
        <h2>Entrar no Jogo</h2>
        <input type="text" id="input-apelido" placeholder="Seu Apelido">
        <input type="text" id="input-sala" placeholder="Nome da Sala (Ex: Sala 01)">
        <button onclick="entrar()">Conectar</button>
    </div>

    <div id="lobby">
        <h2 id="nome-sala-display">Sala</h2>
        <ul id="lista-jogadores" style="list-style: none; padding: 0; font-size: 18px;"></ul>
        <button id="btn-pronto" onclick="socket.emit('marcarPronto')" style="padding: 15px 30px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Estou Pronto!</button>
    </div>

    <div id="area-jogo">
        <div class="info-game">
            <div id="turno-aviso">Vez de: <span class="destaque">---</span></div>
            <div>📦 Monte: <span id="qtd-monte" class="destaque">0</span> peças</div>
        </div>
        
        <div id="mesa"></div>

        <h3>Suas Peças:</h3>
        <div id="minhas-pecas"></div>

        <div style="margin-top: 30px;">
            <button onclick="socket.emit('comprarPeca')" style="background: #eab308; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-right: 10px;">📦 Comprar</button>
            <button onclick="socket.emit('passarVez')" style="background: #ef4444; padding: 12px 25px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;">⏭️ Passar</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://motor-domino.onrender.com");

        function entrar() {
            const apelido = document.getElementById('input-apelido').value;
            const sala = document.getElementById('input-sala').value;
            if(!apelido || !sala) return alert("Preencha seu apelido e a sala!");
            socket.emit('entrarSala', { apelido, sala });
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('nome-sala-display').innerText = "Sala: " + sala;
        }

        socket.on('estadoLobby', (estado) => {
            const lobby = document.getElementById('lobby');
            const jogo = document.getElementById('area-jogo');
            if(estado.rodando) {
                lobby.style.display = 'none';
                jogo.style.display = 'block';
            } else {
                lobby.style.display = 'block';
                jogo.style.display = 'none';
                document.getElementById('lista-jogadores').innerHTML = estado.jogadoresInfo.map(j => 
                    `<li>🧑 ${j.nome} ${j.pronto ? '<span style="color:#10b981;">(Pronto ✅)</span>' : '<span style="color:#ef4444;">(Aguardando...)</span>'}</li>`
                ).join('');
            }
        });

        socket.on('inicioJogo', (dados) => { renderizarMao(dados.minhaMao); });
        socket.on('atualizarMao', (mao) => renderizarMao(mao));
        socket.on('atualizarMonte', (qtd) => document.getElementById('qtd-monte').innerText = qtd);
        socket.on('mudarTurno', (d) => document.getElementById('turno-aviso').innerHTML = `Vez de: <span class="destaque">${d.nome}</span>`);
        socket.on('mensagemGeral', (m) => document.getElementById('status').innerText = m);
        socket.on('erroJogada', (m) => alert("❌ " + m));

        function renderizarMao(mao) {
            const div = document.getElementById('minhas-pecas');
            div.innerHTML = '';
            mao.forEach((p, i) => {
                div.innerHTML += `
                    <div class="peca" onclick="socket.emit('jogarPeca', ${i})">
                        <span>${p[0]}</span><div class="linha-v"></div><span>${p[1]}</span>
                    </div>`;
            });
        }

        socket.on('atualizarMesa', (mesa) => {
            const div = document.getElementById('mesa');
            div.innerHTML = mesa.map(p => `
                <div class="peca" style="cursor:default;">
                    <span>${p[0]}</span><div class="linha-v"></div><span>${p[1]}</span>
                </div>`).join('');
        });
    </script>
</body>
</html>
