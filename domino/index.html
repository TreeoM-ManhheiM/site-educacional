<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó Lógico</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        .container { padding: 20px; }
        #mesa { background: #14532d; min-height: 300px; border-radius: 20px; border: 8px solid #3e2723; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; margin: 20px auto; max-width: 90%; }
        .peca { background: #fdf6e3; color: #1a1a1a; border-radius: 5px; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 2px 4px 0 #ccc; }
        .p-horiz { width: 80px; height: 40px; }
        .p-horiz::after { content: ""; width: 2px; height: 100%; background: #ccc; margin: 0 10px; }
        .p-vert { width: 40px; height: 80px; flex-direction: column; }
        .p-vert::after { content: ""; height: 2px; width: 100%; background: #ccc; margin: 10px 0; }
        #mao { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        input { padding: 10px; border-radius: 5px; border: none; margin: 5px; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>EE. 8 de Abril 🧠</h1>
        <input type="text" id="nick" placeholder="Seu Nome">
        <input type="text" id="sala" placeholder="Sala">
        <button onclick="entrar()">CONECTAR</button>
        <div id="espera" style="display:none">
            <ul id="lista"></ul>
            <button id="btnIni" onclick="socket.emit('marcarPronto')" disabled>INICIAR</button>
        </div>
    </div>

    <div id="jogo" style="display:none">
        <h2 id="turno">Aguardando...</h2>
        <div id="mesa"></div>
        <div id="mao"></div>
        <button onclick="socket.emit('comprarPeca')">COMPRAR</button>
        <button onclick="socket.emit('passarVez')">PASSAR</button>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        const socket = io("https://motor-domino.onrender.com");
        let meuNome = "", mesaAtu = [], maoAtu = [];

        function entrar() {
            meuNome = document.getElementById('nick').value;
            socket.emit('entrarSala', { apelido: meuNome, sala: document.getElementById('sala').value });
        }

        socket.on('estadoLobby', d => {
            document.getElementById('espera').style.display = 'block';
            document.getElementById('lista').innerHTML = d.jogadoresInfo.map(j => `<li>${j.nome}</li>`).join('');
            document.getElementById('btnIni').disabled = d.jogadoresInfo.length < 2;
        });

        socket.on('jogoIniciado', () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('jogo').style.display = 'block';
        });

        socket.on('atualizarMesa', m => {
            mesaAtu = m;
            document.getElementById('mesa').innerHTML = m.map(p => `<div class="peca ${p[0]==p[1]?'p-vert':'p-horiz'}"><span>${p[0]}</span><span>${p[1]}</span></div>`).join('');
        });

        socket.on('atualizarMao', m => {
            maoAtu = m;
            document.getElementById('mao').innerHTML = m.map((p, i) => `<div class="peca ${p[0]==p[1]?'p-vert':'p-horiz'}" onclick="jogar(${i})"><span>${p[0]}</span><span>${p[1]}</span></div>`).join('');
        });

        socket.on('mudarTurno', d => { document.getElementById('turno').innerText = d.nome === meuNome ? "SUA VEZ!" : "Vez de " + d.nome; });

        function jogar(idx) {
            const p = maoAtu[idx];
            if (mesaAtu.length === 0) return socket.emit('jogarPeca', { index: idx, lado: 'dir' });
            const e = mesaAtu[0][0], d = mesaAtu[mesaAtu.length-1][1];
            if (p[0] === d || p[1] === d) socket.emit('jogarPeca', { index: idx, lado: 'dir' });
            else if (p[0] === e || p[1] === e) socket.emit('jogarPeca', { index: idx, lado: 'esq' });
            else alert("Não encaixa!");
        }

        socket.on('erro', m => alert(m));
        socket.on('mensagemGeral', m => alert(m));
        socket.on('resetJogo', () => location.reload());
    </script>
</body>
</html>
