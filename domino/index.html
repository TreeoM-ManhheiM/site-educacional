<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dominó Multi-Salas - Fatec</title>
    <style>
        /* Mantenha o seu CSS igual, apenas adicionei o campo de sala abaixo */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 20px; }
        #tela-login { margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 10px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #tela-login input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; }
        #tela-login button { background-color: #10b981; width: 100%; border: none; padding: 12px; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        #lobby, #area-jogo { display: none; }
        .peca { background: white; color: black; padding: 10px; border-radius: 5px; cursor: pointer; display: inline-flex; gap: 5px; margin: 5px; font-weight: bold; }
        #mesa { background: #1e293b; padding: 20px; min-height: 100px; margin: 20px; border-radius: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
    </style>
</head>
<body>
    <h1>Mesa de Dominó Lógico 🧠</h1>
    <div id="status">Conecte-se para jogar</div>

    <div id="tela-login">
        <h2>Criar ou Entrar em Sala</h2>
        <input type="text" id="input-apelido" placeholder="Seu Apelido">
        <input type="text" id="input-sala" placeholder="Nome da Sala (Ex: Sala 01)">
        <button onclick="entrar()">Entrar na Sala</button>
    </div>

    <div id="lobby">
        <h2 id="nome-sala-display">Sala</h2>
        <ul id="lista-jogadores" style="list-style: none; padding: 0;"></ul>
        <button id="btn-pronto" onclick="marcarPronto()" style="padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer;">Estou Pronto!</button>
    </div>

    <div id="area-jogo">
        <div id="turno-aviso">Aguardando...</div>
        <div id="mesa"></div>
        <h3>Suas Peças:</h3>
        <div id="minhas-pecas"></div>
        <div style="margin-top: 20px;">
            <button onclick="comprar()" style="background: #eab308; padding: 10px;">Comprar</button>
            <button onclick="socket.emit('passarVez')" style="background: #ef4444; padding: 10px; color: white;">Passar</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://motor-domino.onrender.com");

        function entrar() {
            const apelido = document.getElementById('input-apelido').value;
            const sala = document.getElementById('input-sala').value;
            if(!apelido || !sala) return alert("Preencha tudo!");
            
            socket.emit('entrarSala', { apelido, sala });
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('nome-sala-display').innerText = "Sala: " + sala;
        }

        socket.on('estadoLobby', (estado) => {
            if(estado.rodando) {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('area-jogo').style.display = 'block';
            } else {
                document.getElementById('lobby').style.display = 'block';
                document.getElementById('lista-jogadores').innerHTML = estado.jogadoresInfo.map(j => 
                    `<li>${j.nome} - ${j.pronto ? '✅' : '⏳'}</li>`
                ).join('');
            }
        });

        function marcarPronto() { socket.emit('marcarPronto'); }
        
        socket.on('inicioJogo', (dados) => {
            renderizarMao(dados.minhaMao);
        });

        socket.on('mudarTurno', (d) => {
            document.getElementById('turno-aviso').innerText = "Vez de: " + d.nome;
        });

        function renderizarMao(mao) {
            const div = document.getElementById('minhas-pecas');
            div.innerHTML = '';
            mao.forEach((p, i) => {
                div.innerHTML += `<div class="peca" onclick="socket.emit('jogarPeca', ${i})">${p[0]}|${p[1]}</div>`;
            });
        }

        socket.on('atualizarMao', (mao) => renderizarMao(mao));
        
        socket.on('atualizarMesa', (mesa) => {
            const div = document.getElementById('mesa');
            div.innerHTML = mesa.map(p => `<div style="background:white; color:black; padding:5px; border-radius:3px;">${p[0]}|${p[1]}</div>`).join(' ');
        });

        socket.on('mensagemGeral', (m) => document.getElementById('status').innerText = m);
        socket.on('erroJogada', (m) => alert(m));
    </script>
</body>
</html>
