<div id="lobby" style="background: #1e293b; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 400px;">
    <h3>Alunos na Sala:</h3>
    <ul id="lista-alunos" style="list-style: none; padding: 0; color: #10b981; font-weight: bold;"></ul>
    <button onclick="socket.emit('marcarPronto')" style="background: #3b82f6; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer;">
        ESTOU PRONTO
    </button>
</div>

<script>
    // ... dentro do script
    socket.on('estadoLobby', (dados) => {
        const lista = document.getElementById('lista-alunos');
        // Se o jogo já rodou, esconde o lobby
        document.getElementById('lobby').style.display = dados.rodando ? 'none' : 'block';
        document.getElementById('area-jogo').style.display = dados.rodando ? 'block' : 'none';
        
        // Mostra quem está na sala e se está pronto
        lista.innerHTML = dados.jogadoresInfo.map(aluno => 
            `<li>${aluno.nome} ${aluno.pronto ? '✅' : '⏳'}</li>`
        ).join('');
    });
</script>
