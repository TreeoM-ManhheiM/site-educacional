<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>EE. 8 de Abril Lógico 🧠 — Laboratório de Computação</title>

    <style>
        /* ESTILO PADRÃO: LABORATÓRIO DE COMPUTAÇÃO */
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 { margin: 0; font-size: 28px; }
        header p { font-size: 14px; margin-top: 5px; opacity: 0.9; }

        main {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .game-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        #status { color: #64748b; font-size: 13px; margin-bottom: 10px; }

        .painel-info {
            background: #e5edff;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #c7d2fe;
            color: #1e3a8a;
            font-weight: bold;
        }

        .destaque { color: #2563eb; }

        #mesa { 
            background: #f8fafc; 
            padding: 40px; 
            min-height: 120px; 
            margin: 20px 0; 
            border-radius: 12px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            border: 2px dashed #cbd5e1; 
        }

        .peca { 
            background: white; 
            color: #1e293b; 
            padding: 10px 15px; 
            border-radius: 8px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: bold; 
            font-size: 22px; 
            cursor: pointer; 
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .btn-conectar { background: #10b981; color: white; }
        .btn-pronto { background: #3b82f6; color: white; width: 100%; }
        .btn-comprar { background: #eab308; color: black; }
        .btn-passar { background: #ef4444; color: white; }
        .btn-olho { background: #ef4444; color: white; margin-bottom: 15px; }

        #modal-lado { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 30px; border-radius: 15px; 
            z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid #cbd5e1;
        }

        .escondido { filter: blur(15px); opacity: 0.2; pointer-events: none; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; margin: 5px; }
        li { list-style: none; background: #f1f5f9; margin: 5px; padding: 10px; border-radius: 5px; text-align: left; }
        
        /* LINK DE REGRAS */
        .link-regras {
            display: block;
            margin-top: 15px;
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .link-regras:hover { text-decoration: underline; }
    </style>
</head>

<body>

<header>
    <h1>Dominó Lógico 🧠</h1>
    <p>Projeto Integrado — Laboratório de Computação</p>
</header>

<main>
    <div id="status">Conectando...</div>

    <div id="tela-login" class="game-container">
        <h2>Entrar na Partida</h2>
        <input type="text" id="input-apelido" placeholder="Seu Nome">
        <input type="text" id="input-sala" placeholder="Sala">
        <br><br>
        <button onclick="entrar()" class="btn-conectar">CONECTAR AO SERVIDOR</button>
        
        <a href="regras.html" class="link-regras">📖 Ler as regras antes de jogar</a>
    </div>

    <div id="lobby" class="game-container" style="display:none;">
        <h3>Aguardando Jogadores:</h3>
        <ul id="lista-alunos" style="padding:0;"></ul>
        <button onclick="socket.emit('marcarPronto')" class="btn-pronto">ESTOU PRONTO / INICIAR</button>
    </div>

    <div id="area-jogo" style="display:none;">
        <div class="painel-info">
            <div>Turno: <span id="vez-nome" class="destaque">---</span></div>
            <div id="display-parceiro">🤝 Parceiro: ---</div>
            <div>📦 Monte: <span id="qtd-monte" class="destaque">0</span></div>
        </div>

        <div class="game-container">
            <div id="mesa"></div>
        </div>

        <div id="modal-lado">
            <h3>Onde deseja jogar?</h3>
            <button onclick="confirmarLado('esq')" style="background:#6366f1; color:white;">⬅️ Esquerda</button>
            <button onclick="confirmarLado('dir')" style="background:#10b981; color:white; margin-left:10px;">Direita ➡️</button>
        </div>

        <div class="game-container">
            <button id="btn-olho" class="btn-olho" onclick="togglePrivacidade()">🙈 Esconder Peças</button>
            <div id="minhas-pecas"></div>
            
            <div style="margin-top:25px;">
                <button onclick="socket.emit('comprarPeca')" class="btn-comprar">📦 COMPRAR</button>
                <button onclick="socket.emit('passarVez')" class="btn-passar" style="margin-left:10px;">⏭️ PASSAR</button>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://motor-domino.onrender.com");
    let mesaAtual = [], pecaSelecionadaIdx = null, visivel = true;

    function entrar() {
        const apelido = document.getElementById('input-apelido').value;
        const sala = document.getElementById('input-sala').value;
        if(apelido && sala) {
            socket.emit('entrarSala', { apelido, sala });
            document.getElementById('tela-login').style.display = 'none';
        }
    }

    socket.on('infoParceiro', (n) => document.getElementById('display-parceiro').innerText = "🤝 Parceiro: " + n);

    socket.on('estadoLobby', (dados) => {
        const lobby = document.getElementById('lobby'), jogo = document.getElementById('area-jogo');
        if (dados.rodando) { lobby.style.display = 'none'; jogo.style.display = 'block'; }
        else { 
            lobby.style.display = 'block'; 
            document.getElementById('lista-alunos').innerHTML = dados.jogadoresInfo.map(j => `<li>👤 ${j.nome} ${j.pronto ? '✅' : '⏳'}</li>`).join(''); 
        }
    });

    function togglePrivacidade() {
        visivel = !visivel;
        document.getElementById('minhas-pecas').className = visivel ? "" : "escondido";
        document.getElementById('btn-olho').innerText = visivel ? "🙈 Esconder Peças" : "👁️ Mostrar Peças";
    }

    function validarJogada(index, mao) {
        const peca = mao[index];
        if (mesaAtual.length === 0) return socket.emit('jogarPeca', { index, lado: 'dir' });
        const pEsq = mesaAtual[0][0], pDir = mesaAtual[mesaAtual.length - 1][1];
        const serveEsq = (peca[0] === pEsq || peca[1] === pEsq), serveDir = (peca[0] === pDir || peca[1] === pDir);
        if (serveEsq && serveDir) { pecaSelecionadaIdx = index; document.getElementById('modal-lado').style.display = 'block'; }
        else if (serveEsq || serveDir) socket.emit('jogarPeca', { index, lado: serveEsq ? 'esq' : 'dir' });
        else alert("Essa peça não serve!");
    }

    function confirmarLado(lado) { socket.emit('jogarPeca', { index: pecaSelecionadaIdx, lado }); document.getElementById('modal-lado').style.display = 'none'; }
    socket.on('atualizarMesa', (m) => { mesaAtual = m; document.getElementById('mesa').innerHTML = m.map(p => `<div class="peca" style="cursor:default;">${p[0]} | ${p[1]}</div>`).join(''); });
    socket.on('atualizarMao', (m) => { document.getElementById('minhas-pecas').innerHTML = m.map((p, i) => `<div class="peca" onclick="validarJogada(${i}, ${JSON.stringify(m)})">${p[0]} | ${p[1]}</div>`).join(''); });
    socket.on('mudarTurno', (d) => document.getElementById('vez-nome').innerText = d.nome);
    socket.on('atualizarMonte', (q) => document.getElementById('qtd-monte').innerText = q);
    socket.on('connect', () => document.getElementById('status').innerText = "✅ Conectado ao Servidor");
</script>

</body>
</html>
