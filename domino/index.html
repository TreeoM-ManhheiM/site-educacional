<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó Lógico - Corrigido</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        #lobby { padding: 50px; }
        #jogo { padding: 20px; }
        #mesa { background: #14532d; min-height: 300px; border-radius: 20px; border: 8px solid #3e2723; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; margin: 20px auto; max-width: 90%; padding: 20px; }
        #mao { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .peca { background: #fdf6e3; color: #1a1a1a; border-radius: 5px; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 4px 0 #ccc; }
        .p-horiz { width: 80px; height: 40px; flex-direction: row; }
        .p-vert { width: 40px; height: 80px; flex-direction: column; }
        .valor { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .linha { background: #ccc; }
        .p-horiz .linha { width: 2px; height: 100%; }
        .p-vert .linha { width: 100%; height: 2px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:disabled { background: #64748b; }
        input { padding: 10px; border-radius: 5px; border: none; margin: 5px; text-align: center; }
        
        /* MODAL DE ESCOLHA */
        #modal-escolha { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #1e293b; padding: 30px; border-radius: 15px; border: 3px solid #3b82f6; }
        .btn-escolha { margin: 10px; padding: 20px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; color: white; }
        .esq { background: #10b981; }
        .dir { background: #3b82f6; }
    </style>
</head>
<body>
    <div id="modal-escolha">
        <div class="modal-box">
            <h2>Onde jogar?</h2>
            <button class="btn-escolha esq" onclick="window.confirmarJogada('esq')">⬅️ ESQUERDA</button>
            <button class="btn-escolha dir" onclick="window.confirmarJogada('dir')">DIREITA ➡️</button>
        </div>
    </div>

    <div id="lobby">
        <h1>Dominó Online</h1>
        <input type="text" id="nick" placeholder="Seu Nome">
        <input type="text" id="sala" placeholder="Sala">
        <button onclick="window.entrar()">CONECTAR</button>
        <div id="espera" style="display:none">
            <ul id="lista"></ul>
            <button id="btnIni" onclick="window.clicarPronto()" disabled>ESTOU PRONTO</button>
        </div>
    </div>

    <div id="jogo" style="display:none">
        <h2 id="turno">Vez de...</h2>
        <div id="mesa"></div>
        <div id="mao"></div>
        <button onclick="socket.emit('comprarPeca')">COMPRAR</button>
        <button onclick="socket.emit('passarVez')">PASSAR</button>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        const socket = io("https://motor-domino.onrender.com");
        let meuNome = "", mesaAtu = [], maoAtu = [], jogadaPendente = null;

        window.entrar = () => {
            meuNome = document.getElementById('nick').value;
            socket.emit('entrarSala', { apelido: meuNome, sala: document.getElementById('sala').value });
            document.getElementById('lobby').querySelector('input').style.display = 'none';
        };

        window.clicarPronto = () => { socket.emit('marcarPronto'); document.getElementById('btnIni').disabled = true; };

        window.jogar = (idx) => {
            const p = maoAtu[idx];
            if (mesaAtu.length === 0) return socket.emit('jogarPeca', { index: idx, lado: 'dir' });

            const e = mesaAtu[0][0];
            const d = mesaAtu[mesaAtu.length - 1][1];

            const serveEsq = (p[0] === e || p[1] === e);
            const serveDir = (p[0] === d || p[1] === d);

            // CORREÇÃO: Só abre o modal se REALMENTE servir nos dois lados e os lados forem diferentes
            if (serveEsq && serveDir && e !== d) {
                jogadaPendente = idx;
                document.getElementById('modal-escolha').style.display = 'flex';
            } else if (serveEsq) {
                socket.emit('jogarPeca', { index: idx, lado: 'esq' });
            } else if (serveDir) {
                socket.emit('jogarPeca', { index: idx, lado: 'dir' });
            } else {
                alert("Essa peça não encaixa!");
            }
        };

        window.confirmarJogada = (lado) => {
            socket.emit('jogarPeca', { index: jogadaPendente, lado: lado });
            document.getElementById('modal-escolha').style.display = 'none';
        };

        socket.on('estadoLobby', d => {
            document.getElementById('espera').style.display = 'block';
            document.getElementById('lista').innerHTML = d.jogadoresInfo.map(j => `<li>${j.nome}</li>`).join('');
            if (d.jogadoresInfo.length >= 2) document.getElementById('btnIni').disabled = false;
        });

        socket.on('jogoIniciado', () => { document.getElementById('lobby').style.display = 'none'; document.getElementById('jogo').style.display = 'block'; });
        
        socket.on('atualizarMesa', m => {
            mesaAtu = m;
            document.getElementById('mesa').innerHTML = m.map(p => `<div class="peca ${p[0]===p[1]?'p-vert':'p-horiz'}"><div class="valor">${p[0]}</div><div class="linha"></div><div class="valor">${p[1]}</div></div>`).join('');
        });

        socket.on('atualizarMao', m => {
            maoAtu = m;
            document.getElementById('mao').innerHTML = m.map((p, i) => `<div class="peca ${p[0]===p[1]?'p-vert':'p-horiz'}" onclick="window.jogar(${i})"><div class="valor">${p[0]}</div><div class="linha"></div><div class="valor">${p[1]}</div></div>`).join('');
        });

        socket.on('mudarTurno', d => { document.getElementById('turno').innerText = d.nome === meuNome ? "SUA VEZ!" : "Vez de " + d.nome; });
        socket.on('mensagemGeral', m => alert(m));
        socket.on('resetJogo', () => location.reload());
        socket.on('erro', e => alert(e));
    </script>
</body>
</html>
