<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó Lógico</title>
    <style>
        /* BASE DA PÁGINA */
        body { 
            margin: 0; 
            font-family: sans-serif; 
            background: #0f172a; 
            color: white; 
            text-align: center; 
        }
        
        /* TELAS */
        #lobby { padding: 50px; }
        #jogo { padding: 20px; }

        /* A MESA ONDE AS PEÇAS SÃO JOGADAS */
        #mesa { 
            background: #14532d; 
            min-height: 300px; 
            border-radius: 20px; 
            border: 8px solid #3e2723; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            margin: 20px auto; 
            max-width: 90%; 
            padding: 20px;
        }

        /* A MÃO DO JOGADOR (COM FLEXBOX PARA ALINHAR TUDO) */
        #mao { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-top: 20px; 
            margin-bottom: 20px;
        }

        /* ESTILO GERAL DAS PEÇAS */
        .peca { 
            background: #fdf6e3; 
            color: #1a1a1a; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
            box-shadow: 0 4px 0 #ccc; 
        }

        /* PEÇA DEITADA */
        .p-horiz { 
            width: 80px; 
            height: 40px; 
            flex-direction: row; 
        }

        /* PEÇA EM PÉ */
        .p-vert { 
            width: 40px; 
            height: 80px; 
            flex-direction: column; 
        }

        /* ÁREA ONDE FICA O NÚMERO DENTRO DA PEÇA */
        .valor {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* LINHA DO MEIO DA PEÇA DEITADA */
        .p-horiz .linha {
            width: 2px;
            height: 100%;
            background: #ccc;
        }

        /* LINHA DO MEIO DA PEÇA EM PÉ */
        .p-vert .linha {
            width: 100%;
            height: 2px;
            background: #ccc;
        }

        /* BOTÕES E INPUTS */
        button { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            margin: 5px; 
            font-size: 16px;
        }
        button:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        input { 
            padding: 10px; 
            border-radius: 5px; 
            border: none; 
            margin: 5px; 
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>EE. 8 de Abril 🧠</h1>
        
        <div id="controles-login">
            <input type="text" id="nick" placeholder="Seu Nome">
            <input type="text" id="sala" placeholder="Sala">
            <button onclick="entrar()">CONECTAR</button>
        </div>

        <div id="espera" style="display:none">
            <ul id="lista" style="list-style: none; padding: 0; font-size: 18px; margin-bottom: 20px;"></ul>
            <button id="btnIni" onclick="socket.emit('marcarPronto')" disabled>INICIAR</button>
        </div>
    </div>

    <div id="jogo" style="display:none">
        <h2 id="turno">Aguardando...</h2>
        
        <div id="mesa"></div>
        
        <div id="mao"></div>
        
        <div>
            <button onclick="socket.emit('comprarPeca')">COMPRAR</button>
            <button onclick="socket.emit('passarVez')">PASSAR</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        const socket = io("https://motor-domino.onrender.com");
        let meuNome = "", mesaAtu = [], maoAtu = [];

        // FUNÇÃO DE ENTRAR ARRUMADA (MATA O BUG DOS CLONES)
        function entrar() {
            meuNome = document.getElementById('nick').value;
            const sala = document.getElementById('sala').value;

            if (meuNome.trim() === "" || sala.trim() === "") {
                return alert("Por favor, preencha seu nome e a sala!");
            }

            socket.emit('entrarSala', { apelido: meuNome, sala: sala });

            // Esconde as caixas de texto e o botão CONECTAR após o primeiro clique
            document.getElementById('controles-login').style.display = 'none';
        }

        socket.on('estadoLobby', d => {
            document.getElementById('espera').style.display = 'block';
            document.getElementById('lista').innerHTML = d.jogadoresInfo.map(j => `<li>${j.nome}</li>`).join('');
            document.getElementById('btnIni').disabled = d.jogadoresInfo.length < 2;
        });

        socket.on('jogoIniciado', () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('jogo').style.display = 'block';
        });

        socket.on('atualizarMesa', m => {
            mesaAtu = m;
            document.getElementById('mesa').innerHTML = m.map(p => `
                <div class="peca ${p[0] === p[1] ? 'p-vert' : 'p-horiz'}">
                    <div class="valor">${p[0]}</div>
                    <div class="linha"></div>
                    <div class="valor">${p[1]}</div>
                </div>`).join('');
        });

        socket.on('atualizarMao', m => {
            maoAtu = m;
            document.getElementById('mao').innerHTML = m.map((p, i) => `
                <div class="peca ${p[0] === p[1] ? 'p-vert' : 'p-horiz'}" onclick="jogar(${i})">
                    <div class="valor">${p[0]}</div>
                    <div class="linha"></div>
                    <div class="valor">${p[1]}</div>
                </div>`).join('');
        });

        socket.on('mudarTurno', d => { 
            document.getElementById('turno').innerText = d.nome === meuNome ? "SUA VEZ!" : "Vez de " + d.nome; 
        });

        function jogar(idx) {
            const p = maoAtu[idx];
            
            if (mesaAtu.length === 0) {
                return socket.emit('jogarPeca', { index: idx, lado: 'dir' });
            }

            const e = mesaAtu[0][0]; 
            const d = mesaAtu[mesaAtu.length - 1][1]; 

            const serveEsq = (p[0] === e || p[1] === e);
            const serveDir = (p[0] === d || p[1] === d);

            if (serveDir) {
                socket.emit('jogarPeca', { index: idx, lado: 'dir' });
            } else if (serveEsq) {
                socket.emit('jogarPeca', { index: idx, lado: 'esq' });
            } else {
                alert("Não encaixa em nenhum lado!");
            }
        }

        socket.on('erro', m => alert(m));
        socket.on('mensagemGeral', m => alert(m));
        socket.on('resetJogo', () => location.reload());
    </script>
</body>
</html>
