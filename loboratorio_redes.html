<script>
(function () {
  function downloadText(filename, text) {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
  }

  // Normaliza: remove acentos, troca espaços por _
  function safeName(s, ext) {
    return (s || 'arquivo')
      .toLowerCase()
      .replace(/\s+/g, '_')
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      + (ext || '');
  }

  document.addEventListener('click', (ev) => {
    const btn = ev.target.closest('button[data-dl]');
    if (!btn) return;

    const card = btn.closest('.exercise') || document;
    const content = card.querySelector('pre.exercise-text');
    const code = card.querySelector('pre.starter-code');

    const weekTitle = btn.getAttribute('data-week') || '';
    const exTitle = btn.getAttribute('data-ex') || '';

    if (btn.dataset.dl === 'enunciado' && content) {
      const header = `# ${exTitle}${weekTitle ? ` ( ${weekTitle} )` : ''}\n`;
      const txt = header + content.innerText.trim() + "\n";
      const fname = safeName(`${exTitle}_${weekTitle}`, '.txt');
      downloadText(fname, txt);
    }

    if (btn.dataset.dl === 'codigo' && code) {
      const suggested = code.getAttribute('data-filename');
      const fname = (suggested && suggested.trim()) ? suggested.trim() : 'starter.py';
      downloadText(fname, code.innerText);
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    const fullBtn = document.getElementById('downloadPage');
    if (fullBtn) {
      fullBtn.addEventListener('click', () => {
        const html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
        downloadText('loboratorio_redes.html', html);
      });
    }
  });
})();
</script>
